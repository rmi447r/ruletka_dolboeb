<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Stream Auction - Final Pro Elite</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0a0a0a; --panel: #111; --accent: #00a2ff; --red: #ff4b4b; --sidebar-w: 60px; --modal-bg: rgba(0,0,0,0.9); }
        body { margin: 0; background: var(--bg); color: #efefef; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; background-size: cover; background-position: center; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-w); background: #000; display: flex; flex-direction: column; align-items: center; padding-top: 20px; border-right: 1px solid #1a1a1a; z-index: 100; }
        .nav-btn { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border-radius: 10px; cursor: pointer; color: #444; transition: 0.3s; background: none; border: none; }
        .nav-btn.active { color: var(--accent); background: rgba(0, 162, 255, 0.1); }

        .app-content { flex-grow: 1; display: flex; position: relative; overflow: hidden; }
        .view-section { display: none; width: 100%; height: 100%; }
        .view-section.active { display: flex; }

        /* Wheel Panel */
        .lots-panel { width: 320px; background: rgba(10,10,10,0.95); padding: 20px; border-right: 1px solid #1a1a1a; transition: transform 0.4s ease; position: relative; display: flex; flex-direction: column; z-index: 50; }
        .lots-panel.collapsed { transform: translateX(-320px); }
        .toggle-trigger { position: absolute; right: -30px; top: 50%; transform: translateY(-50%); background: #1a1a1a; color: var(--accent); width: 30px; height: 60px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 0 8px 8px 0; border: 1px solid #333; z-index: 60; }
        
        .lot-item { display: flex; align-items: center; padding: 10px; background: #161616; border-radius: 6px; margin-bottom: 6px; border-left: 3px solid var(--accent); font-size: 13px; }
        .lot-item.out { opacity: 0.2; text-decoration: line-through; filter: grayscale(1); }
        
        .wheel-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .marker { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid var(--red); z-index: 30; margin-bottom: 5px; }
        
        /* Modals */
        #customModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-bg); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; text-align: center; min-width: 320px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .modal-btns { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .m-btn { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .m-confirm { background: var(--accent); color: white; }
        .m-confirm:hover { background: #0084d1; }
        .m-cancel { background: #333; color: #ccc; }

        /* Admin & Lists */
        .control-panel { width: 280px; background: rgba(14,14,14,0.9); padding: 15px; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; gap: 10px; }
        .btn-spin { background: var(--red); border: none; color: #fff; padding: 15px; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 16px; }
        .auc-container { display: grid; grid-template-columns: 300px 1fr 340px; gap: 15px; padding: 20px; width: 100%; height: calc(100% - 60px); box-sizing: border-box; }
        .auc-footer { height: 60px; background: #000; border-top: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; width: 100%; position: absolute; bottom: 0; box-sizing: border-box; }
        
        .timer-input-group { display: flex; gap: 5px; margin-bottom: 10px; }
        .timer-input-group input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 5px; text-align: center; border-radius: 4px; }
        
        .ban-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #111; margin-bottom: 8px; border-radius: 8px; border-left: 3px solid var(--red); }
        .center-logo-box { position: absolute; width: 85px; height: 85px; background: #000; border-radius: 50%; border: 3px solid #222; z-index: 40; display: none; top: 50%; left: 50%; transform: translate(-50%, -10%); justify-content: center; align-items: center; overflow: hidden; }
        .center-logo-box img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body id="mainBody">

    <div id="customModal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-top:0; color:var(--accent);"></h3>
            <p id="modalText" style="color:#bbb;"></p>
            <div class="modal-btns" id="modalBtns"></div>
        </div>
    </div>

    <aside class="sidebar">
        <button class="nav-btn active" onclick="setView('wheel', this)"><i class="fas fa-home"></i></button>
        <button class="nav-btn" onclick="setView('auc', this)"><i class="fas fa-envelope"></i></button>
        <button class="nav-btn" onclick="setView('vip', this)"><i class="fas fa-user-slash"></i></button>
        <button class="nav-btn" style="margin-top: auto; margin-bottom: 20px;"><i class="fas fa-cog"></i></button>
    </aside>

    <main class="app-content">
        <section id="view-wheel" class="view-section active">
            <div class="lots-panel" id="sidePanel">
                <div class="toggle-trigger" onclick="toggleSide()"><i class="fas fa-chevron-left" id="sideIcon"></i></div>
                <div style="font-size: 10px; color: #444; margin-bottom: 15px; font-weight: bold;">УЧАСТНИКИ</div>
                <label style="font-size: 11px; color: #666; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; cursor: pointer;">
                    <input type="checkbox" id="hideOut" onchange="renderAll()"> Скрыть выбывшие
                </label>
                <div id="wheelList" style="flex: 1; overflow-y: auto;"></div>
            </div>

            <div class="wheel-zone">
                <div id="simpleStatus" style="height:40px;"></div>
                <div class="marker"></div>
                <div class="center-logo-box" id="logoBox"><img id="logoImg" src="" alt=""></div>
                <canvas id="wheelCanvas" width="550" height="550"></canvas>
            </div>

            <div class="control-panel">
                <button class="btn-spin" onclick="startSpin()">КРУТИТЬ</button>
                <div style="font-size: 10px; color: #333;">ВРЕМЯ (СЕК)</div>
                <input type="number" id="spinTime" style="background:#000; border:1px solid #222; color:#fff; padding:8px; border-radius:5px;" value="10">
                
                <div style="font-size: 10px; color: #333; margin-top: 10px;">ТИП КОЛЕСА</div>
                <div style="display: flex; gap: 5px;">
                    <button id="tNew" class="nav-btn active" style="flex:1; font-size:11px;" onclick="setWType('new')">Новое</button>
                    <button id="tClass" class="nav-btn" style="flex:1; font-size:11px;" onclick="setWType('class')">Классика</button>
                </div>
                
                <div style="display: flex; gap: 5px;">
                    <button class="nav-btn" style="flex:1; font-size:11px; border:1px solid #222;" onclick="document.getElementById('fBg').click()">ФОН</button>
                    <button class="nav-btn" style="flex:1; font-size:11px; border:1px solid #222;" onclick="document.getElementById('fLogo').click()">ЛОГО</button>
                </div>
                <button onclick="confirmClear()" style="margin-top:auto; background:none; border:1px solid #222; color:#333; padding:10px; border-radius:6px; cursor:pointer; font-size:11px;">ОЧИСТИТЬ БАЗУ</button>
            </div>
        </section>

        <section id="view-auc" class="view-section" style="flex-direction:column;">
            <div class="auc-container">
                <div style="background:#111; border-radius:12px; padding:20px; border:1px solid #222;">
                    <h3>Правила</h3>
                    <div id="rulesArea" contenteditable="true" style="color:#efefef; min-height:100px; outline:none;" oninput="saveRules()">Текст...</div>
                </div>

                <div style="background:#111; border-radius:12px; border:1px solid #222; display:flex; flex-direction:column;">
                    <div style="padding:15px; display:flex; gap:10px; border-bottom:1px solid #222;">
                        <input type="text" id="aName" placeholder="Лот..." style="flex:1; background:#000; border:1px solid #333; color:#fff; padding:8px;">
                        <input type="number" id="aVal" value="1" style="width:70px; background:#000; border:1px solid #333; color:#fff; padding:8px;">
                        <button onclick="addLot()" style="background:var(--accent); border:none; color:#fff; padding:0 15px; border-radius:5px;">+</button>
                    </div>
                    <div id="aucList" style="flex:1; overflow-y:auto;"></div>
                </div>

                <div style="background:#1a1a1a; border-radius:12px; padding:25px; text-align:center; height:fit-content; border:1px solid #222;">
                    <div id="tDisp" style="font-size:44px; font-weight:bold; margin-bottom:15px; font-family: monospace;">00:10:00</div>
                    <div class="timer-input-group">
                        <input type="number" id="tDays" placeholder="Дни" value="0">
                        <input type="number" id="tHours" placeholder="Часы" value="0">
                        <input type="number" id="tMins" placeholder="Мин" value="10">
                    </div>
                    <button onclick="applyTimer()" style="width:100%; background:#222; border:none; color:#aaa; padding:5px; margin-bottom:15px; border-radius:4px; font-size:11px; cursor:pointer;">ПРИМЕНИТЬ</button>
                    <div style="display:flex; justify-content:center; gap:20px; font-size:24px; color:#444;">
                        <i id="tPlay" class="fas fa-play" onclick="tToggle()" style="cursor:pointer;"></i>
                        <i class="fas fa-undo" onclick="tReset()" style="cursor:pointer;"></i>
                        <i class="fas fa-caret-up" onclick="tMod(60)" style="cursor:pointer;"></i>
                        <i class="fas fa-caret-down" onclick="tMod(-60)" style="cursor:pointer;"></i>
                    </div>
                </div>
            </div>

            <div class="auc-footer">
                <div>
                    <button class="nav-btn" onclick="confirmClear()"><i class="fas fa-trash"></i></button>
                    <button class="nav-btn active" id="pBtn" onclick="togglePct()"><i class="fas fa-percent"></i> %</button>
                </div>
                <div id="onlineCounter" onclick="showOnlineList()" style="cursor:pointer; background:rgba(0,162,255,0.1); padding:5px 15px; border-radius:20px; border:1px solid var(--accent);">
                    <i class="fas fa-users" style="color:var(--accent);"></i> <span id="onlineCount">0</span>
                </div>
            </div>
        </section>

        <section id="view-vip" class="view-section" style="padding:40px; flex-direction:column; overflow-y:auto;">
            <h2 style="color:var(--red); letter-spacing: 2px;"><i class="fas fa-user-slash"></i> BAN CONTROL PANEL</h2>
            <p style="color:#555; margin-bottom:30px;">Здесь находятся пользователи, которым закрыт доступ к аукциону.</p>
            <div id="banList" style="max-width: 800px;"></div>
        </section>

        <input type="file" id="fBg" hidden onchange="up(this,'bg')">
        <input type="file" id="fLogo" hidden onchange="up(this,'logo')">
    </main>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDhSe5und284GF-eeqGP8l3dOUuazxYwZc", databaseURL: "https://dddd-68b66-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const PASS = 'rekrut_1_mmemnto_mori_001_index_0';

        let data = [], isSpinning = false, rotation = 0, showPct = true, wType = 'new', tSec = 600, tInt = null, onlineUsers = {};

        // --- МОДАЛКИ (ВМЕСТО АЛЕРТОВ) ---
        function showCustomModal(title, text, confirmLabel, onConfirm) {
            const m = document.getElementById('customModal');
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            const btnBox = document.getElementById('modalBtns');
            btnBox.innerHTML = '';
            const b1 = document.createElement('button'); b1.className = 'm-btn m-confirm'; b1.innerText = confirmLabel;
            b1.onclick = () => { onConfirm(); m.style.display = 'none'; };
            const b2 = document.createElement('button'); b2.className = 'm-btn m-cancel'; b2.innerText = 'Отмена';
            b2.onclick = () => { m.style.display = 'none'; };
            btnBox.append(b1, b2);
            m.style.display = 'flex';
        }

        // --- ЛОГИКА ОТОБРАЖЕНИЯ ---
        function setView(id, b) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(nb => nb.classList.remove('active'));
            document.getElementById('view-'+id).classList.add('active'); b.classList.add('active');
        }

        function toggleSide() {
            const p = document.getElementById('sidePanel'), icon = document.getElementById('sideIcon');
            p.classList.toggle('collapsed');
            icon.className = p.classList.contains('collapsed') ? "fas fa-chevron-right" : "fas fa-chevron-left";
        }

        // --- БАЗА И ОНЛАЙН ---
        db.ref('lots').on('value', s => { data = s.val() ? Object.entries(s.val()) : []; renderAll(); });
        db.ref('presence').on('value', s => { 
            onlineUsers = s.val() || {}; 
            document.getElementById('onlineCount').innerText = Object.keys(onlineUsers).length; 
        });
        db.ref('bans').on('value', s => {
            const bans = s.val() || {};
            const container = document.getElementById('banList');
            container.innerHTML = '';
            Object.entries(bans).forEach(([uid, name]) => {
                container.innerHTML += `<div class="ban-item">
                    <span><b>${name}</b> <small style="color:#444; margin-left:10px;">ID: ${uid}</small></span>
                    <button class="m-btn m-cancel" style="padding:5px 15px;" onclick="db.ref('bans/${uid}').remove()">Разбанить</button>
                </div>`;
            });
        });

        function banUser(uid, name) {
            if(!uid || uid === 'null') return;
            showCustomModal("БАН ПОЛЬЗОВАТЕЛЯ", `Вы точно хотите забанить ${name}?`, "ЗАБАНИТЬ", () => {
                db.ref('bans/' + uid).set(name);
            });
        }

        function showOnlineList() {
            const names = Object.values(onlineUsers).map(u => u.name || 'Аноним').join(', ');
            showCustomModal("КТО ОНЛАЙН", names || "Никого нет", "ОК", () => {});
        }

        function saveRules() { db.ref('auction/rules').set(document.getElementById('rulesArea').innerText); }
        db.ref('auction/rules').once('value', s => { if(s.val()) document.getElementById('rulesArea').innerText = s.val(); });

        function renderAll() {
            const wl = document.getElementById('wheelList'), al = document.getElementById('aucList'), hide = document.getElementById('hideOut').checked;
            wl.innerHTML = ''; al.innerHTML = '';
            const active = data.filter(([id,d]) => d.active !== false);
            const total = active.reduce((a,[id,d]) => a + (d.votes || d.val || 0), 0);

            data.forEach(([id, d], i) => {
                const isOut = d.active === false, votes = d.votes || d.val || 0, p = total > 0 ? ((votes/total)*100).toFixed(1) : 0;
                if(!(isOut && hide)) {
                    wl.innerHTML += `<div class="lot-item ${isOut ? 'out' : ''}" style="border-left-color:hsl(${d.hue},70%,50%)">
                        <span style="flex:1; overflow:hidden;">${d.name}</span>
                        ${showPct ? `<span style="color:var(--accent); font-size:10px; margin:0 10px;">${p}%</span>` : ''}
                        <b>${votes}</b>
                    </div>`;
                }
                al.innerHTML += `<div style="display:flex; flex-direction:column; padding:12px; border-bottom:1px solid #1a1a1a;">
                    <div style="display:flex; align-items:center;">
                        <span style="width:25px; color:#333;">${i+1}</span>
                        <span style="flex:1; font-weight:bold;">${d.name}</span>
                        <span style="color:var(--accent); font-weight:bold; margin-right:15px;">${p}%</span>
                        <span style="margin-right:15px;">${votes}</span>
                        <i class="fas fa-user-slash" style="cursor:pointer; color:#444; margin-right:15px;" title="Забанить" onclick="banUser('${d.uid}', '${d.author}')"></i>
                        <i class="fas fa-trash" style="cursor:pointer; color:#444;" onclick="db.ref('lots/${id}').remove()"></i>
                    </div>
                    <div style="font-size:10px; color:#555; padding-left:25px;">Автор: ${d.author || 'Админ'}</div>
                </div>`;
            });
            drawWheel();
        }

        // --- КОЛЕСО ---
        function drawWheel() {
            const cvs = document.getElementById('wheelCanvas'), ctx = cvs.getContext('2d');
            ctx.clearRect(0,0,550,550);
            const active = data.filter(([id,d]) => d.active !== false);
            if(!active.length) return;
            const total = active.reduce((a,[id,d]) => a + (d.votes || d.val || 0), 0);
            let curr = rotation;
            active.forEach(([id, d], i) => {
                const slice = ((d.votes || d.val || 0)/total) * (Math.PI*2);
                ctx.save(); ctx.translate(275,275); ctx.rotate(curr);
                ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,260,0,slice);
                ctx.fillStyle = wType==='class' ? (i%2===0?'#1a1a1a':'#2a2a2a') : `hsl(${d.hue},65%,45%)`;
                ctx.fill();
                if(wType==='class'){ ctx.strokeStyle=`hsl(${d.hue},70%,50%)`; ctx.lineWidth=2; ctx.stroke(); }
                ctx.rotate(slice/2); ctx.fillStyle="#fff"; ctx.font="bold 14px sans-serif"; ctx.textAlign="right";
                ctx.fillText(d.name.substring(0,16), 240, 5); ctx.restore();
                curr += slice;
            });
        }

        function startSpin() {
            const active = data.filter(([id,d]) => d.active !== false);
            if(isSpinning || active.length < 2) return;
            isSpinning = true;
            const dur = parseInt(document.getElementById('spinTime').value)*1000, start = performance.now();
            const pwr = 45 + Math.random()*40, sRot = rotation;
            function anim(now) {
                const p = Math.min((now-start)/dur, 1);
                const ease = 1 - Math.pow(1-p, 4); // Плавное замедление
                rotation = sRot + pwr * ease;
                drawWheel();
                if(p < 1) requestAnimationFrame(anim);
                else { isSpinning = false; const win = getWin(); if(win) db.ref('lots/'+win.id).update({active: false}); }
            }
            requestAnimationFrame(anim);
        }

        function getWin() {
            const active = data.filter(([id,d]) => d.active !== false);
            const total = active.reduce((a,[id,d]) => a + (d.votes || d.val || 0), 0);
            const norm = ((rotation % (Math.PI*2)) + (Math.PI*2)) % (Math.PI*2);
            const target = (Math.PI*1.5 - norm + (Math.PI*2)) % (Math.PI*2);
            let cur = 0;
            for(const [id, d] of active) {
                const slice = ((d.votes || d.val || 0)/total) * (Math.PI*2);
                if(target >= cur && target < cur + slice) return {id, name: d.name};
                cur += slice;
            }
        }

        // --- ДОП ФУНКЦИИ ---
        function applyTimer() {
            const d = parseInt(document.getElementById('tDays').value) || 0;
            const h = parseInt(document.getElementById('tHours').value) || 0;
            const m = parseInt(document.getElementById('tMins').value) || 0;
            tSec = (d * 86400) + (h * 3600) + (m * 60); tUpdate();
        }
        function tUpdate() { document.getElementById('tDisp').innerText = new Date(tSec * 1000).toISOString().substr(11, 8); }
        function tToggle() { if(tInt){clearInterval(tInt); tInt=null;} else {tInt=setInterval(()=>{if(tSec>0){tSec--; tUpdate();}},1000);} }
        function tReset() { tSec=600; tUpdate(); }
        function tMod(v) { tSec=Math.max(0, tSec+v); tUpdate(); }
        function confirmClear() { showCustomModal("ОЧИСТКА", "Удалить все лоты?", "УДАЛИТЬ", () => { db.ref('lots').remove(); db.ref('auction').update({timer:600, rules:""}); }); }
        function addLot() {
            const n=document.getElementById('aName').value, v=parseInt(document.getElementById('aVal').value)||1;
            if(n) db.ref('lots/'+Date.now()).set({name:n, votes:v, hue:Math.random()*360, active:true, author:'Admin', uid:'admin'});
            document.getElementById('aName').value='';
        }
        function togglePct() { showPct = !showPct; document.getElementById('pBtn').classList.toggle('active'); renderAll(); }
        function setWType(t) { wType=t; document.getElementById('tNew').classList.toggle('active', t==='new'); document.getElementById('tClass').classList.toggle('active', t==='class'); drawWheel(); }
        function up(i, t) { if(i.files[0]){ const r=new FileReader(); r.onload=e=>{ if(t==='bg')document.getElementById('mainBody').style.backgroundImage=`url(${e.target.result})`; else{document.getElementById('logoImg').src=e.target.result; document.getElementById('logoBox').style.display='flex';} }; r.readAsDataURL(i.files[0]); }}

        tUpdate();
    </script>
</body>
</html>
