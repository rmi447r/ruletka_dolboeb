<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Stream Auction - God Mode ELITE PRO EDITION</title>
    
    <!-- ПОДКЛЮЧЕНИЕ ВНЕШНИХ БИБЛИОТЕК -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ============================================================
           БЛОК ГЛОБАЛЬНЫХ ПЕРЕМЕННЫХ И ОБНУЛЕНИЯ СТИЛЕЙ
           ============================================================ */
        :root { 
            --bg: #0a0a0a; 
            --panel: #111; 
            --accent: #00a2ff; 
            --red: #ff4b4b; 
            --sidebar-w: 60px; 
        }

        body { 
            margin: 0; 
            padding: 0;
            background-color: var(--bg); 
            color: #efefef; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat;
        }

        /* ============================================================
           ЛЕВАЯ ПАНЕЛЬ НАВИГАЦИИ (SIDEBAR)
           ============================================================ */
        .sidebar { 
            width: var(--sidebar-w); 
            background-color: #000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 25px; 
            border-right: 1px solid #1a1a1a; 
            z-index: 100; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
        }

        .nav-btn { 
            width: 44px; 
            height: 44px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 18px; 
            border-radius: 12px; 
            cursor: pointer; 
            color: #444; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            background: none; 
            border: none; 
            outline: none;
            font-size: 18px;
        }

        .nav-btn:hover {
            color: #888;
            background-color: rgba(255,255,255,0.05);
        }

        .nav-btn.active { 
            color: var(--accent); 
            background-color: rgba(0, 162, 255, 0.12); 
            box-shadow: 0 0 15px rgba(0, 162, 255, 0.1);
        }

        /* ============================================================
           ОСНОВНОЙ КОНТЕНТНЫЙ БЛОК
           ============================================================ */
        .app-content { 
            flex-grow: 1; 
            display: flex; 
            position: relative; 
            overflow: hidden; 
            width: 100%;
        }

        .view-section { 
            display: none; 
            width: 100%; 
            height: 100%; 
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .view-section.active { 
            display: flex; 
            opacity: 1;
        }

        /* ============================================================
           ЛЕВАЯ ПАНЕЛЬ ЛОТОВ (СПИСОК У КОЛЕСА)
           ============================================================ */
        .lots-panel { 
            width: 320px; 
            background-color: rgba(10, 10, 10, 0.96); 
            padding: 25px; 
            border-right: 1px solid #1a1a1a; 
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            z-index: 50; 
            backdrop-filter: blur(10px);
        }

        .lots-panel.collapsed { 
            transform: translateX(-320px); 
        }

        .toggle-trigger { 
            position: absolute; 
            right: -30px; 
            top: 50%; 
            transform: translateY(-50%); 
            background-color: #1a1a1a; 
            color: var(--accent); 
            width: 30px; 
            height: 70px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            border-radius: 0 10px 10px 0; 
            border: 1px solid #333; 
            z-index: 60; 
            transition: background 0.3s;
        }

        .toggle-trigger:hover {
            background-color: #222;
        }

        .lot-item { 
            display: flex; 
            align-items: center; 
            padding: 14px; 
            background-color: rgba(22, 22, 22, 0.6); 
            border-radius: 10px; 
            margin-bottom: 10px; 
            border-left: 4px solid var(--accent); 
            font-size: 14px; 
            transition: transform 0.2s;
        }

        .lot-item.out { 
            opacity: 0.2; 
            text-decoration: line-through; 
            filter: grayscale(1); 
        }

        /* ============================================================
           ЦЕНТРАЛЬНАЯ ЗОНА (КОЛЕСО)
           ============================================================ */
        .wheel-zone { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
        }

        #simpleStatus { 
            height: 60px; 
            font-size: 26px; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 15px; 
            letter-spacing: 3px; 
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .marker { 
            width: 0; 
            height: 0; 
            border-left: 18px solid transparent; 
            border-right: 18px solid transparent; 
            border-top: 35px solid var(--red); 
            z-index: 30; 
            margin-bottom: 5px; 
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }
        
        .center-logo-box { 
            position: absolute; 
            width: 90px; 
            height: 90px; 
            background-color: #000; 
            border-radius: 50%; 
            border: 4px solid #222; 
            z-index: 40; 
            display: none; 
            overflow: hidden; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -10%); 
            justify-content: center; 
            align-items: center; 
            box-shadow: 0 0 25px rgba(0,0,0,0.8);
        }

        .center-logo-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        /* ============================================================
           ПАНЕЛЬ УПРАВЛЕНИЯ (СПРАВА)
           ============================================================ */
        .control-panel { 
            width: 290px; 
            background-color: rgba(14, 14, 14, 0.95); 
            padding: 20px; 
            border-left: 1px solid #1a1a1a; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            z-index: 40;
        }

        .btn-spin { 
            background-color: var(--red); 
            border: none; 
            color: #fff; 
            padding: 20px; 
            border-radius: 12px; 
            font-weight: 900; 
            cursor: pointer; 
            font-size: 20px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.1s, background-color 0.3s;
            box-shadow: 0 5px 15px rgba(255, 75, 75, 0.2);
        }

        .btn-spin:active {
            transform: scale(0.96);
        }

        /* ============================================================
           АУКЦИОННЫЙ КОНТЕЙНЕР (СЕТКА)
           ============================================================ */
        .auc-container { 
            display: grid; 
            grid-template-columns: 310px 1fr 350px; 
            gap: 20px; 
            padding: 30px; 
            width: 100%; 
            height: calc(100% - 60px); 
            box-sizing: border-box; 
        }

        .auc-footer { 
            height: 60px; 
            background-color: #000; 
            border-top: 1px solid #1a1a1a; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 25px; 
            width: 100%; 
            position: absolute; 
            bottom: 0; 
            box-sizing: border-box; 
            z-index: 110;
        }
        
        .timer-input-group { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 15px; 
        }

        .timer-input-group input { 
            width: 100%; 
            background-color: #0b0b0b; 
            border: 1px solid #222; 
            color: #ffffff; 
            padding: 10px; 
            text-align: center; 
            border-radius: 8px; 
            outline: none;
            font-weight: bold;
        }

        .timer-input-group input:focus {
            border-color: var(--accent);
        }

        /* ============================================================
           ИНТЕРФЕЙСНЫЕ ОКНА (ВЕРТИКАЛЬНЫЙ СТЕК СПРАВА)
           ============================================================ */

        /* 1. ВЕРХНЕЕ ОКНО: ОШИБКИ И УВЕДОМЛЕНИЯ (КРАСНАЯ ЗОНА) */
        #error-overlay { 
            display: none; 
            position: fixed; 
            top: 330px; /* ПОД ТАЙМЕРОМ - ПО ТВОЕМУ ЗАПРОСУ */
            right: 25px; 
            width: 330px; 
            background-color: #111; 
            border: 1px solid var(--red); 
            border-radius: 15px; 
            padding: 22px; 
            z-index: 2500; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px);
        }

        /* 2. СРЕДНЕЕ ОКНО: КТО ГОЛОСОВАЛ (ИНФО) */
        #voters-overlay { 
            display: none; 
            position: fixed; 
            bottom: 240px; /* МЕЖДУ НИЗОМ И ВЕРХОМ */
            right: 25px; 
            width: 330px; 
            max-height: 350px; 
            background-color: #111; 
            border: 1px solid var(--accent); 
            border-radius: 15px; 
            padding: 22px; 
            z-index: 2400; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.9); 
            overflow-y: auto; 
            backdrop-filter: blur(10px);
        }

        /* 3. НИЖНЕЕ ОКНО: ОНЛАЙН (СИНЯЯ ЗОНА) */
        #online-overlay { 
            display: none; 
            position: fixed; 
            bottom: 90px; /* ПРИЖАТО К КНОПКЕ ОНЛАЙНА */
            right: 25px; 
            width: 330px; 
            background-color: #111; 
            border: 1px solid var(--accent); 
            border-radius: 15px; 
            padding: 22px; 
            z-index: 2300; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px);
        }

        .pop-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 0; 
            border-bottom: 1px solid #222; 
            font-size: 15px; 
        }

        .mini-ban-btn { 
            color: var(--red); 
            cursor: pointer; 
            font-size: 18px; 
            transition: transform 0.2s; 
        }
        .mini-ban-btn:hover { transform: scale(1.25); }

        /* ИКОНКА АВАТАРКИ В СПИСКЕ ЛОТОВ (МИКРО-ЧЕЛИК) */
        .vote-avatar-box { 
            background-color: #ffffff; 
            color: #000000; 
            border-radius: 50%; 
            width: 24px; 
            height: 24px; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 12px; 
            margin-left: 10px; 
            vertical-align: middle; 
            font-weight: 900;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* ============================================================
           ЦЕНТРАЛЬНАЯ МОДАЛКА (ПОДТВЕРЖДЕНИЕ ДЕЙСТВИЙ)
           ============================================================ */
        .modal-blur { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.88); 
            z-index: 3000; 
        }

        .confirm-modal { 
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 400px; 
            background-color: #111; 
            border: 1px solid var(--accent); 
            border-radius: 18px; 
            padding: 35px; 
            z-index: 3100; 
            box-shadow: 0 0 80px rgba(0,0,0,1); 
        }

        .modal-btns { 
            display: flex; 
            justify-content: flex-end; 
            margin-top: 30px; 
            gap: 15px; 
        }

        .m-btn { 
            padding: 14px 30px; 
            border-radius: 10px; 
            border: none; 
            cursor: pointer; 
            font-weight: 900; 
            text-transform: uppercase; 
            font-size: 13px;
            letter-spacing: 1px;
            outline: none;
            transition: filter 0.2s;
        }

        .m-btn:hover {
            filter: brightness(1.2);
        }

        .m-yes { background-color: var(--red); color: #fff; }
        .m-no { background-color: #222; color: #777; }

        /* СКРОЛЛБАР */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background-color: #333; border-radius: 10px; }
        ::-webkit-scrollbar-track { background-color: #000; }
    </style>
</head>
<body id="mainBody">

    <!-- ФОНОВЫЙ ЗАТЕМНИТЕЛЬ ДЛЯ МОДАЛОК -->
    <div id="modalOverlay" class="modal-blur"></div>

    <!-- ОКНО ПОДТВЕРЖДЕНИЯ (ЦЕНТРАЛЬНОЕ) -->
    <div id="confirmModal" class="confirm-modal">
        <h3 id="mTitle" style="margin-top:0; color:var(--accent); letter-spacing:1px; text-transform: uppercase;">ЗАПРОС СИСТЕМЫ</h3>
        <p id="mText" style="color:#bbb; line-height:1.6; font-size:16px;"></p>
        <div class="modal-btns">
            <button class="m-btn m-no" onclick="closeConfirm()">ОТМЕНА</button>
            <button id="mConfirmBtn" class="m-btn m-yes">ДА, ВЫПОЛНИТЬ</button>
        </div>
    </div>

    <!-- 1. ВЕРХНЕЕ ОКНО: УВЕДОМЛЕНИЯ / ОШИБКИ (КРАСНАЯ ЗОНА) -->
    <div id="error-overlay">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom: 1px solid #222; padding-bottom: 8px;">
            <span style="color:var(--red); font-weight:bold; font-size:12px; letter-spacing:1px; text-transform: uppercase;">УВЕДОМЛЕНИЕ / ОШИБКА</span>
            <i class="fas fa-times" onclick="closeError()" style="cursor:pointer; color:#444;"></i>
        </div>
        <div id="errorDisplay" style="color:#fff; font-size:15px; font-weight:bold; text-transform:uppercase; line-height: 1.4;"></div>
    </div>

    <!-- 2. СРЕДНЕЕ ОКНО: ИНФОРМАЦИЯ О ГОЛОСАХ (КТО ГОЛОСОВАЛ) -->
    <div id="voters-overlay">
        <div style="display:flex; justify-content:space-between; margin-bottom:12px; border-bottom:1px solid #333; padding-bottom:10px;">
            <span id="vTitle" style="font-size:12px; font-weight:bold; color:var(--accent); text-transform:uppercase;">ИНФОРМАЦИЯ О ЛОТЕ</span>
            <i class="fas fa-times" onclick="closeVoters()" style="cursor:pointer; color:#555;"></i>
        </div>
        <div id="vListContent"></div>
    </div>

    <!-- 3. НИЖНЕЕ ОКНО: ОНЛАЙН (СИНЯЯ ЗОНА) -->
    <div id="online-overlay">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; border-bottom:1px solid #333; padding-bottom:10px;">
            <span style="font-size:12px; font-weight:bold; color:var(--accent); text-transform: uppercase;">ЗРИТЕЛИ В СЕТИ</span>
            <i class="fas fa-times" onclick="closeOnline()" style="cursor:pointer; color:#444;"></i>
        </div>
        <div id="onlineNamesBox" style="font-size:14px; color:#ccc; line-height:1.6; max-height:200px; overflow-y:auto;"></div>
    </div>

    <!-- САЙДБАР (ТВОИ ИКОНКИ ИЗ СКРИНОВ) -->
    <aside class="sidebar">
        <button class="nav-btn active" onclick="setView('wheel', this)"><i class="fas fa-home"></i></button>
        <button class="nav-btn" onclick="setView('auc', this)"><i class="fas fa-envelope"></i></button>
        <button class="nav-btn" onclick="setView('vip', this)"><i class="fas fa-user-slash"></i></button>
        <button class="nav-btn" style="margin-top: auto; margin-bottom: 25px;"><i class="fas fa-cog"></i></button>
    </aside>

    <main class="app-content">
        
        <!-- СЕКЦИЯ: КОЛЕСО -->
        <section id="view-wheel" class="view-section active">
            
            <div class="lots-panel" id="sidePanel">
                <div class="toggle-trigger" onclick="toggleSide()"><i class="fas fa-chevron-left" id="sideIcon"></i></div>
                <div style="font-size: 11px; color: #444; margin-bottom: 18px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;">Участники</div>
                <label style="font-size: 12px; color: #666; display: flex; align-items: center; gap: 10px; margin-bottom: 15px; cursor: pointer;">
                    <input type="checkbox" id="hideOut" onchange="renderAll()"> Скрыть выбывшие
                </label>
                <div id="wheelList" style="flex: 1; overflow-y: auto;"></div>
            </div>

            <div class="wheel-zone">
                <div id="simpleStatus"></div>
                <div class="marker"></div>
                <div class="center-logo-box" id="logoBox"><img id="logoImg" src="" alt="logo"></div>
                <canvas id="wheelCanvas" width="550" height="550"></canvas>
            </div>

            <div class="control-panel">
                <button class="btn-spin" onclick="startSpin()">КРУТИТЬ</button>
                
                <div style="font-size: 11px; color: #333; text-transform: uppercase; font-weight: 900; margin-top: 10px;">Время прокрутки (сек)</div>
                <input type="number" id="spinTime" style="background-color:#000; border:1px solid #222; color:#fff; padding:12px; border-radius:8px; font-weight: bold;" value="5">
                
                <div style="font-size: 11px; color: #333; margin-top: 15px; text-transform: uppercase; font-weight: 900;">Тип рулетки</div>
                <div style="display: flex; gap: 8px;">
                    <button id="tNew" class="nav-btn" style="flex:1; font-size:11px;" onclick="setWType('new')">Новое</button>
                    <button id="tClass" class="nav-btn active" style="flex:1; font-size:11px;" onclick="setWType('class')">Классика</button>
                </div>
                
                <div style="display: flex; gap: 8px; margin-top: 10px;">
                    <button class="nav-btn" style="flex:1; font-size:11px; border:1px solid #222;" onclick="document.getElementById('fBg').click()">ФОН</button>
                    <button class="nav-btn" style="flex:1; font-size:11px; border:1px solid #222;" onclick="document.getElementById('fLogo').click()">ЛОГО</button>
                </div>
                
                <button onclick="askClearDB()" style="margin-top:auto; background:none; border:1px solid #222; color:#444; padding:12px; border-radius:8px; cursor:pointer; font-size:11px; text-transform: uppercase; font-weight: 900;">Очистить базу данных</button>
            </div>
        </section>

        <!-- СЕКЦИЯ: АУКЦИОН -->
        <section id="view-auc" class="view-section" style="flex-direction:column;">
            
            <div class="auc-container">
                
                <!-- БЛОК ПРАВИЛ -->
                <div style="background-color:#111; border-radius:15px; padding:25px; border:1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    <h3 style="text-transform: uppercase; letter-spacing: 2px; margin-top: 0; color: #fff;">Правила</h3>
                    <div id="rulesArea" contenteditable="true" style="color:#efefef; min-height:150px; outline:none; font-size: 15px; line-height: 1.6;" oninput="saveRules()">Текст правил...</div>
                </div>

                <!-- БЛОК ЛОТОВ -->
                <div style="background-color:#111; border-radius:15px; border:1px solid #222; display:flex; flex-direction:column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden;">
                    <div style="padding:20px; display:flex; gap:12px; border-bottom:1px solid #222; background-color: #161616;">
                        <input type="text" id="aName" placeholder="Название нового лота..." style="flex:1; background-color:#000; border:1px solid #333; color:#fff; padding:12px; border-radius: 8px;">
                        <input type="number" id="aVal" value="1" style="width:75px; background-color:#000; border:1px solid #333; color:#fff; padding:12px; border-radius: 8px;">
                        <button onclick="addLot()" style="background-color:var(--accent); border:none; color:#fff; padding:0 25px; border-radius:10px; cursor:pointer; font-weight: 900; font-size: 20px;">+</button>
                    </div>
                    <div id="aucList" style="flex:1; overflow-y:auto; padding: 5px;"></div>
                </div>

                <!-- БЛОК ТАЙМЕРА -->
                <div style="background-color:#1a1a1a; border-radius:15px; padding:30px; text-align:center; height:fit-content; border:1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    <div id="tDisp" style="font-size:38px; font-weight:900; margin-bottom:20px; font-family: monospace; letter-spacing: 3px; color: #fff; text-shadow: 0 0 15px var(--accent);">00:00:10:00</div>
                    
                    <div class="timer-input-group">
                        <input type="number" id="tDays" placeholder="Дни" value="0">
                        <input type="number" id="tHours" placeholder="Часы" value="0">
                        <input type="number" id="tMins" placeholder="Мин" value="10">
                    </div>
                    
                    <button onclick="applyTimer()" style="width:100%; background-color:#222; border:none; color:#aaa; padding:12px; margin-bottom:15px; border-radius:8px; font-size:12px; cursor:pointer; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;">Установить время</button>
                    
                    <div style="display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px;">
                        <label style="font-size:12px; color:#777; cursor:pointer; display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="lockVoting" onchange="updateLock()"> Блокировать по окончанию
                        </label>
                        
                        <!-- ЗЕЛЕНАЯ ЗОНА: МГНОВЕННОЕ УДАЛЕНИЕ -->
                        <label style="font-size:12px; color:var(--red); cursor:pointer; font-weight:bold; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="instantDelete"> Мгновенное удаление
                        </label>
                    </div>

                    <div style="display:flex; justify-content:center; gap:25px; font-size:28px; color:#444;">
                        <i id="tPlay" class="fas fa-play" onclick="tToggle()" style="cursor:pointer; transition: color 0.2s;"></i>
                        <i class="fas fa-undo" onclick="tReset()" style="cursor:pointer; transition: color 0.2s;"></i>
                        <i class="fas fa-plus-circle" onclick="tMod(60)" style="cursor:pointer; transition: color 0.2s;"></i>
                        <i class="fas fa-minus-circle" onclick="tMod(-60)" style="cursor:pointer; transition: color 0.2s;"></i>
                    </div>
                </div>
            </div>

            <!-- ПОДВАЛ АУКЦИОНА -->
            <div class="auc-footer">
                <div style="display: flex; gap: 15px;">
                    <button class="nav-btn" onclick="askClearDB()"><i class="fas fa-trash"></i></button>
                    <button class="nav-btn active" id="pBtn" onclick="togglePct()"><i class="fas fa-percent"></i></button>
                </div>
                
                <!-- КНОПКА ОТКРЫТИЯ ОНЛАЙНА -->
                <div id="onlineCounter" onclick="showOnlineList()" style="cursor:pointer; background-color:rgba(0,162,255,0.1); padding:10px 22px; border-radius:30px; border:1px solid var(--accent); transition: background 0.3s;">
                    <i class="fas fa-users" style="color:var(--accent); margin-right: 5px;"></i> 
                    <span id="onlineCount" style="font-weight: 900; font-size: 16px;">0</span>
                </div>
            </div>
        </section>

        <!-- ВИД: ЧЕРНЫЙ СПИСОК (БАНЫ) -->
        <section id="view-vip" class="view-section" style="flex-direction:column; padding:50px;">
            <h2 style="color:var(--red); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px;"><i class="fas fa-user-slash"></i> Черный список нарушителей</h2>
            <div id="banList" style="max-width: 800px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;"></div>
        </section>
    </main>

    <!-- СКРЫТЫЕ ИНПУТЫ ДЛЯ ФАЙЛОВ -->
    <input type="file" id="fBg" hidden onchange="up(this,'bg')">
    <input type="file" id="fLogo" hidden onchange="up(this,'logo')">

    <script>
        /* ============================================================
           БЛОК ИНИЦИАЛИЗАЦИИ FIREBASE (ТВОИ ДАННЫЕ)
           ============================================================ */
        const firebaseConfig = { 
            apiKey: "AIzaSyDhSe5und284GF-eeqGP8l3dOUuazxYwZc", 
            databaseURL: "https://dddd-68b66-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // СЕКРЕТНЫЙ ПАРОЛЬ ДЛЯ БАЗЫ (ДЛЯ ПРАВИЛ)
        const PASS = 'rekrut_1_mmemnto_mori_001_index_0';
        
        let data = [];
        let isSpinning = false;
        let rotation = 0;
        let showPct = true;
        let wType = 'class';
        let tSec = 600;
        let tInt = null;
        let onlineUsers = {};

        /* ============================================================
           УПРАВЛЕНИЕ ОКНАМИ И ВСПЛЫВАЮЩИМИ ИНТЕРФЕЙСАМИ
           ============================================================ */
        function askConfirm(title, text, confirmCallback) {
            document.getElementById('mTitle').innerText = title;
            document.getElementById('mText').innerText = text;
            document.getElementById('confirmModal').style.display = 'block';
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('mConfirmBtn').onclick = function() { 
                confirmCallback(); 
                closeConfirm(); 
            };
        }

        function closeConfirm() { 
            document.getElementById('confirmModal').style.display = 'none'; 
            document.getElementById('modalOverlay').style.display = 'none'; 
        }
        
        function openVoters(title, html) { 
            document.getElementById('vTitle').innerText = title; 
            document.getElementById('vListContent').innerHTML = html; 
            document.getElementById('voters-overlay').style.display = 'block'; 
        }

        function closeVoters() { 
            document.getElementById('voters-overlay').style.display = 'none'; 
        }

        function showOnlineList() {
            const el = document.getElementById('online-overlay');
            if(el.style.display === 'block') {
                closeOnline();
            } else {
                const names = Object.values(onlineUsers).map(function(u) {
                    return '<div class="pop-row"><span>' + (u.name || 'Аноним') + '</span></div>';
                }).join('');
                document.getElementById('onlineNamesBox').innerHTML = names || "В сети никого нет";
                el.style.display = 'block';
            }
        }

        function closeOnline() { 
            document.getElementById('online-overlay').style.display = 'none'; 
        }

        function showError(text) {
            document.getElementById('errorDisplay').innerText = text;
            document.getElementById('error-overlay').style.display = 'block';
            // Окно стоит 10 секунд (Красная зона)
            setTimeout(closeError, 10000); 
        }

        function closeError() { 
            document.getElementById('error-overlay').style.display = 'none'; 
        }

        function showLotDetails(id, name, voters) {
            if(!voters) {
                openVoters("ЛОТ: " + name.toUpperCase(), "<div class='pop-row'>Пока голосов нет</div>");
            } else {
                const html = Object.entries(voters).map(function(item) {
                    const uid = item[0];
                    const username = item[1];
                    return '<div class="pop-row">' +
                        '<span>' + username + '</span>' +
                        '<i class="fas fa-user-slash mini-ban-btn" onclick="askBanUser(\'' + uid + '\', \'' + username + '\')"></i>' +
                    '</div>';
                }).join('');
                openVoters("ЛОТ: " + name.toUpperCase(), html);
            }
        }

        /* ============================================================
           СИНХРОНИЗАЦИЯ С БАЗОЙ ДАННЫХ FIREBASE
           ============================================================ */
        db.ref('lots').on('value', function(snapshot) { 
            const val = snapshot.val();
            data = val ? Object.entries(val) : []; 
            renderAll(); 
        });

        db.ref('bans').on('value', function(snapshot) {
            const list = document.getElementById('banList');
            const bans = snapshot.val() || {};
            list.innerHTML = '';
            Object.entries(bans).forEach(function(item) {
                const uid = item[0];
                const name = item[1];
                list.innerHTML += '<div class="pop-row" style="background-color:#161616; padding:15px; margin-bottom:8px; border-radius:12px; border-left:4px solid var(--red);">' +
                    '<span><b>' + name + '</b> (ID: ' + uid + ')</span>' +
                    '<button style="background-color:var(--red); color:#fff; border:none; padding:8px 16px; border-radius:8px; cursor:pointer; font-size:12px; font-weight: 900;" onclick="db.ref(\'bans/' + uid + '\').remove()">РАЗБАНИТЬ</button>' +
                '</div>';
            });
        });

        db.ref('presence').on('value', function(snapshot) { 
            onlineUsers = snapshot.val() || {}; 
            document.getElementById('onlineCount').innerText = Object.keys(onlineUsers).length; 
        });

        db.ref('auction/rules').once('value', function(snapshot) { 
            if(snapshot.val()) document.getElementById('rulesArea').innerText = snapshot.val(); 
        });

        /* ============================================================
           ЛОГИКА БАНА (С ЗАЩИТОЙ АДМИНИСТРАТОРА)
           ============================================================ */
        function askBanUser(uid, name) {
            // ПРОВЕРКА: ЗАПРЕТ БАНА АДМИНА
            if(uid === 'admin' || name === 'Admin' || !uid || uid === 'undefined') {
                return showError("ОШИБКА: АДМИНА НЕЛЬЗЯ ЗАБАНИТЬ!");
            }
            
            askConfirm("БАН ПОЛЬЗОВАТЕЛЯ", "Вы точно хотите забанить " + name + "? Человек больше не сможет зайти на аукцион.", function() {
                // Отправляем в бан с паролем для правил базы
                db.ref('bans/' + uid).set(name);
                // Также удаляем его метку из voters чтобы не мешал
                db.ref('voters/' + uid).remove();
            });
        }

        /* ============================================================
           СОХРАНЕНИЕ ПРАВИЛ (С ЗАЩИТОЙ ОТ ЛАГОВ)
           ============================================================ */
        let rulesTimer;
        function saveRules() { 
            clearTimeout(rulesTimer); 
            rulesTimer = setTimeout(function() { 
                // Отправляем правила + PASS чтобы Firebase разрешил запись
                db.ref('auction').update({
                    rules: document.getElementById('rulesArea').innerText,
                    pass: PASS
                });
            }, 800); 
        }

        /* ============================================================
           ГЛАВНЫЙ РЕНДЕРИНГ (СПИСКИ АДМИНКИ)
           ============================================================ */
        function renderAll() {
            const wl = document.getElementById('wheelList');
            const al = document.getElementById('aucList');
            const hide = document.getElementById('hideOut').checked;
            
            wl.innerHTML = ''; 
            al.innerHTML = '';
            
            const active = data.filter(function(item) { return item[1].active !== false; });
            const total = active.reduce(function(a, item) { return a + (item[1].votes || 0); }, 0);

            data.forEach(function(item, i) {
                const id = item[0];
                const d = item[1];
                const votes = d.votes || 0;
                const p = total > 0 ? ((votes / total) * 100).toFixed(1) : 0;
                
                // 1. Отрисовка в левом списке (у колеса)
                if(!(d.active === false && hide)) {
                    wl.innerHTML += 
                        '<div class="lot-item ' + (d.active === false ? 'out' : '') + '" style="border-left-color:hsl(' + d.hue + ',70%,50%)">' +
                            '<span style="flex:1; overflow:hidden;">' + d.name + '</span>' +
                            (showPct ? '<span style="color:var(--accent); font-size:11px; margin:0 12px;">' + p + '%</span>' : '') +
                            '<b style="color:#fff;">' + votes + '</b>' +
                        '</div>';
                }

                // 2. Отрисовка в центральном списке (аукцион)
                al.innerHTML += 
                    '<div style="display:flex; flex-direction:column; padding:18px; border-bottom:1px solid #1a1a1a; ' + (d.active === false ? 'opacity:0.3' : '') + '">' +
                        '<div style="display:flex; align-items:center;">' +
                            '<span style="width:35px; color:#444; font-weight: 900;">' + (i + 1) + '</span>' +
                            '<span style="flex:1; font-weight:bold; font-size:16px;">' + d.name + '</span>' +
                            '<span style="color:var(--accent); font-weight:900; margin-right:25px;">' + p + '%</span>' +
                            '<span style="margin-right:20px; cursor:pointer; font-weight: 900;" onclick=\'showLotDetails("' + id + '", "' + d.name + '", ' + JSON.stringify(d.voters || null) + ')\'>' +
                                votes + '<div class="vote-avatar-box"><i class="fas fa-user"></i></div>' +
                            '</span>' +
                            '<i class="fas fa-user-times" title="Бан автора" style="cursor:pointer; color:var(--red); margin-right:15px; font-size: 18px;" onclick="askBanUser(\'' + (d.uid || d.authorId) + '\', \'' + d.author + '\')"></i>' +
                            '<i class="fas fa-trash" title="Удалить лот" style="cursor:pointer; color:#444; font-size: 16px;" onclick="handleDeleteLot(\'' + id + '\')"></i>' +
                        '</div>' +
                        '<div style="font-size:11px; color:#555; padding-left:35px; margin-top:6px; text-transform: uppercase; letter-spacing: 1px;">Автор: <span style="color:#777;">' + (d.author || 'Admin') + '</span></div>' +
                    '</div>';
            });
            drawWheel();
        }

        /* ============================================================
           СИСТЕМА УДАЛЕНИЯ (С РАЗБЛОКИРОВКОЙ ЮЗЕРОВ)
           ============================================================ */
        function handleDeleteLot(id) {
            const isInstant = document.getElementById('instantDelete').checked;
            if(isInstant) { 
                executeLotDelete(id); 
            } else { 
                askConfirm("УДАЛЕНИЕ ЛОТА", "Вы уверены? Лот исчезнет, а люди, которые за него голосовали, смогут проголосовать за другой лот.", function() {
                    executeLotDelete(id);
                }); 
            }
        }

        function executeLotDelete(id) {
            // Удаляем лот из ветки lots
            db.ref('lots/' + id).remove().then(function() {
                // ЧИСТИМ ПАПКУ VOTERS: находим всех, чья запись ссылается на этот лот
                db.ref('voters').once('value', function(snapshot) { 
                    snapshot.forEach(function(child) { 
                        const voterData = child.val();
                        if(voterData.lotId === id || voterData.lot === id) {
                            db.ref('voters/' + child.key).remove(); 
                        }
                    }); 
                });
            });
        }

        /* ============================================================
           ТАЙМЕР (ПОЛНАЯ ПОДДЕРЖКА ДНЕЙ И СИНХРОНИЗАЦИЯ)
           ============================================================ */
        function applyTimer() {
            const d = parseInt(document.getElementById('tDays').value) || 0;
            const h = parseInt(document.getElementById('tHours').value) || 0;
            const m = parseInt(document.getElementById('tMins').value) || 0;
            tSec = (d * 86400) + (h * 3600) + (m * 60); 
            tUpdate();
        }

        function tUpdate() { 
            const d = Math.floor(tSec / 86400);
            const h = Math.floor((tSec % 86400) / 3600);
            const m = Math.floor((tSec % 3600) / 60);
            const s = tSec % 60;
            
            const timeString = String(d).padStart(2,'0') + ":" + String(h).padStart(2,'0') + ":" + String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
            document.getElementById('tDisp').innerText = timeString;
            
            // Отправляем время + PASS для Firebase
            db.ref('auction').update({ 
                timer: tSec, 
                pass: PASS,
                votingClosed: (tSec <= 0 && document.getElementById('lockVoting').checked)
            });
        }

        function tToggle() { 
            const b = document.getElementById('tPlay'); 
            if(tInt) { 
                clearInterval(tInt); 
                tInt = null; 
                b.className = "fas fa-play"; 
            } else { 
                tInt = setInterval(function() { 
                    if(tSec > 0) { 
                        tSec--; 
                        tUpdate(); 
                    } else { 
                        clearInterval(tInt); 
                        tInt = null; 
                        b.className = "fas fa-play"; 
                    } 
                }, 1000); 
                b.className = "fas fa-pause"; 
            } 
        }

        function tMod(v) { 
            tSec = Math.max(0, tSec + v); 
            tUpdate(); 
        }

        function tReset() { 
            tSec = 600; 
            tUpdate(); 
        }

        /* ============================================================
           ЛОГИКА КОЛЕСА (ЭЛИТНАЯ КЛАССИКА VS НОВОЕ)
           ============================================================ */
        function setWType(t) { 
            wType = t; 
            document.getElementById('tNew').classList.toggle('active', t === 'new');
            document.getElementById('tClass').classList.toggle('active', t === 'class');
            drawWheel(); 
        }

        function togglePct() { 
            showPct = !showPct; 
            document.getElementById('pBtn').classList.toggle('active'); 
            renderAll(); 
        }

        function drawWheel() {
            const cvs = document.getElementById('wheelCanvas');
            const ctx = cvs.getContext('2d');
            ctx.clearRect(0, 0, 550, 550);
            
            const active = data.filter(function(item) { return item[1].active !== false; });
            if(active.length === 0) return;
            
            const total = active.reduce(function(a, item) { return a + (item[1].votes || 0); }, 0);
            let curr = rotation;
            
            active.forEach(function(item) {
                const d = item[1];
                const votes = d.votes || 0;
                
                // КЛАССИКА: СЕКТОР ЗАВИСИТ ОТ ЛЮДЕЙ | НОВОЕ: ВСЕМ ПОРОВНУ
                let slice;
                if(wType === 'class') {
                    slice = (votes / (total || 1)) * (Math.PI * 2);
                } else {
                    slice = (Math.PI * 2) / active.length;
                }
                
                ctx.save(); 
                ctx.translate(275, 275); 
                ctx.rotate(curr);
                
                ctx.beginPath(); 
                ctx.moveTo(0, 0); 
                ctx.arc(0, 0, 260, 0, slice);
                ctx.fillStyle = 'hsl(' + d.hue + ', 65%, 45%)'; 
                ctx.fill();
                
                ctx.rotate(slice / 2); 
                ctx.fillStyle = "#ffffff"; 
                ctx.font = "bold 15px sans-serif"; 
                ctx.textAlign = "right";
                
                let nameToShow = d.name;
                if(nameToShow.length > 15) nameToShow = nameToShow.substring(0, 13) + "...";
                ctx.fillText(nameToShow, 240, 5); 
                
                ctx.restore();
                curr += slice;
            });
        }

        function startSpin() {
            const active = data.filter(function(item) { return item[1].active !== false; });
            if(isSpinning || active.length < 2) return;
            
            isSpinning = true; 
            document.getElementById('simpleStatus').innerText = '';
            
            const duration = parseInt(document.getElementById('spinTime').value) * 1000;
            const start = performance.now();
            const power = 40 + Math.random() * 50;
            const startRotation = rotation;
            
            function animate(now) {
                const progress = Math.min((now - start) / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 4);
                rotation = startRotation + power * ease; 
                drawWheel();
                
                if(progress < 1) {
                    requestAnimationFrame(animate);
                } else { 
                    isSpinning = false; 
                    const win = getWin(); 
                    if(win) { 
                        updateStatus(win.name, data.filter(function(i){return i[1].active !== false;}).length === 2); 
                        db.ref('lots/' + win.id).update({ active: false }); 
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        function getWin() {
            const active = data.filter(function(item) { return item[1].active !== false; });
            const total = active.reduce(function(a, item) { return a + (item[1].votes || 0); }, 0);
            
            const normalizedRotation = ((rotation % (Math.PI * 2)) + (Math.PI * 2)) % (Math.PI * 2);
            const targetAngle = (Math.PI * 1.5 - normalizedRotation + (Math.PI * 2)) % (Math.PI * 2);
            
            let accumulatedAngle = 0;
            for(let i = 0; i < active.length; i++) {
                const item = active[i];
                const votes = item[1].votes || 0;
                
                let slice;
                if(wType === 'class') {
                    slice = (votes / (total || 1)) * (Math.PI * 2);
                } else {
                    slice = (Math.PI * 2) / active.length;
                }
                
                if(targetAngle >= accumulatedAngle && targetAngle < accumulatedAngle + slice) {
                    return { id: item[0], name: item[1].name };
                }
                accumulatedAngle += slice;
            }
        }

        function updateStatus(name, isFinal) {
            const st = document.getElementById('simpleStatus'); 
            if(isFinal) {
                st.style.color = "var(--accent)";
                st.innerText = "🏆 ПОБЕДИТЕЛЬ: " + name;
            } else {
                st.style.color = "var(--red)";
                st.innerText = "❌ ВЫБЫЛ: " + name;
            }
            setTimeout(function() { st.innerText = ''; }, 6000);
        }

        /* ============================================================
           ФУНКЦИИ ВВОДА И ВСПОМОГАТЕЛЬНЫЕ ДЕЙСТВИЯ
           ============================================================ */
        function addLot() { 
            const n = document.getElementById('aName').value;
            const v = parseInt(document.getElementById('aVal').value) || 1; 
            if(n) {
                const id = "lot_" + Date.now();
                db.ref('lots/' + id).set({ 
                    id: id, 
                    name: n, 
                    votes: v, 
                    val: v, 
                    hue: Math.floor(Math.random() * 360), 
                    active: true, 
                    author: 'Admin', 
                    uid: 'admin' 
                });
            }
            document.getElementById('aName').value = '';
        }

        function askClearDB() { 
            askConfirm("ПОЛНЫЙ СБРОС", "Вы действительно хотите удалить все лоты и обнулить базу? Это действие нельзя отменить.", function() { 
                db.ref('lots').remove(); 
                db.ref('auction').update({ timer: 600, pass: PASS, rules: "" }); 
            }); 
        }

        function setView(id, btn) { 
            document.querySelectorAll('.view-section').forEach(function(s) { s.classList.remove('active'); }); 
            document.querySelectorAll('.nav-btn').forEach(function(nb) { nb.classList.remove('active'); }); 
            document.getElementById('view-' + id).classList.add('active'); 
            btn.classList.add('active'); 
        }

        function toggleSide() { 
            document.getElementById('sidePanel').classList.toggle('collapsed'); 
            const icon = document.getElementById('sideIcon');
            icon.className = document.getElementById('sidePanel').classList.contains('collapsed') ? "fas fa-chevron-right" : "fas fa-chevron-left"; 
        }

        function updateLock() { 
            db.ref('auction').update({
                lockSettings: document.getElementById('lockVoting').checked,
                pass: PASS
            }); 
        }

        function up(input, type) { 
            if(input.files[0]) { 
                const reader = new FileReader(); 
                reader.onload = function(e) { 
                    if(type === 'bg') {
                        document.getElementById('mainBody').style.backgroundImage = 'url(' + e.target.result + ')'; 
                    } else { 
                        document.getElementById('logoImg').src = e.target.result; 
                        document.getElementById('logoBox').style.display = 'flex'; 
                    } 
                }; 
                reader.readAsDataURL(input.files[0]); 
            }
        }

        // ПЕРВИЧНЫЙ ЗАПУСК ТАЙМЕРА
        tUpdate();
    </script>
</body>
