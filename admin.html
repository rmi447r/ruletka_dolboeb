<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Stream Auction - God Mode ELITE Edition</title>
    <!-- ПОДКЛЮЧЕНИЕ СКРИПТОВ -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* =========================================
           ГЛОБАЛЬНЫЕ СТИЛИ И ПЕРЕМЕННЫЕ
           ========================================= */
        :root { 
            --bg: #0a0a0a; 
            --panel: #111; 
            --accent: #00a2ff; 
            --red: #ff4b4b; 
            --sidebar-w: 60px; 
        }

        body { 
            margin: 0; 
            background-color: var(--bg); 
            color: #efefef; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat;
        }

        /* =========================================
           САЙДБАР (ЛЕВАЯ ЧАСТЬ)
           ========================================= */
        .sidebar { 
            width: var(--sidebar-w); 
            background-color: #000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 20px; 
            border-right: 1px solid #1a1a1a; 
            z-index: 100; 
        }

        .nav-btn { 
            width: 42px; 
            height: 42px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 15px; 
            border-radius: 10px; 
            cursor: pointer; 
            color: #444; 
            transition: all 0.3s ease; 
            background: none; 
            border: none; 
            outline: none;
        }

        .nav-btn.active { 
            color: var(--accent); 
            background-color: rgba(0, 162, 255, 0.1); 
        }

        /* =========================================
           ОСНОВНОЙ КОНТЕНТ ПРИЛОЖЕНИЯ
           ========================================= */
        .app-content { 
            flex-grow: 1; 
            display: flex; 
            position: relative; 
            overflow: hidden; 
        }

        .view-section { 
            display: none; 
            width: 100%; 
            height: 100%; 
        }

        .view-section.active { 
            display: flex; 
        }

        /* ПАНЕЛЬ ЛОТОВ (ВНУТРИ КОЛЕСА) */
        .lots-panel { 
            width: 320px; 
            background-color: rgba(10, 10, 10, 0.95); 
            padding: 20px; 
            border-right: 1px solid #1a1a1a; 
            transition: transform 0.4s ease; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            z-index: 50; 
        }

        .lots-panel.collapsed { 
            transform: translateX(-320px); 
        }

        .toggle-trigger { 
            position: absolute; 
            right: -30px; 
            top: 50%; 
            transform: translateY(-50%); 
            background-color: #1a1a1a; 
            color: var(--accent); 
            width: 30px; 
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            border-radius: 0 8px 8px 0; 
            border: 1px solid #333; 
            z-index: 60; 
        }

        .lot-item { 
            display: flex; 
            align-items: center; 
            padding: 12px; 
            background-color: #161616; 
            border-radius: 8px; 
            margin-bottom: 8px; 
            border-left: 4px solid var(--accent); 
            font-size: 13px; 
        }

        .lot-item.out { 
            opacity: 0.2; 
            text-decoration: line-through; 
            filter: grayscale(1); 
        }

        /* =========================================
           ЗОНА РУЛЕТКИ (КОЛЕСО)
           ========================================= */
        .wheel-zone { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
        }

        #simpleStatus { 
            height: 50px; 
            font-size: 24px; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 10px; 
            letter-spacing: 2px; 
        }

        .marker { 
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent; 
            border-right: 15px solid transparent; 
            border-top: 30px solid var(--red); 
            z-index: 30; 
            margin-bottom: 5px; 
        }
        
        .center-logo-box { 
            position: absolute; 
            width: 85px; 
            height: 85px; 
            background-color: #000; 
            border-radius: 50%; 
            border: 3px solid #222; 
            z-index: 40; 
            display: none; 
            overflow: hidden; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -10%); 
            justify-content: center; 
            align-items: center; 
        }

        .center-logo-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        /* ПАНЕЛЬ УПРАВЛЕНИЯ (ПРАВО) */
        .control-panel { 
            width: 280px; 
            background-color: rgba(14, 14, 14, 0.9); 
            padding: 15px; 
            border-left: 1px solid #1a1a1a; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        .btn-spin { 
            background-color: var(--red); 
            border: none; 
            color: #fff; 
            padding: 18px; 
            border-radius: 10px; 
            font-weight: 900; 
            cursor: pointer; 
            font-size: 18px; 
            text-transform: uppercase;
        }

        /* =========================================
           АУКЦИОННЫЙ ИНТЕРФЕЙС
           ========================================= */
        .auc-container { 
            display: grid; 
            grid-template-columns: 320px 1fr 360px; 
            gap: 20px; 
            padding: 25px; 
            width: 100%; 
            height: calc(100% - 60px); 
            box-sizing: border-box; 
        }

        .auc-footer { 
            height: 60px; 
            background-color: #000; 
            border-top: 1px solid #1a1a1a; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 20px; 
            width: 100%; 
            position: absolute; 
            bottom: 0; 
            box-sizing: border-box; 
        }
        
        .timer-input-group { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 12px; 
        }

        .timer-input-group input { 
            width: 100%; 
            background-color: #000; 
            border: 1px solid #333; 
            color: #fff; 
            padding: 8px; 
            text-align: center; 
            border-radius: 6px; 
            outline: none;
        }

        /* =========================================
           СТЕК ИНТЕРФЕЙСОВ ПРАВОЙ ПАНЕЛИ
           ========================================= */

        /* 1. КРАСНАЯ ЗОНА: ОШИБКИ И БАН (ПОД ТАЙМЕРОМ) */
        #error-overlay { 
            display: none; 
            position: fixed; 
            top: 320px; /* ПЕРЕНЕСЕНО НИЖЕ ПО ФОТО */
            right: 25px; 
            width: 320px; 
            background-color: #111; 
            border: 1px solid var(--red); 
            border-radius: 12px; 
            padding: 20px; 
            z-index: 2500; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
        }

        /* 2. СЕРЕДИНА: ИНФО О ЛОТЕ */
        #voters-overlay { 
            display: none; 
            position: fixed; 
            bottom: 230px; /* МЕЖДУ ОШИБКАМИ И ОНЛАЙНОМ */
            right: 25px; 
            width: 320px; 
            max-height: 300px; 
            background-color: #111; 
            border: 1px solid var(--accent); 
            border-radius: 12px; 
            padding: 20px; 
            z-index: 2400; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            overflow-y: auto; 
        }

        /* 3. СИНЯЯ ЗОНА: ОНЛАЙН (САМЫЙ НИЗ) */
        #online-overlay { 
            display: none; 
            position: fixed; 
            bottom: 85px; 
            right: 25px; 
            width: 320px; 
            background-color: #111; 
            border: 1px solid var(--accent); 
            border-radius: 12px; 
            padding: 20px; 
            z-index: 2300; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
        }

        .pop-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 0; 
            border-bottom: 1px solid #222; 
            font-size: 14px; 
        }

        /* ИКОНКА АВАТАРКИ В СПИСКЕ */
        .vote-avatar-box { 
            background-color: #fff; 
            color: #000; 
            border-radius: 50%; 
            width: 22px; 
            height: 22px; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 10px; 
            margin-left: 8px; 
            vertical-align: middle; 
            font-weight: 900;
        }

        /* МОДАЛКА ЦЕНТРАЛЬНАЯ (ДА/НЕТ) */
        .modal-blur { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.85); 
            z-index: 3000; 
        }

        .confirm-modal { 
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 380px; 
            background-color: #111; 
            border: 1px solid var(--accent); 
            border-radius: 15px; 
            padding: 30px; 
            z-index: 3100; 
            box-shadow: 0 0 60px #000; 
        }

        .modal-btns { 
            display: flex; 
            justify-content: flex-end; 
            margin-top: 25px; 
            gap: 15px; 
        }

        .m-btn { 
            padding: 12px 28px; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            font-weight: 900; 
            text-transform: uppercase; 
            font-size: 13px;
        }

        .m-yes { background-color: var(--red); color: #fff; }
        .m-no { background-color: #222; color: #888; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background-color: #333; border-radius: 10px; }
    </style>
</head>
<body id="mainBody">

    <!-- ЦЕНТРАЛЬНАЯ МОДАЛКА -->
    <div id="modalOverlay" class="modal-blur"></div>
    <div id="confirmModal" class="confirm-modal">
        <h3 id="mTitle" style="margin-top:0; color:var(--accent); letter-spacing:1px; text-transform: uppercase;">ЗАПРОС СИСТЕМЫ</h3>
        <p id="mText" style="color:#bbb; line-height:1.6; font-size:16px;"></p>
        <div class="modal-btns">
            <button class="m-btn m-no" onclick="closeConfirm()">ОТМЕНА</button>
            <button id="mConfirmBtn" class="m-btn m-yes">ДА, ВЫПОЛНИТЬ</button>
        </div>
    </div>

    <!-- 1. ВЕРХНЕЕ ОКНО: ОШИБКИ / БАН (КРАСНАЯ ЗОНА) -->
    <div id="error-overlay">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span style="color:var(--red); font-weight:bold; font-size:11px; letter-spacing:1px; text-transform: uppercase;">УВЕДОМЛЕНИЕ / ОШИБКА</span>
            <i class="fas fa-times" onclick="closeError()" style="cursor:pointer; color:#444;"></i>
        </div>
        <div id="errorDisplay" style="color:#fff; font-size:15px; font-weight:bold; text-transform:uppercase;"></div>
    </div>

    <!-- 2. СРЕДНЕЕ ОКНО: КТО ГОЛОСОВАЛ (ИНФОРМАЦИЯ) -->
    <div id="voters-overlay">
        <div style="display:flex; justify-content:space-between; margin-bottom:12px; border-bottom:1px solid #333; padding-bottom:10px;">
            <span id="vTitle" style="font-size:11px; font-weight:bold; color:var(--accent); text-transform:uppercase;">ИНФОРМАЦИЯ О ГОЛОСАХ</span>
            <i class="fas fa-times" onclick="closeVoters()" style="cursor:pointer; color:#555;"></i>
        </div>
        <div id="vListContent"></div>
    </div>

    <!-- 3. НИЖНЕЕ ОКНО: ОНЛАЙН (СИНЯЯ ЗОНА) -->
    <div id="online-overlay">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom:1px solid #333; padding-bottom:8px;">
            <span style="font-size:11px; font-weight:bold; color:var(--accent); text-transform: uppercase;">ЗРИТЕЛИ В СЕТИ</span>
            <i class="fas fa-times" onclick="closeOnline()" style="cursor:pointer; color:#444;"></i>
        </div>
        <div id="onlineNamesBox" style="font-size:13px; color:#ccc; line-height:1.6; max-height:180px; overflow-y:auto;"></div>
    </div>

    <!-- САЙДБАР С ТВОИМИ ИКОНКАМИ -->
    <aside class="sidebar">
        <button class="nav-btn active" onclick="setView('wheel', this)"><i class="fas fa-home"></i></button>
        <button class="nav-btn" onclick="setView('auc', this)"><i class="fas fa-envelope"></i></button>
        <button class="nav-btn" onclick="setView('vip', this)"><i class="fas fa-user-slash"></i></button>
        <button class="nav-btn" style="margin-top: auto; margin-bottom: 20px;"><i class="fas fa-cog"></i></button>
    </aside>

    <main class="app-content">
        <!-- СЕКЦИЯ: КОЛЕСО -->
        <section id="view-wheel" class="view-section active">
            <div class="lots-panel" id="sidePanel">
                <div class="toggle-trigger" onclick="toggleSide()"><i class="fas fa-chevron-left" id="sideIcon"></i></div>
                <div style="font-size: 10px; color: #444; margin-bottom: 15px; font-weight: bold; text-transform: uppercase;">Участники</div>
                <label style="font-size: 11px; color: #666; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; cursor: pointer;">
                    <input type="checkbox" id="hideOut" onchange="renderAll()"> Скрыть выбывшие
                </label>
                <div id="wheelList" style="flex: 1; overflow-y: auto;"></div>
            </div>

            <div class="wheel-zone">
                <div id="simpleStatus"></div>
                <div class="marker"></div>
                <div class="center-logo-box" id="logoBox"><img id="logoImg" src="" alt=""></div>
                <canvas id="wheelCanvas" width="550" height="550"></canvas>
            </div>

            <div class="control-panel">
                <button class="btn-spin" onclick="startSpin()">КРУТИТЬ</button>
                <div style="font-size: 10px; color: #333; text-transform: uppercase; font-weight: bold; margin-top: 5px;">Время прокрутки (сек)</div>
                <input type="number" id="spinTime" style="background-color:#000; border:1px solid #222; color:#fff; padding:10px; border-radius:6px;" value="5">
                
                <div style="font-size: 10px; color: #333; margin-top: 10px; text-transform: uppercase; font-weight: bold;">Тип рулетки</div>
                <div style="display: flex; gap: 5px;">
                    <button id="tNew" class="nav-btn" style="flex:1; font-size:11px;" onclick="setWType('new')">Новое</button>
                    <button id="tClass" class="nav-btn active" style="flex:1; font-size:11px;" onclick="setWType('class')">Классика</button>
                </div>
                
                <div style="display: flex; gap: 5px; margin-top: 5px;">
                    <button class="nav-btn" style="flex:1; font-size:11px; border:1px solid #222;" onclick="document.getElementById('fBg').click()">ФОН</button>
                    <button class="nav-btn" style="flex:1; font-size:11px; border:1px solid #222;" onclick="document.getElementById('fLogo').click()">ЛОГО</button>
                </div>
                <button onclick="askClearDB()" style="margin-top:auto; background:none; border:1px solid #222; color:#444; padding:12px; border-radius:8px; cursor:pointer; font-size:11px; text-transform: uppercase;">Очистить базу данных</button>
            </div>
        </section>

        <!-- СЕКЦИЯ: АУКЦИОН -->
        <section id="view-auc" class="view-section" style="flex-direction:column;">
            <div class="auc-container">
                <div style="background-color:#111; border-radius:12px; padding:20px; border:1px solid #222;">
                    <h3 style="text-transform: uppercase; letter-spacing: 1px; margin-top: 0;">Правила</h3>
                    <div id="rulesArea" contenteditable="true" style="color:#efefef; min-height:150px; outline:none;" oninput="saveRules()">Текст правил...</div>
                </div>

                <div style="background-color:#111; border-radius:12px; border:1px solid #222; display:flex; flex-direction:column;">
                    <div style="padding:15px; display:flex; gap:10px; border-bottom:1px solid #222; background-color: #161616;">
                        <input type="text" id="aName" placeholder="Название лота..." style="flex:1; background-color:#000; border:1px solid #333; color:#fff; padding:10px;">
                        <input type="number" id="aVal" value="1" style="width:70px; background-color:#000; border:1px solid #333; color:#fff; padding:10px;">
                        <button onclick="addLot()" style="background-color:var(--accent); border:none; color:#fff; padding:0 20px; border-radius:8px; cursor:pointer; font-weight: bold;">+</button>
                    </div>
                    <div id="aucList" style="flex:1; overflow-y:auto;"></div>
                </div>

                <div style="background-color:#1a1a1a; border-radius:12px; padding:25px; text-align:center; height:fit-content; border:1px solid #222;">
                    <div id="tDisp" style="font-size:36px; font-weight:900; margin-bottom:15px; font-family: monospace; letter-spacing: 3px; color: #fff;">00:00:10:00</div>
                    <div class="timer-input-group">
                        <input type="number" id="tDays" placeholder="Дни" value="0">
                        <input type="number" id="tHours" placeholder="Часы" value="0">
                        <input type="number" id="tMins" placeholder="Мин" value="10">
                    </div>
                    <button onclick="applyTimer()" style="width:100%; background-color:#222; border:none; color:#aaa; padding:10px; margin-bottom:15px; border-radius:6px; font-size:12px; cursor:pointer; font-weight: 900; text-transform: uppercase;">Установить время</button>
                    
                    <label style="display:block; margin-bottom:10px; font-size:12px; color:#777; cursor:pointer;"><input type="checkbox" id="lockVoting" onchange="updateLock()"> Блокировать по окончанию</label>
                    
                    <!-- ЗЕЛЕНАЯ ЗОНА: ЧЕКБОКС МГНОВЕННОГО УДАЛЕНИЯ -->
                    <label style="display:block; margin-bottom:15px; font-size:12px; color:var(--red); cursor:pointer; font-weight:bold; text-transform: uppercase;"><input type="checkbox" id="instantDelete"> Мгновенное удаление</label>

                    <div style="display:flex; justify-content:center; gap:25px; font-size:26px; color:#444;">
                        <i id="tPlay" class="fas fa-play" onclick="tToggle()" style="cursor:pointer;"></i>
                        <i class="fas fa-undo" onclick="tReset()" style="cursor:pointer;"></i>
                        <i class="fas fa-plus-circle" onclick="tMod(60)" style="cursor:pointer;"></i>
                        <i class="fas fa-minus-circle" onclick="tMod(-60)" style="cursor:pointer;"></i>
                    </div>
                </div>
            </div>

            <div class="auc-footer">
                <div>
                    <button class="nav-btn" onclick="askClearDB()"><i class="fas fa-trash"></i></button>
                    <button class="nav-btn active" id="pBtn" onclick="togglePct()"><i class="fas fa-percent"></i> %</button>
                </div>
                <!-- КНОПКА ОНЛАЙНА -->
                <div id="onlineCounter" onclick="showOnlineList()" style="cursor:pointer; background-color:rgba(0,162,255,0.1); padding:8px 18px; border-radius:25px; border:1px solid var(--accent);">
                    <i class="fas fa-users" style="color:var(--accent);"></i> <span id="onlineCount" style="font-weight: 900;">0</span>
                </div>
            </div>
        </section>

        <!-- ЧЕРНЫЙ СПИСОК -->
        <section id="view-vip" class="view-section" style="flex-direction:column; padding:40px;">
            <h2 style="color:var(--red); text-transform: uppercase; letter-spacing: 2px;"><i class="fas fa-user-slash"></i> Черный список</h2>
            <div id="banList" style="max-width: 800px; overflow-y: auto;"></div>
        </section>
    </main>

    <script>
        // --- ИНИЦИАЛИЗАЦИЯ ---
        const firebaseConfig = { 
            apiKey: "AIzaSyDhSe5und284GF-eeqGP8l3dOUuazxYwZc", 
            databaseURL: "https://dddd-68b66-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const PASS = 'rekrut_1_mmemnto_mori_001_index_0';
        let data = [], isSpinning = false, rotation = 0, showPct = true, wType = 'class';
        let tSec = 600, tInt = null, onlineUsers = {};

        // --- ИНТЕРФЕЙСНЫЕ ФУНКЦИИ (ОКНА) ---
        function askConfirm(title, text, confirmCallback) {
            document.getElementById('mTitle').innerText = title;
            document.getElementById('mText').innerText = text;
            document.getElementById('confirmModal').style.display = 'block';
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('mConfirmBtn').onclick = () => { confirmCallback(); closeConfirm(); };
        }

        function closeConfirm() { 
            document.getElementById('confirmModal').style.display = 'none'; 
            document.getElementById('modalOverlay').style.display = 'none'; 
        }
        
        function openVoters(title, html) { 
            document.getElementById('vTitle').innerText = title; 
            document.getElementById('vListContent').innerHTML = html; 
            document.getElementById('voters-overlay').style.display = 'block'; 
        }

        function closeVoters() { 
            document.getElementById('voters-overlay').style.display = 'none'; 
        }

        function showOnlineList() {
            const el = document.getElementById('online-overlay');
            if(el.style.display === 'block') {
                closeOnline();
            } else {
                const names = Object.values(onlineUsers).map(u => {
                    return `<div class="pop-row"><span>${u.name || 'Аноним'}</span></div>`;
                }).join('');
                document.getElementById('onlineNamesBox').innerHTML = names || "Никого нет в сети";
                el.style.display = 'block';
            }
        }

        function closeOnline() { 
            document.getElementById('online-overlay').style.display = 'none'; 
        }

        function showError(text) {
            document.getElementById('errorDisplay').innerText = text;
            document.getElementById('error-overlay').style.display = 'block';
            // Окно стоит 8 секунд (Красная зона)
            setTimeout(closeError, 8000); 
        }

        function closeError() { 
            document.getElementById('error-overlay').style.display = 'none'; 
        }

        function showLotDetails(id, name, voters) {
            if(!voters) {
                openVoters("ЛОТ: " + name, "<div class='pop-row'>Пока голосов нет</div>");
            } else {
                const html = Object.entries(voters).map(([uid, username]) => `
                    <div class="pop-row">
                        <span>${username}</span>
                        <i class="fas fa-user-slash mini-ban-btn" onclick="askBanUser('${uid}', '${username}')"></i>
                    </div>`).join('');
                openVoters("ЛОТ: " + name, html);
            }
        }

        // --- ЛОГИКА БАЗЫ ---
        db.ref('lots').on('value', s => { 
            data = s.val() ? Object.entries(s.val()) : []; 
            renderAll(); 
        });

        db.ref('bans').on('value', s => {
            const list = document.getElementById('banList'), bans = s.val() || {};
            list.innerHTML = '';
            Object.entries(bans).forEach(([uid, name]) => {
                list.innerHTML += `
                    <div class="pop-row" style="background-color:#161616; padding:15px; margin-bottom:8px; border-radius:10px; border-left:4px solid var(--red);">
                        <span><b>${name}</b> (ID: ${uid})</span>
                        <button style="background-color:var(--red); color:#fff; border:none; padding:8px 15px; border-radius:6px; cursor:pointer; font-size:12px; font-weight: 900;" onclick="db.ref('bans/${uid}').remove()">РАЗБАНИТЬ</button>
                    </div>`;
            });
        });

        db.ref('presence').on('value', s => { 
            onlineUsers = s.val() || {}; 
            document.getElementById('onlineCount').innerText = Object.keys(onlineUsers).length; 
        });

        db.ref('auction/rules').once('value', s => { 
            if(s.val()) document.getElementById('rulesArea').innerText = s.val(); 
        });

        // БАН С ЗАЩИТОЙ
        function askBanUser(uid, name) {
            if(uid === 'admin' || name === 'Admin' || !uid || uid === 'undefined') {
                return showError("АДМИНА НЕЛЬЗЯ ЗАБАНИТЬ!");
            }
            askConfirm("БАН ПОЛЬЗОВАТЕЛЯ", `Забанить ${name}? Человек больше не сможет участвовать.`, () => {
                db.ref('bans/' + uid).set(name);
            });
        }

        let rulesTimer;
        function saveRules() { 
            clearTimeout(rulesTimer); 
            rulesTimer = setTimeout(() => { 
                db.ref('auction/rules').set(document.getElementById('rulesArea').innerText); 
            }, 500); 
        }

        function renderAll() {
            const wl = document.getElementById('wheelList'), al = document.getElementById('aucList'), hide = document.getElementById('hideOut').checked;
            wl.innerHTML = ''; 
            al.innerHTML = '';
            
            const active = data.filter(([id,d]) => d.active !== false);
            const total = active.reduce((a, [id,d]) => a + (d.votes || 0), 0);

            data.forEach(([id, d], i) => {
                const votes = d.votes || 0;
                const p = total > 0 ? ((votes/total)*100).toFixed(1) : 0;
                
                // Рендер для списка колеса (слева)
                if(!(d.active === false && hide)) {
                    wl.innerHTML += `
                        <div class="lot-item ${d.active === false ? 'out' : ''}" style="border-left-color:hsl(${d.hue},70%,50%)">
                            <span style="flex:1; overflow:hidden;">${d.name}</span>
                            ${showPct ? `<span style="color:var(--accent); font-size:11px; margin:0 10px;">${p}%</span>` : ''}
                            <b style="color:#fff;">${votes}</b>
                        </div>`;
                }

                // Рендер для списка аукциона (центр)
                al.innerHTML += `
                    <div style="display:flex; flex-direction:column; padding:15px; border-bottom:1px solid #1a1a1a; ${d.active === false ?'opacity:0.3':''}">
                        <div style="display:flex; align-items:center;">
                            <span style="width:35px; color:#444; font-weight: 900;">${i+1}</span>
                            <span style="flex:1; font-weight:bold; font-size:16px;">${d.name}</span>
                            <span style="color:var(--accent); font-weight:900; margin-right:20px;">${p}%</span>
                            <span style="margin-right:20px; cursor:pointer; font-weight: 900;" onclick='showLotDetails("${id}", "${d.name}", ${JSON.stringify(d.voters || null)})'>
                                ${votes} <div class="vote-avatar-box"><i class="fas fa-user"></i></div>
                            </span>
                            <i class="fas fa-user-times" title="Бан" style="cursor:pointer; color:var(--red); margin-right:15px; font-size: 18px;" onclick="askBanUser('${d.uid || d.authorId}', '${d.author}')"></i>
                            <i class="fas fa-trash" style="cursor:pointer; color:#444; font-size: 16px;" onclick="handleDeleteLot('${id}')"></i>
                        </div>
                        <div style="font-size:11px; color:#444; padding-left:35px; margin-top:5px; text-transform: uppercase; letter-spacing: 1px;">Автор: <span style="color:#777;">${d.author || 'Admin'}</span></div>
                    </div>`;
            });
            drawWheel();
        }

        // УДАЛЕНИЕ С РАЗБЛОКИРОВКОЙ ЮЗЕРОВ
        function handleDeleteLot(id) {
            const isInstant = document.getElementById('instantDelete').checked;
            if(isInstant) { 
                executeLotDelete(id); 
            } else { 
                askConfirm("УДАЛЕНИЕ ЛОТА", "Удалить этот лот? Все голоса вернутся людям, и они смогут переголосовать.", () => {
                    executeLotDelete(id);
                }); 
            }
        }

        function executeLotDelete(id) {
            db.ref('lots/' + id).remove().then(() => {
                // Разблокируем юзеров в папке voters
                db.ref('voters').once('value', s => { 
                    s.forEach(v => { 
                        if(v.val().lotId === id || v.val().lot === id) {
                            db.ref('voters/' + v.key).remove(); 
                        }
                    }); 
                });
            });
        }

        // --- ТАЙМЕР (ПОЛНЫЙ ЦИКЛ С ДНЯМИ) ---
        function applyTimer() {
            const d = parseInt(document.getElementById('tDays').value) || 0;
            const h = parseInt(document.getElementById('tHours').value) || 0;
            const m = parseInt(document.getElementById('tMins').value) || 0;
            tSec = (d * 86400) + (h * 3600) + (m * 60); 
            tUpdate();
        }

        function tUpdate() { 
            const d = Math.floor(tSec / 86400);
            const h = Math.floor((tSec % 86400) / 3600);
            const m = Math.floor((tSec % 3600) / 60);
            const s = tSec % 60;
            document.getElementById('tDisp').innerText = `${String(d).padStart(2,'0')}:${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            db.ref('auction').update({ timer: tSec, pass: PASS });
            db.ref('auction/votingClosed').set(tSec <= 0 && document.getElementById('lockVoting').checked);
        }

        function tToggle() { 
            const b = document.getElementById('tPlay'); 
            if(tInt) { 
                clearInterval(tInt); tInt = null; b.className = "fas fa-play"; 
            } else { 
                tInt = setInterval(() => { 
                    if(tSec > 0) { tSec--; tUpdate(); } 
                    else { clearInterval(tInt); tInt = null; b.className = "fas fa-play"; } 
                }, 1000); 
                b.className = "fas fa-pause"; 
            } 
        }

        function tMod(v) { tSec = Math.max(0, tSec + v); tUpdate(); }
        function tReset() { tSec = 600; tUpdate(); }

        // --- ЛОГИКА КОЛЕСА (ЭЛИТНАЯ КЛАССИКА) ---
        function setWType(t) { 
            wType = t; 
            document.getElementById('tNew').classList.toggle('active', t === 'new');
            document.getElementById('tClass').classList.toggle('active', t === 'class');
            drawWheel(); 
        }

        function togglePct() { 
            showPct = !showPct; 
            document.getElementById('pBtn').classList.toggle('active'); 
            renderAll(); 
        }

        function drawWheel() {
            const cvs = document.getElementById('wheelCanvas'), ctx = cvs.getContext('2d');
            ctx.clearRect(0, 0, 550, 550);
            const active = data.filter(([id,d]) => d.active !== false);
            if(!active.length) return;
            const total = active.reduce((a, [id,d]) => a + (d.votes || 0), 0);
            let curr = rotation;
            active.forEach(([id, d], i) => {
                const votes = d.votes || 0;
                // КЛАССИКА = ПО ВЕСУ ЛЮДЕЙ, НОВОЕ = ВСЕМ ПОРОВНУ
                const slice = wType === 'class' ? (votes/total) * (Math.PI*2) : (Math.PI*2) / active.length;
                ctx.save(); 
                ctx.translate(275, 275); 
                ctx.rotate(curr);
                ctx.beginPath(); 
                ctx.moveTo(0, 0); 
                ctx.arc(0, 0, 260, 0, slice);
                ctx.fillStyle = `hsl(${d.hue}, 65%, 45%)`; 
                ctx.fill();
                ctx.rotate(slice/2); 
                ctx.fillStyle = "#fff"; 
                ctx.font = "bold 14px sans-serif"; 
                ctx.textAlign = "right";
                ctx.fillText(d.name.length > 16 ? d.name.substring(0, 14) + '...' : d.name, 240, 5); 
                ctx.restore();
                curr += slice;
            });
        }

        function startSpin() {
            const active = data.filter(([id,d]) => d.active !== false);
            if(isSpinning || active.length < 2) return;
            isSpinning = true; 
            document.getElementById('simpleStatus').innerText = '';
            const dur = parseInt(document.getElementById('spinTime').value) * 1000;
            const start = performance.now();
            const pwr = 35 + Math.random() * 40;
            const sRot = rotation;
            function anim(now) {
                const p = Math.min((now - start) / dur, 1);
                const ease = 1 - Math.pow(1 - p, 4);
                rotation = sRot + pwr * ease; 
                drawWheel();
                if(p < 1) requestAnimationFrame(anim);
                else { 
                    isSpinning = false; 
                    const win = getWin(); 
                    if(win) { 
                        updateStatus(win.name, data.filter(d => d[1].active !== false).length === 2); 
                        db.ref('lots/' + win.id).update({ active: false }); 
                    }
                }
            }
            requestAnimationFrame(anim);
        }

        function getWin() {
            const active = data.filter(([id,d]) => d.active !== false);
            const total = active.reduce((a, [id,d]) => a + (d.votes || 0), 0);
            const target = (Math.PI*1.5 - (rotation % (Math.PI*2)) + (Math.PI*4)) % (Math.PI*2);
            let cur = 0;
            for(const [id, d] of active) {
                const votes = d.votes || 0;
                const slice = wType === 'class' ? (votes/total) * (Math.PI*2) : (Math.PI*2) / active.length;
                if(target >= cur && target < cur + slice) return { id, name: d.name };
                cur += slice;
            }
        }

        function updateStatus(name, isFinal) {
            const st = document.getElementById('simpleStatus'); 
            st.style.color = isFinal ? "var(--accent)" : "var(--red)";
            st.innerText = isFinal ? "🏆 ПОБЕДИТЕЛЬ: " + name : "❌ ВЫБЫЛ: " + name;
            setTimeout(() => { st.innerText = ''; }, 5000);
        }

        function addLot() { 
            const n = document.getElementById('aName').value;
            const v = parseInt(document.getElementById('aVal').value) || 1; 
            if(n) {
                const id = "lot_" + Date.now();
                db.ref('lots/' + id).set({ 
                    id: id, name: n, votes: v, val: v, hue: Math.random() * 360, 
                    active: true, author: 'Admin', uid: 'admin' 
                });
            }
            document.getElementById('aName').value = '';
        }

        function askClearDB() { 
            askConfirm("СБРОС БАЗЫ", "ВНИМАНИЕ! Это полностью удалит все лоты и правила. Вы уверены?", () => { 
                db.ref('lots').remove(); 
                db.ref('auction').update({ timer: 600, pass: PASS, rules: "" }); 
            }); 
        }

        function setView(id, b) { 
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active')); 
            document.querySelectorAll('.nav-btn').forEach(nb => nb.classList.remove('active')); 
            document.getElementById('view-' + id).classList.add('active'); 
            b.classList.add('active'); 
        }

        function toggleSide() { 
            document.getElementById('sidePanel').classList.toggle('collapsed'); 
            document.getElementById('sideIcon').className = document.getElementById('sidePanel').classList.contains('collapsed') ? "fas fa-chevron-right" : "fas fa-chevron-left"; 
        }

        function updateLock() { 
            db.ref('auction/lockSettings').set(document.getElementById('lockVoting').checked); 
        }

        function up(i, t) { 
            if(i.files[0]) { 
                const r = new FileReader(); 
                r.onload = e => { 
                    if(t === 'bg') document.getElementById('mainBody').style.backgroundImage = `url(${e.target.result})`; 
                    else { 
                        document.getElementById('logoImg').src = e.target.result; 
                        document.getElementById('logoBox').style.display = 'flex'; 
                    } 
                }; 
                r.readAsDataURL(i.files[0]); 
            }
        }

        tUpdate();
    </script>
</body>
</html>
