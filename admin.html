<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Stream Auction - Final Pro Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ОСНОВНЫЕ ПЕРЕМЕННЫЕ */
        :root { 
            --bg: #0a0a0a; 
            --panel: #111; 
            --accent: #00a2ff; 
            --red: #ff4b4b; 
            --sidebar-w: 60px; 
        }

        body { 
            margin: 0; 
            background: var(--bg); 
            color: #efefef; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            background-size: cover; 
            background-position: center; 
        }

        /* САЙДБАР ЛЕВО */
        .sidebar { 
            width: var(--sidebar-w); 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 20px; 
            border-right: 1px solid #1a1a1a; 
            z-index: 100; 
        }

        .nav-btn { 
            width: 42px; 
            height: 42px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 15px; 
            border-radius: 10px; 
            cursor: pointer; 
            color: #444; 
            transition: 0.3s; 
            background: none; 
            border: none; 
        }

        .nav-btn.active { 
            color: var(--accent); 
            background: rgba(0, 162, 255, 0.1); 
        }

        /* КОНТЕНТ ПРИЛОЖЕНИЯ */
        .app-content { 
            flex-grow: 1; 
            display: flex; 
            position: relative; 
            overflow: hidden; 
        }

        .view-section { 
            display: none; 
            width: 100%; 
            height: 100%; 
        }

        .view-section.active { 
            display: flex; 
        }

        /* ПАНЕЛЬ ЛОТОВ (КОЛЕСО) */
        .lots-panel { 
            width: 320px; 
            background: rgba(10,10,10,0.95); 
            padding: 20px; 
            border-right: 1px solid #1a1a1a; 
            transition: transform 0.4s ease; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            z-index: 50; 
        }

        .lots-panel.collapsed { 
            transform: translateX(-320px); 
        }

        .toggle-trigger { 
            position: absolute; 
            right: -30px; 
            top: 50%; 
            transform: translateY(-50%); 
            background: #1a1a1a; 
            color: var(--accent); 
            width: 30px; 
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            border-radius: 0 8px 8px 0; 
            border: 1px solid #333; 
            z-index: 60; 
        }

        .lot-item { 
            display: flex; 
            align-items: center; 
            padding: 10px; 
            background: #161616; 
            border-radius: 6px; 
            margin-bottom: 6px; 
            border-left: 3px solid var(--accent); 
            font-size: 13px; 
        }

        .lot-item.out { 
            opacity: 0.2; 
            text-decoration: line-through; 
            filter: grayscale(1); 
        }

        /* КОЛЕСО ЦЕНТР */
        .wheel-zone { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
        }

        #simpleStatus { 
            height: 40px; 
            font-size: 22px; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin-bottom: 10px; 
            letter-spacing: 1px; 
        }

        .marker { 
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent; 
            border-right: 15px solid transparent; 
            border-top: 30px solid var(--red); 
            z-index: 30; 
            margin-bottom: 5px; 
        }
        
        .center-logo-box { 
            position: absolute; 
            width: 85px; 
            height: 85px; 
            background: #000; 
            border-radius: 50%; 
            border: 3px solid #222; 
            z-index: 40; 
            display: none; 
            overflow: hidden; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -10%); 
            justify-content: center; 
            align-items: center; 
        }

        .center-logo-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        /* УПРАВЛЕНИЕ ПРАВО */
        .control-panel { 
            width: 280px; 
            background: rgba(14,14,14,0.9); 
            padding: 15px; 
            border-left: 1px solid #1a1a1a; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }

        .btn-spin { 
            background: var(--red); 
            border: none; 
            color: #fff; 
            padding: 15px; 
            border-radius: 8px; 
            font-weight: 900; 
            cursor: pointer; 
            font-size: 16px; 
        }

        /* АУКЦИОН КОНТЕЙНЕРЫ */
        .auc-container { 
            display: grid; 
            grid-template-columns: 300px 1fr 340px; 
            gap: 15px; 
            padding: 20px; 
            width: 100%; 
            height: calc(100% - 60px); 
            box-sizing: border-box; 
        }

        .auc-footer { 
            height: 60px; 
            background: #000; 
            border-top: 1px solid #1a1a1a; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 20px; 
            width: 100%; 
            position: absolute; 
            bottom: 0; 
            box-sizing: border-box; 
        }
        
        .timer-input-group { 
            display: flex; 
            gap: 5px; 
            margin-bottom: 10px; 
        }

        .timer-input-group input { 
            width: 100%; 
            background: #000; 
            border: 1px solid #333; 
            color: #fff; 
            padding: 5px; 
            text-align: center; 
            border-radius: 4px; 
        }

        /* КАСТОМНЫЕ ОКНА (ВМЕСТО АЛЕРТОВ) */
        .modal-overlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.85); 
            z-index: 2000; 
        }

        .custom-modal { 
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 340px; 
            background: #111; 
            border: 1px solid var(--accent); 
            border-radius: 15px; 
            padding: 25px; 
            z-index: 2100; 
            box-shadow: 0 0 50px rgba(0,0,0,1); 
        }

        .modal-btn-row { 
            display: flex; 
            justify-content: flex-end; 
            margin-top: 20px; 
            gap: 10px; 
        }

        .m-btn { 
            padding: 10px 20px; 
            border-radius: 6px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase; 
        }

        .m-confirm { background: var(--red); color: #fff; }
        .m-cancel { background: #222; color: #777; }

        /* ИНТЕРФЕЙСНЫЕ ПОПАПЫ (ОНЛАЙН, ГОЛОСА, ОШИБКИ) */
        #popup-window { 
            display: none; 
            position: fixed; 
            bottom: 160px; /* Красная зона - поднял выше онлайна */
            right: 25px; 
            width: 280px; 
            max-height: 380px; 
            background: #111; 
            border: 1px solid var(--accent); 
            border-radius: 12px; 
            padding: 15px; 
            z-index: 1000; 
            box-shadow: 0 0 30px #000; 
            overflow-y: auto; 
        }

        #error-popup { 
            display: none; 
            position: fixed; 
            bottom: 300px; /* Желтая зона - еще выше */
            right: 25px; 
            width: 280px; 
            background: #111; 
            border: 1px solid var(--red); 
            border-radius: 10px; 
            padding: 15px; 
            z-index: 1001; 
            box-shadow: 0 0 30px #000; 
        }

        .pop-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 8px 0; 
            border-bottom: 1px solid #222; 
            font-size: 13px; 
        }

        /* ИКОНКА АВАТАРКИ */
        .user-avatar-small { 
            background: #fff; 
            color: #000; 
            border-radius: 50%; 
            width: 18px; 
            height: 18px; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 10px; 
            margin-left: 6px; 
            vertical-align: middle; 
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body id="mainBody">

    <!-- МОДАЛКА (ЦЕНТР) -->
    <div id="modalOverlay" class="modal-overlay"></div>
    <div id="confirmModal" class="custom-modal">
        <h3 id="modalTitle" style="margin-top:0; color:var(--accent); letter-spacing:1px;">СИСТЕМА</h3>
        <p id="modalText" style="color:#aaa; line-height:1.4;"></p>
        <div class="modal-btn-row">
            <button class="m-btn m-cancel" onclick="closeModal()">ОТМЕНА</button>
            <button id="modalConfirmBtn" class="m-btn m-confirm">ДА</button>
        </div>
    </div>

    <!-- ПОПАП ОШИБКИ (ВЕРХ) -->
    <div id="error-popup">
        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
            <span style="color:var(--red); font-weight:bold; font-size:11px;">ОШИБКА</span>
            <i class="fas fa-times" onclick="closeError()" style="cursor:pointer; color:#444;"></i>
        </div>
        <div id="errorText" style="color:#fff; font-size:14px; font-weight:bold;"></div>
    </div>

    <!-- ПОПАП ИНФО (СЕРЕДИНА) -->
    <div id="popup-window">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #333; padding-bottom:8px;">
            <span id="popupTitle" style="font-size:11px; font-weight:bold; color:var(--accent); text-transform:uppercase;">ДАННЫЕ</span>
            <i class="fas fa-times" onclick="closePopup()" style="cursor:pointer; color:#444;"></i>
        </div>
        <div id="popupContent"></div>
    </div>

    <aside class="sidebar">
        <button class="nav-btn active" onclick="setView('wheel', this)"><i class="fas fa-home"></i></button>
        <button class="nav-btn" onclick="setView('auc', this)"><i class="fas fa-envelope"></i></button>
        <button class="nav-btn" onclick="setView('vip', this)"><i class="fas fa-user-slash"></i></button>
        <button class="nav-btn" style="margin-top: auto; margin-bottom: 20px;"><i class="fas fa-cog"></i></button>
    </aside>

    <main class="app-content">
        <section id="view-wheel" class="view-section active">
            <div class="lots-panel" id="sidePanel">
                <div class="toggle-trigger" onclick="toggleSide()"><i class="fas fa-chevron-left" id="sideIcon"></i></div>
                <div style="font-size: 10px; color: #444; margin-bottom: 15px; font-weight: bold;">УЧАСТНИКИ</div>
                <label style="font-size: 11px; color: #666; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; cursor: pointer;">
                    <input type="checkbox" id="hideOut" onchange="renderAll()"> Скрыть выбывшие
                </label>
                <div id="wheelList" style="flex: 1; overflow-y: auto;"></div>
            </div>

            <div class="wheel-zone">
                <div id="simpleStatus"></div>
                <div class="marker"></div>
                <div class="center-logo-box" id="logoBox"><img id="logoImg" src="" alt=""></div>
                <canvas id="wheelCanvas" width="550" height="550"></canvas>
            </div>

            <div class="control-panel">
                <button class="btn-spin" onclick="startSpin()">КРУТИТЬ</button>
                <div style="font-size: 10px; color: #333;">ВРЕМЯ (СЕК)</div>
                <input type="number" id="spinTime" style="background:#000; border:1px solid #222; color:#fff; padding:8px; border-radius:5px;" value="5">
                
                <div style="font-size: 10px; color: #333; margin-top: 10px;">ТИП КОЛЕСА</div>
                <div style="display: flex; gap: 5px;">
                    <button id="tNew" class="nav-btn" style="flex:1; font-size:11px;" onclick="setWType('new')">Новое</button>
                    <button id="tClass" class="nav-btn active" style="flex:1; font-size:11px;" onclick="setWType('class')">Классика</button>
                </div>
                
                <div style="display: flex; gap: 5px;">
                    <button class="nav-btn" style="flex:1; font-size:11px; border:1px solid #222;" onclick="document.getElementById('fBg').click()">ФОН</button>
                    <button class="nav-btn" style="flex:1; font-size:11px; border:1px solid #222;" onclick="document.getElementById('fLogo').click()">ЛОГО</button>
                </div>
                <button onclick="askClearDB()" style="margin-top:auto; background:none; border:1px solid #222; color:#444; padding:10px; border-radius:6px; cursor:pointer; font-size:11px;">ОЧИСТИТЬ БАЗУ</button>
            </div>
        </section>

        <section id="view-auc" class="view-section" style="flex-direction:column;">
            <div class="auc-container">
                <div style="background:#111; border-radius:12px; padding:20px; border:1px solid #222;">
                    <h3>Правила</h3>
                    <div id="rulesArea" contenteditable="true" style="color:#efefef; min-height:100px; outline:none;" oninput="saveRules()">Текст правил...</div>
                </div>

                <div style="background:#111; border-radius:12px; border:1px solid #222; display:flex; flex-direction:column;">
                    <div style="padding:15px; display:flex; gap:10px; border-bottom:1px solid #222;">
                        <input type="text" id="aName" placeholder="Лот..." style="flex:1; background:#000; border:1px solid #333; color:#fff; padding:8px;">
                        <input type="number" id="aVal" value="1" style="width:70px; background:#000; border:1px solid #333; color:#fff; padding:8px;">
                        <button onclick="addLot()" style="background:var(--accent); border:none; color:#fff; padding:0 15px; border-radius:5px;">+</button>
                    </div>
                    <div id="aucList" style="flex:1; overflow-y:auto;"></div>
                </div>

                <div style="background:#1a1a1a; border-radius:12px; padding:25px; text-align:center; height:fit-content; border:1px solid #222;">
                    <div id="tDisp" style="font-size:32px; font-weight:bold; margin-bottom:15px; font-family: monospace;">00:00:10:00</div>
                    <div class="timer-input-group">
                        <input type="number" id="tDays" placeholder="Дни" value="0">
                        <input type="number" id="tHours" placeholder="Часы" value="0">
                        <input type="number" id="tMins" placeholder="Мин" value="10">
                    </div>
                    <button onclick="applyTimer()" style="width:100%; background:#222; border:none; color:#aaa; padding:8px; margin-bottom:15px; border-radius:4px; font-size:11px; cursor:pointer;">УСТАНОВИТЬ ВРЕМЯ</button>
                    <label style="display:block; margin-bottom:15px; font-size:12px; color:var(--red); cursor:pointer;"><input type="checkbox" id="lockVoting" onchange="updateLock()"> Блокировать по окончанию</label>
                    <div style="display:flex; justify-content:center; gap:20px; font-size:24px; color:#444;">
                        <i id="tPlay" class="fas fa-play" onclick="tToggle()" style="cursor:pointer;"></i>
                        <i class="fas fa-undo" onclick="tReset()" style="cursor:pointer;"></i>
                        <i class="fas fa-caret-up" onclick="tMod(60)" style="cursor:pointer;"></i>
                        <i class="fas fa-caret-down" onclick="tMod(-60)" style="cursor:pointer;"></i>
                    </div>
                </div>
            </div>

            <div class="auc-footer">
                <div>
                    <button class="nav-btn" onclick="askClearDB()"><i class="fas fa-trash"></i></button>
                    <button class="nav-btn active" id="pBtn" onclick="togglePct()"><i class="fas fa-percent"></i> %</button>
                </div>
                <div id="onlineCounter" onclick="showOnlineList()" style="cursor:pointer; background:rgba(0,162,255,0.1); padding:5px 15px; border-radius:20px; border:1px solid var(--accent);">
                    <i class="fas fa-users" style="color:var(--accent);"></i> <span id="onlineCount">0</span>
                </div>
            </div>
        </section>

        <section id="view-vip" class="view-section" style="flex-direction:column; padding:40px;">
            <h2 style="color:var(--red);"><i class="fas fa-user-slash"></i> ЧЕРНЫЙ СПИСОК</h2>
            <div id="banList" style="max-width: 600px; overflow-y: auto;"></div>
        </section>

        <input type="file" id="fBg" hidden onchange="up(this,'bg')">
        <input type="file" id="fLogo" hidden onchange="up(this,'logo')">
    </main>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDhSe5und284GF-eeqGP8l3dOUuazxYwZc", databaseURL: "https://dddd-68b66-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const PASS = 'rekrut_1_mmemnto_mori_001_index_0';
        let data = [], isSpinning = false, rotation = 0, showPct = true, wType = 'class';
        let tSec = 600, tInt = null, onlineUsers = {};

        // --- ФУНКЦИИ ИНТЕРФЕЙСА ---
        function showModal(title, text, confirmCallback) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            document.getElementById('confirmModal').style.display = 'block';
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('modalConfirmBtn').onclick = () => { confirmCallback(); closeModal(); };
        }
        function closeModal() { document.getElementById('confirmModal').style.display = 'none'; document.getElementById('modalOverlay').style.display = 'none'; }
        
        function openPopup(title, html) { 
            document.getElementById('popupTitle').innerText = title; 
            document.getElementById('popupContent').innerHTML = html; 
            document.getElementById('popup-window').style.display = 'block'; 
        }
        function closePopup() { document.getElementById('popup-window').style.display = 'none'; }

        function showError(text) {
            document.getElementById('errorText').innerText = text;
            document.getElementById('error-popup').style.display = 'block';
            setTimeout(closeError, 4000);
        }
        function closeError() { document.getElementById('error-popup').style.display = 'none'; }

        function setView(id, b) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(nb => nb.classList.remove('active'));
            document.getElementById('view-'+id).classList.add('active'); 
            b.classList.add('active');
        }

        function toggleSide() {
            const p = document.getElementById('sidePanel'); p.classList.toggle('collapsed');
            document.getElementById('sideIcon').className = p.classList.contains('collapsed') ? "fas fa-chevron-right" : "fas fa-chevron-left";
        }

        // --- ЛОГИКА БАЗЫ ---
        db.ref('lots').on('value', s => { data = s.val() ? Object.entries(s.val()) : []; renderAll(); });
        db.ref('bans').on('value', s => {
            const list = document.getElementById('banList'), bans = s.val() || {};
            list.innerHTML = '';
            Object.entries(bans).forEach(([uid, name]) => {
                list.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; background:#161616; padding:12px; margin-bottom:6px; border-radius:8px; border-left:3px solid var(--red);">
                    <span><b>${name}</b> (ID: ${uid})</span>
                    <button style="background:var(--red); color:#fff; border:none; padding:6px 12px; border-radius:5px; cursor:pointer; font-size:11px;" onclick="db.ref('bans/${uid}').remove()">РАЗБАНИТЬ</button>
                </div>`;
            });
        });
        db.ref('presence').on('value', s => { onlineUsers = s.val() || {}; document.getElementById('onlineCount').innerText = Object.keys(onlineUsers).length; });
        db.ref('auction/rules').once('value', s => { if(s.val()) document.getElementById('rulesArea').innerText = s.val(); });

        function showOnlineList() {
            const names = Object.values(onlineUsers).map(u => `<div class="pop-row"><span>${u.name || 'Аноним'}</span></div>`).join('');
            openPopup("СЕЙЧАС ОНЛАЙН", names || "Никого нет в сети");
        }

        // БАН С ПРОВЕРКОЙ АДМИНА
        function askBan(uid, name) {
            if(uid === 'admin' || name === 'Admin' || uid === 'undefined') {
                return showError("АДМИНА НЕЛЬЗЯ ЗАБАНИТЬ!");
            }
            showModal("БАН ПОЛЬЗОВАТЕЛЯ", `Вы точно хотите забанить ${name}? Это заблокирует его навсегда.`, () => {
                db.ref('bans/' + uid).set(name);
            });
        }

        function showLotVoters(id, name, voters) {
            if(!voters) return openPopup("ГОЛОСОВАЛИ ЗА " + name, "Пока никто не голосовал");
            const html = Object.entries(voters).map(([uid, username]) => `
                <div class="pop-row">
                    <span>${username}</span>
                    <i class="fas fa-user-slash mini-ban-btn" onclick="askBan('${uid}', '${username}')"></i>
                </div>`).join('');
            openPopup("ГОЛОСОВАЛИ ЗА " + name, html);
        }

        let rulesTimer;
        function saveRules() { clearTimeout(rulesTimer); rulesTimer = setTimeout(() => { db.ref('auction/rules').set(document.getElementById('rulesArea').innerText); }, 500); }

        function renderAll() {
            const wl = document.getElementById('wheelList'), al = document.getElementById('aucList'), hide = document.getElementById('hideOut').checked;
            wl.innerHTML = ''; al.innerHTML = '';
            const active = data.filter(([id,d]) => d.active !== false);
            const total = active.reduce((a,[id,d]) => a + (d.votes || d.val || 0), 0);

            data.forEach(([id, d], i) => {
                const votes = d.votes || d.val || 0;
                const p = total > 0 ? ((votes/total)*100).toFixed(1) : 0;
                if(!(d.active === false && hide)) {
                    wl.innerHTML += `<div class="lot-item ${d.active === false ? 'out' : ''}" style="border-left-color:hsl(${d.hue},70%,50%)">
                        <span style="flex:1; overflow:hidden;">${d.name}</span>
                        ${showPct ? `<span style="color:var(--accent); font-size:10px; margin:0 10px;">${p}%</span>` : ''}
                        <b>${votes}</b>
                    </div>`;
                }
                al.innerHTML += `<div style="display:flex; flex-direction:column; padding:12px; border-bottom:1px solid #1a1a1a; ${d.active === false ?'opacity:0.3':''}">
                    <div style="display:flex; align-items:center;">
                        <span style="width:30px; color:#333;">${i+1}</span>
                        <span style="flex:1; font-weight:bold;">${d.name}</span>
                        <span style="color:var(--accent); font-weight:bold; margin-right:15px;">${p}%</span>
                        <span style="margin-right:15px; cursor:pointer;" onclick='showLotVoters("${id}", "${d.name}", ${JSON.stringify(d.voters || null)})'>
                            ${votes} <div class="user-avatar-small"><i class="fas fa-user"></i></div>
                        </span>
                        <i class="fas fa-user-times" title="Бан" style="cursor:pointer; color:var(--red); margin-right:10px;" onclick="askBan('${d.uid || d.authorId}', '${d.author}')"></i>
                        <i class="fas fa-trash" style="cursor:pointer; color:#444;" onclick="safeDeleteLot('${id}')"></i>
                    </div>
                    <div style="font-size:10px; color:#555; padding-left:30px; margin-top:3px;">Автор: ${d.author || 'Admin'}</div>
                </div>`;
            });
            drawWheel();
        }

        function safeDeleteLot(id) {
            showModal("УДАЛЕНИЕ ЛОТА", "Удалить этот лот? Голоса вернутся пользователям.", () => {
                db.ref('users').once('value', snap => {
                    snap.forEach(u => { if(u.val().votedFor === id) db.ref('users/' + u.key).update({ voted: false, votedFor: null }); });
                    db.ref('lots/' + id).remove();
                });
            });
        }

        // --- ТАЙМЕР (ИСПРАВЛЕН ДЛЯ 3+ ДНЕЙ) ---
        function applyTimer() {
            const d = parseInt(document.getElementById('tDays').value) || 0;
            const h = parseInt(document.getElementById('tHours').value) || 0;
            const m = parseInt(document.getElementById('tMins').value) || 0;
            tSec = (d * 86400) + (h * 3600) + (m * 60); 
            tUpdate();
        }
        function tUpdate() { 
            const d = Math.floor(tSec / 86400);
            const h = Math.floor((tSec % 86400) / 3600);
            const m = Math.floor((tSec % 3600) / 60);
            const s = tSec % 60;
            document.getElementById('tDisp').innerText = `${String(d).padStart(2,'0')}:${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            db.ref('auction').update({ timer: tSec, pass: PASS });
            db.ref('auction/votingClosed').set(tSec <= 0 && document.getElementById('lockVoting').checked);
        }
        function tToggle() { 
            const b=document.getElementById('tPlay'); 
            if(tInt){clearInterval(tInt); tInt=null; b.className="fas fa-play";} 
            else{tInt=setInterval(()=>{if(tSec>0){tSec--; tUpdate();} else { clearInterval(tInt); tInt=null; b.className="fas fa-play"; }},1000); b.className="fas fa-pause";} 
        }
        function tMod(v) { tSec=Math.max(0, tSec+v); tUpdate(); }
        function tReset() { tSec=600; tUpdate(); }

        // --- ЛОГИКА КОЛЕСА (ЭЛИТНАЯ КЛАССИКА) ---
        function setWType(t) { 
            wType = t; 
            document.getElementById('tNew').classList.toggle('active', t==='new');
            document.getElementById('tClass').classList.toggle('active', t==='class');
            drawWheel(); 
        }
        function togglePct() { showPct = !showPct; document.getElementById('pBtn').classList.toggle('active'); renderAll(); }

        function drawWheel() {
            const cvs = document.getElementById('wheelCanvas'), ctx = cvs.getContext('2d');
            ctx.clearRect(0,0,550,550);
            const active = data.filter(([id,d]) => d.active !== false);
            if(!active.length) return;
            const total = active.reduce((a,[id,d]) => a + (d.votes || d.val || 0), 0);
            let curr = rotation;
            active.forEach(([id, d], i) => {
                const votes = d.votes || d.val || 0;
                // КЛАССИКА: РАЗМЕР ЗАВИСИТ ОТ ЛЮДЕЙ, НОВОЕ: ПОРОВНУ
                const slice = wType === 'class' ? (votes/total) * (Math.PI*2) : (Math.PI*2) / active.length;
                ctx.save(); ctx.translate(275,275); ctx.rotate(curr);
                ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,260,0,slice);
                ctx.fillStyle = `hsl(${d.hue},65%,45%)`; ctx.fill();
                ctx.rotate(slice/2); ctx.fillStyle="#fff"; ctx.font="bold 14px sans-serif"; ctx.textAlign="right";
                ctx.fillText(d.name.length > 16 ? d.name.substring(0, 14) + '...' : d.name, 240, 5); ctx.restore();
                curr += slice;
            });
        }

        function startSpin() {
            const active = data.filter(([id,d]) => d.active !== false);
            if(isSpinning || active.length < 2) return;
            isSpinning = true; document.getElementById('simpleStatus').innerText = '';
            const dur = parseInt(document.getElementById('spinTime').value)*1000, start = performance.now(), pwr = 35 + Math.random()*40, sRot = rotation;
            function anim(now) {
                const p = Math.min((now-start)/dur, 1), ease = 1 - Math.pow(1-p, 4);
                rotation = sRot + pwr * ease; drawWheel();
                if(p < 1) requestAnimationFrame(anim);
                else { isSpinning = false; const win = getWin(); if(win) { updateStatus(win.name, active.length === 2); db.ref('lots/'+win.id).update({active: false}); }}
            }
            requestAnimationFrame(anim);
        }

        function getWin() {
            const active = data.filter(([id,d]) => d.active !== false), total = active.reduce((a,[id,d]) => a + (d.votes || d.val || 0), 0);
            const norm = ((rotation % (Math.PI*2)) + (Math.PI*2)) % (Math.PI*2), target = (Math.PI*1.5 - norm + (Math.PI*2)) % (Math.PI*2);
            let cur = 0;
            for(const [id, d] of active) {
                const votes = d.votes || d.val || 0;
                const slice = wType === 'class' ? (votes/total) * (Math.PI*2) : (Math.PI*2) / active.length;
                if(target >= cur && target < cur + slice) return {id, name: d.name};
                cur += slice;
            }
        }

        function updateStatus(name, isFinal) {
            const st = document.getElementById('simpleStatus'); st.style.color = isFinal ? "var(--accent)" : "var(--red)";
            st.innerText = isFinal ? "🏆 ПОБЕДИТЕЛЬ: " + name : "❌ ВЫБЫЛ: " + name;
            setTimeout(() => { st.innerText = ''; }, 4000);
        }

        function addLot() { 
            const n=document.getElementById('aName').value, v=parseInt(document.getElementById('aVal').value)||1; 
            if(n) db.ref('lots/' + Date.now()).set({ id: Date.now(), name: n, votes: v, val: v, hue: Math.random()*360, active: true, author: 'Admin', uid: 'admin' });
            document.getElementById('aName').value = '';
        }

        function askClearDB() { 
            showModal("СБРОС БАЗЫ", "ВНИМАНИЕ! Это действие полностью удалит все лоты и обнулит правила. Вы уверены?", () => { 
                db.ref('lots').remove(); 
                db.ref('auction').update({ timer: 600, pass: PASS, rules: "" }); 
            }); 
        }
        
        function updateLock() { db.ref('auction/lockSettings').set(document.getElementById('lockVoting').checked); }
        function up(i, t) { if(i.files[0]){ const r=new FileReader(); r.onload=e=>{ if(t==='bg')document.getElementById('mainBody').style.backgroundImage=`url(${e.target.result})`; else{document.getElementById('logoImg').src=e.target.result; document.getElementById('logoBox').style.display='flex';} }; r.readAsDataURL(i.files[0]); }}

        tUpdate();
    </script>
</body>
</html>
