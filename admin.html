<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Stream Auction - ADMIN PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0a0a0a; --panel: #111; --accent: #00a2ff; --red: #ff4b4b; --sidebar-w: 60px; }
        body { margin: 0; background: var(--bg); color: #efefef; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: var(--sidebar-w); background: #000; display: flex; flex-direction: column; align-items: center; padding-top: 20px; border-right: 1px solid #1a1a1a; z-index: 100; }
        .nav-btn { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border-radius: 10px; cursor: pointer; color: #444; transition: 0.3s; background: none; border: none; outline: none; }
        .nav-btn.active { color: var(--accent); background: rgba(0, 162, 255, 0.1); }
        .app-content { flex-grow: 1; display: flex; position: relative; overflow: hidden; }
        .view-section { display: none; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; flex-direction: row; }
        .view-section.active { display: flex; }
        
        .wheel-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        canvas { max-width: 90%; max-height: 80vh; background: radial-gradient(circle, #111 0%, #000 100%); border-radius: 50%; }
        
        .list-panel { background: #111; border-radius: 12px; border: 1px solid #222; overflow: hidden; display: flex; flex-direction: column; width: 100%; height: 100%; }
        .list-header { padding: 15px; background: #1a1a1a; font-weight: bold; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .list-content { flex: 1; overflow-y: auto; padding: 10px; }
        .item { display: flex; align-items: center; padding: 12px; background: #161616; border-radius: 8px; margin-bottom: 8px; border: 1px solid #222; gap: 10px; }
        
        .btn { padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-blue { background: var(--accent); color: #fff; }
        .btn-spin { background: var(--red); padding: 20px; width: 100%; font-size: 20px; margin-bottom: 10px; text-transform: uppercase; }
        
        .timer-box { background: #1a1a1a; padding: 20px; border-radius: 12px; text-align: center; min-width: 250px; border: 1px solid #222; }
        #tDisp { font-size: 48px; font-weight: 800; color: var(--accent); margin-bottom: 10px; font-family: monospace; }
        
        input { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <button class="nav-btn active" onclick="setView('wheel', this)"><i class="fas fa-dharmachakra"></i></button>
        <button class="nav-btn" onclick="setView('auc', this)"><i class="fas fa-list-ul"></i></button>
        <button class="nav-btn" onclick="setView('users', this)"><i class="fas fa-users"></i></button>
        <button class="nav-btn" style="margin-top: auto; color: var(--red);" onclick="clearDB()"><i class="fas fa-trash-alt"></i></button>
    </aside>

    <main class="app-content">
        <section id="view-wheel" class="view-section active" style="gap: 20px;">
            <div class="wheel-zone">
                <div id="simpleStatus" style="font-size: 24px; font-weight: bold; margin-bottom: 10px; color: var(--accent);">ОЖИДАНИЕ...</div>
                <canvas id="wheelCanvas" width="550" height="550"></canvas>
            </div>
            <div style="width: 320px; display: flex; flex-direction: column;">
                <button class="btn btn-spin" onclick="startSpin()">КРУТИТЬ</button>
                <div style="margin-bottom: 15px;">
                    <small>Время прокрутки (сек):</small>
                    <input type="number" id="spinTime" value="5" style="width: 100%; margin-top: 5px;">
                </div>
                <div class="list-panel">
                    <div class="list-header">В КОЛЕСЕ</div>
                    <div id="wheelList" class="list-content"></div>
                </div>
            </div>
        </section>

        <section id="view-auc" class="view-section" style="gap: 20px;">
            <div class="list-panel" style="flex: 2;">
                <div class="list-header">
                    <span>УПРАВЛЕНИЕ ЛОТАМИ</span>
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="aName" placeholder="Название лота...">
                        <button class="btn btn-blue" onclick="addLot()">ДОБАВИТЬ</button>
                    </div>
                </div>
                <div id="aucList" class="list-content"></div>
            </div>
            <div style="flex: 1; display: flex; flex-direction: column; gap: 20px;">
                <div class="timer-box">
                    <div id="tDisp">10:00:00</div>
                    <div style="display:flex; justify-content:center; gap:20px; font-size:28px;">
                        <i id="tPlay" class="fas fa-play" onclick="tToggle()" style="cursor:pointer; color: var(--accent)"></i>
                        <i class="fas fa-undo" onclick="tReset()" style="cursor:pointer;"></i>
                    </div>
                </div>
                <div class="list-panel">
                    <div class="list-header">ПРАВИЛА</div>
                    <textarea id="rulesEdit" style="flex:1; background:#000; color:#ccc; border:none; padding:10px; resize:none;" placeholder="Введите правила..."></textarea>
                    <button class="btn btn-blue" style="border-radius:0" onclick="saveRules()">СОХРАНИТЬ</button>
                </div>
            </div>
        </section>

        <section id="view-users" class="view-section">
            <div class="list-panel">
                <div class="list-header">ЗРИТЕЛИ ОНЛАЙН (КТО ЗАШЕЛ ЧЕРЕЗ TWITCH)</div>
                <div id="userList" class="list-content"></div>
            </div>
        </section>
    </main>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDhSe5und284GF-eeqGP8l3dOUuazxYwZc", 
            databaseURL: "https://dddd-68b66-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let data = [], isSpinning = false, rotation = 0, tSec = 600, tInt = null;

        function setView(id, b) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(nb => nb.classList.remove('active'));
            document.getElementById('view-'+id).classList.add('active');
            b.classList.add('active');
        }

        // ГЛАВНЫЙ СЛУШАТЕЛЬ БАЗЫ
        db.ref().on('value', snap => {
            const world = snap.val() || {};
            data = world.lots ? Object.entries(world.lots) : [];
            const voters = world.voters || {};
            if (world.rules) document.getElementById('rulesEdit').value = world.rules;
            renderAll(voters);
        });

        function renderAll(voters) {
            const wl = document.getElementById('wheelList'), al = document.getElementById('aucList'), ul = document.getElementById('userList');
            wl.innerHTML = ''; al.innerHTML = ''; ul.innerHTML = '';

            const activeLots = data.filter(([id,d]) => d.active !== false);
            const totalVotes = activeLots.reduce((a,[id,d]) => a + (d.votes || 0), 0);

            // ЛОТЫ
            data.forEach(([id, d]) => {
                const perc = totalVotes > 0 ? (((d.votes||0)/totalVotes)*100).toFixed(1) : 0;
                const lotHtml = `
                    <div class="item" style="${d.active === false ? 'opacity:0.5' : ''}">
                        <div style="flex:1">
                            <b>${d.name}</b><br>
                            <small style="color:#666">от ${d.creator || 'admin'}</small>
                        </div>
                        <div style="text-align:right">
                            <span style="color:var(--accent); font-weight:bold">${d.votes || 0} шт.</span><br>
                            <small>${perc}%</small>
                        </div>
                        <button class="btn btn-red" onclick="removeLot('${id}')" style="padding:5px 10px"><i class="fas fa-trash"></i></button>
                    </div>`;
                al.innerHTML += lotHtml;
                if(d.active !== false) wl.innerHTML += lotHtml;
            });

            // ЮЗЕРЫ
            const voterEntries = Object.entries(voters);
            if(voterEntries.length === 0) {
                ul.innerHTML = '<div style="text-align:center; color:#444; margin-top:50px;">Никто еще не залогинился через Twitch</div>';
            }
            voterEntries.forEach(([uid, v]) => {
                ul.innerHTML += `
                    <div class="item">
                        <div style="flex:1">
                            <b>${v.name}</b> <small style="color:#666">(ID: ${uid})</small><br>
                            <small>Действие: ${v.lot ? 'Голос за лот' : (v.created ? 'Предложил: ' + v.created : 'Просто зашел')}</small>
                        </div>
                        <button class="btn btn-red" onclick="banUser('${uid}')">СБРОСИТЬ</button>
                    </div>`;
            });

            drawWheel();
        }

        // ФУНКЦИИ УПРАВЛЕНИЯ
        function saveRules() {
            const val = document.getElementById('rulesEdit').value;
            db.ref('rules').set(val);
            alert("Правила сохранены!");
        }

        function banUser(uid) {
            if(confirm("Удалить активность этого юзера? Он сможет проголосовать заново.")) {
                db.ref('voters/' + uid).remove();
            }
        }

        function removeLot(id) {
            if(confirm("Удалить лот совсем?")) db.ref('lots/' + id).remove();
        }

        function addLot() {
            const n = document.getElementById('aName').value.trim();
            if(!n) return;
            const id = Date.now();
            db.ref('lots/'+id).set({ id, name: n, votes: 1, val: 1, hue: Math.random()*360, active: true, creator: 'ADMIN' });
            document.getElementById('aName').value = '';
        }

        function clearDB() {
            if(confirm("ВНИМАНИЕ: Это удалит ВСЕ лоты и ВСЕ голоса зрителей. Уверен?")) {
                db.ref('lots').remove();
                db.ref('voters').remove();
            }
        }

        // КОЛЕСО
        function drawWheel() {
            const cvs = document.getElementById('wheelCanvas'), ctx = cvs.getContext('2d');
            ctx.clearRect(0,0,550,550);
            const active = data.filter(([id,d]) => d.active !== false);
            if(!active.length) {
                ctx.fillStyle = "#222"; ctx.textAlign = "center"; ctx.fillText("ДОБАВЬТЕ ЛОТЫ", 275, 275);
                return;
            }
            const total = active.reduce((a,[id,d]) => a + (d.votes || 0), 0);
            let curr = rotation;
            active.forEach(([id, d]) => {
                const slice = ((d.votes||0)/total) * (Math.PI*2);
                ctx.save(); ctx.translate(275,275); ctx.rotate(curr);
                ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,260,0,slice);
                ctx.fillStyle = `hsl(${d.hue},65%,45%)`; ctx.fill();
                ctx.strokeStyle = "rgba(0,0,0,0.2)"; ctx.lineWidth = 2; ctx.stroke();
                ctx.rotate(slice/2); ctx.fillStyle="#fff"; ctx.font="bold 16px sans-serif"; ctx.textAlign="right";
                ctx.fillText(d.name.substring(0,20), 240, 5); ctx.restore();
                curr += slice;
            });
            // Стрелка
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.moveTo(275, 20); ctx.lineTo(260, 0); ctx.lineTo(290, 0); ctx.fill();
        }

        function startSpin() {
            if(isSpinning) return; isSpinning = true;
            const dur = document.getElementById('spinTime').value * 1000;
            const start = performance.now();
            const pwr = 40 + Math.random()*30;
            const sRot = rotation;
            function anim(now) {
                const p = Math.min((now-start)/dur, 1);
                const ease = 1 - Math.pow(1-p, 3);
                rotation = sRot + pwr * ease;
                drawWheel();
                if(p < 1) requestAnimationFrame(anim);
                else { isSpinning = false; finishSpin(); }
            }
            requestAnimationFrame(anim);
        }

        function finishSpin() {
            const active = data.filter(([id,d]) => d.active !== false);
            const total = active.reduce((a,[id,d]) => a + (d.votes || 0), 0);
            const norm = ((rotation % (Math.PI*2)) + (Math.PI*2)) % (Math.PI*2);
            const target = (Math.PI*1.5 - norm + (Math.PI*2)) % (Math.PI*2);
            let cur = 0;
            for(const [id, d] of active) {
                const slice = (d.votes/total)*(Math.PI*2);
                if(target >= cur && target < cur + slice) {
                    document.getElementById('simpleStatus').innerText = "ВЫБЫЛ: " + d.name;
                    db.ref('lots/'+id).update({active: false});
                    break;
                }
                cur += slice;
            }
        }

        // ТАЙМЕР
        function tUpdate() { db.ref('auction/timer').set(tSec); }
        function tToggle() { 
            const b = document.getElementById('tPlay');
            if(tInt) { clearInterval(tInt); tInt = null; b.className = "fas fa-play"; }
            else { tInt = setInterval(() => { if(tSec > 0) { tSec--; tUpdate(); } }, 1000); b.className = "fas fa-pause"; }
        }
        function tReset() { tSec = 600; tUpdate(); }
        db.ref('auction/timer').on('value', s => { 
            tSec = s.val() || 0; 
            const m = Math.floor(tSec/60), sec = tSec%60;
            document.getElementById('tDisp').innerText = `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}:00`;
        });
    </script>
</body>
</html>
