<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Stream Auction - ADMIN PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0a0a0a; --panel: #111; --accent: #00a2ff; --red: #ff4b4b; --sidebar-w: 60px; }
        body { margin: 0; background: var(--bg); color: #efefef; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: var(--sidebar-w); background: #000; display: flex; flex-direction: column; align-items: center; padding-top: 20px; border-right: 1px solid #1a1a1a; z-index: 100; }
        .nav-btn { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border-radius: 10px; cursor: pointer; color: #444; transition: 0.3s; background: none; border: none; }
        .nav-btn.active { color: var(--accent); background: rgba(0, 162, 255, 0.1); }
        .app-content { flex-grow: 1; display: flex; position: relative; overflow: hidden; }
        .view-section { display: none; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; }
        .view-section.active { display: flex; }
        
        /* Колесо */
        .wheel-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        canvas { max-width: 90%; max-height: 80vh; }
        
        /* Списки */
        .list-panel { background: #111; border-radius: 12px; border: 1px solid #222; overflow: hidden; display: flex; flex-direction: column; width: 100%; }
        .list-header { padding: 15px; background: #1a1a1a; font-weight: bold; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .list-content { flex: 1; overflow-y: auto; }
        .item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #1a1a1a; gap: 10px; }
        
        /* Кнопки */
        .btn { padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-blue { background: var(--accent); color: #fff; }
        .btn-spin { background: var(--red); padding: 20px; width: 100%; font-size: 20px; margin-bottom: 10px; }
        
        .timer-box { background: #1a1a1a; padding: 20px; border-radius: 12px; text-align: center; min-width: 250px; }
        #tDisp { font-size: 48px; font-weight: 800; color: var(--accent); margin-bottom: 10px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <button class="nav-btn active" onclick="setView('wheel', this)"><i class="fas fa-dharmachakra"></i></button>
        <button class="nav-btn" onclick="setView('auc', this)"><i class="fas fa-list-ul"></i></button>
        <button class="nav-btn" onclick="setView('users', this)"><i class="fas fa-users"></i></button>
        <button class="nav-btn" style="margin-top: auto; color: var(--red);" onclick="clearDB()"><i class="fas fa-trash-alt"></i></button>
    </aside>

    <main class="app-content">
        <section id="view-wheel" class="view-section active" style="gap: 20px;">
            <div class="wheel-zone">
                <div id="simpleStatus" style="font-size: 24px; font-weight: bold; margin-bottom: 10px; height: 30px;"></div>
                <canvas id="wheelCanvas" width="550" height="550"></canvas>
            </div>
            <div style="width: 300px;">
                <button class="btn btn-spin" onclick="startSpin()">КРУТИТЬ</button>
                <input type="number" id="spinTime" value="5" style="width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; margin-bottom: 20px;">
                <div class="list-panel">
                    <div class="list-header">УЧАСТНИКИ</div>
                    <div id="wheelList" class="list-content" style="max-height: 50vh;"></div>
                </div>
            </div>
        </section>

        <section id="view-auc" class="view-section" style="gap: 20px;">
            <div class="list-panel" style="flex: 2;">
                <div class="list-header">
                    <span>ЛОТЫ В ИГРЕ</span>
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="aName" placeholder="Лот..." style="background:#000; border:1px solid #333; color:#fff; padding:5px; border-radius:4px;">
                        <button class="btn btn-blue" onclick="addLot()">+</button>
                    </div>
                </div>
                <div id="aucList" class="list-content"></div>
            </div>
            <div class="timer-box">
                <div id="tDisp">10:00:00</div>
                <div style="display:flex; justify-content:center; gap:15px; font-size:24px;">
                    <i id="tPlay" class="fas fa-play" onclick="tToggle()" style="cursor:pointer;"></i>
                    <i class="fas fa-undo" onclick="tReset()" style="cursor:pointer;"></i>
                </div>
            </div>
        </section>

        <section id="view-users" class="view-section">
            <div class="list-panel">
                <div class="list-header">УПРАВЛЕНИЕ ЗРИТЕЛЯМИ (КТО ЗАЛОГИНИЛСЯ)</div>
                <div id="userList" class="list-content"></div>
            </div>
        </section>
    </main>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDhSe5und284GF-eeqGP8l3dOUuazxYwZc", databaseURL: "https://dddd-68b66-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let data = [], isSpinning = false, rotation = 0, tSec = 600, tInt = null;

        function setView(id, b) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(nb => nb.classList.remove('active'));
            document.getElementById('view-'+id).classList.add('active'); b.classList.add('active');
        }

        // ОБНОВЛЕНИЕ ДАННЫХ (ЛОТЫ И ЮЗЕРЫ)
        db.ref().on('value', snap => {
            const world = snap.val() || {};
            data = world.lots ? Object.entries(world.lots) : [];
            const voters = world.voters || {};
            renderAll(voters);
        });

        function renderAll(voters) {
            const wl = document.getElementById('wheelList'), al = document.getElementById('aucList'), ul = document.getElementById('userList');
            wl.innerHTML = ''; al.innerHTML = ''; ul.innerHTML = '';

            const active = data.filter(([id,d]) => d.active !== false);
            const total = active.reduce((a,[id,d]) => a + (d.votes || 0), 0);

            // Рендер лотов
            data.forEach(([id, d]) => {
                const p = total > 0 ? (((d.votes||0)/total)*100).toFixed(1) : 0;
                const html = `<div class="item">
                    <span style="flex:1"><b>${d.name}</b> <br> <small style="color:#666">от ${d.creator || 'admin'}</small></span>
                    <span style="color:var(--accent)">${p}%</span>
                    <i class="fas fa-trash" style="cursor:pointer; color:#444" onclick="removeLot('${id}')"></i>
                </div>`;
                if(d.active !== false) wl.innerHTML += html;
                al.innerHTML += html;
            });

            // Рендер юзеров (БАН-ЛИСТ)
            Object.entries(voters).forEach(([uid, v]) => {
                ul.innerHTML += `<div class="item">
                    <span style="flex:1"><b>${v.name}</b> (ID: ${uid}) <br> <small style="color:#666">Выбор: ${v.lot || 'еще не выбрал'}</small></span>
                    <button class="btn btn-red" onclick="banUser('${uid}')">БАН / СБРОС</button>
                </div>`;
            });

            drawWheel();
        }

        function banUser(uid) {
            if(confirm("Удалить голос этого юзера и заставить его голосовать заново?")) {
                db.ref('voters/' + uid).remove();
            }
        }

        function removeLot(id) {
            if(confirm("Удалить лот?")) db.ref('lots/' + id).remove();
        }

        function addLot() {
            const n = document.getElementById('aName').value;
            if(!n) return;
            const id = Date.now();
            db.ref('lots/'+id).set({ id, name: n, votes: 1, val: 1, hue: Math.random()*360, active: true, creator: 'ADMIN' });
            document.getElementById('aName').value = '';
        }

        function clearDB() {
            if(confirm("УДАЛИТЬ ВСЁ (лоты и голоса)?")) {
                db.ref('lots').remove();
                db.ref('voters').remove();
            }
        }

        // ТАЙМЕР И КОЛЕСО (БЕЗ ИЗМЕНЕНИЙ)
        function drawWheel() {
            const cvs = document.getElementById('wheelCanvas'), ctx = cvs.getContext('2d');
            ctx.clearRect(0,0,550,550);
            const active = data.filter(([id,d]) => d.active !== false);
            if(!active.length) return;
            const total = active.reduce((a,[id,d]) => a + (d.votes || 0), 0);
            let curr = rotation;
            active.forEach(([id, d]) => {
                const slice = ((d.votes||0)/total) * (Math.PI*2);
                ctx.save(); ctx.translate(275,275); ctx.rotate(curr);
                ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,260,0,slice);
                ctx.fillStyle = `hsl(${d.hue},65%,45%)`; ctx.fill();
                ctx.rotate(slice/2); ctx.fillStyle="#fff"; ctx.font="bold 14px sans-serif";
                ctx.fillText(d.name.substring(0,15), 100, 5); ctx.restore();
                curr += slice;
            });
        }

        function startSpin() {
            if(isSpinning) return; isSpinning = true;
            const dur = document.getElementById('spinTime').value * 1000, start = performance.now(), pwr = 30 + Math.random()*20, sRot = rotation;
            function anim(now) {
                const p = Math.min((now-start)/dur, 1), ease = 1 - Math.pow(1-p, 3);
                rotation = sRot + pwr * ease; drawWheel();
                if(p < 1) requestAnimationFrame(anim);
                else { isSpinning = false; finishSpin(); }
            }
            requestAnimationFrame(anim);
        }

        function finishSpin() {
            const active = data.filter(([id,d]) => d.active !== false);
            const total = active.reduce((a,[id,d]) => a + (d.votes || 0), 0);
            const norm = ((rotation % (Math.PI*2)) + (Math.PI*2)) % (Math.PI*2);
            const target = (Math.PI*1.5 - norm + (Math.PI*2)) % (Math.PI*2);
            let cur = 0;
            for(const [id, d] of active) {
                const slice = (d.votes/total)*(Math.PI*2);
                if(target >= cur && target < cur + slice) {
                    document.getElementById('simpleStatus').innerText = "ВЫБЫЛ: " + d.name;
                    db.ref('lots/'+id).update({active: false});
                    break;
                }
                cur += slice;
            }
        }

        function tUpdate() { db.ref('auction/timer').set(tSec); }
        function tToggle() { 
            const b = document.getElementById('tPlay');
            if(tInt) { clearInterval(tInt); tInt = null; b.className = "fas fa-play"; }
            else { tInt = setInterval(() => { if(tSec > 0) { tSec--; tUpdate(); } }, 1000); b.className = "fas fa-pause"; }
        }
        function tReset() { tSec = 600; tUpdate(); }
        db.ref('auction/timer').on('value', s => { 
            tSec = s.val() || 0; 
            const m = Math.floor(tSec/60), sec = tSec%60;
            document.getElementById('tDisp').innerText = `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}:00`;
        });
    </script>
</body>
</html>
