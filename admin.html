<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Stream Auction - Final Pro Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0a0a0a; --panel: #111; --accent: #00a2ff; --red: #ff4b4b; --sidebar-w: 60px; }
        body { margin: 0; background: var(--bg); color: #efefef; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; background-size: cover; background-position: center; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-w); background: #000; display: flex; flex-direction: column; align-items: center; padding-top: 20px; border-right: 1px solid #1a1a1a; z-index: 100; }
        .nav-btn { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border-radius: 10px; cursor: pointer; color: #444; transition: 0.3s; background: none; border: none; }
        .nav-btn.active { color: var(--accent); background: rgba(0, 162, 255, 0.1); }

        .app-content { flex-grow: 1; display: flex; position: relative; overflow: hidden; }
        .view-section { display: none; width: 100%; height: 100%; }
        .view-section.active { display: flex; }

        /* Колесо */
        .lots-panel { width: 320px; background: rgba(10,10,10,0.95); padding: 20px; border-right: 1px solid #1a1a1a; transition: transform 0.4s ease; position: relative; display: flex; flex-direction: column; z-index: 50; }
        .lots-panel.collapsed { transform: translateX(-320px); }
        .toggle-trigger { position: absolute; right: -30px; top: 50%; transform: translateY(-50%); background: #1a1a1a; color: var(--accent); width: 30px; height: 60px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 0 8px 8px 0; border: 1px solid #333; z-index: 60; }
        
        .lot-item { display: flex; align-items: center; padding: 10px; background: #161616; border-radius: 6px; margin-bottom: 6px; border-left: 3px solid var(--accent); font-size: 13px; }
        .lot-item.out { opacity: 0.2; text-decoration: line-through; filter: grayscale(1); }

        .wheel-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #simpleStatus { height: 40px; font-size: 22px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .marker { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid var(--red); z-index: 30; margin-bottom: 5px; }
        
        .control-panel { width: 280px; background: rgba(14,14,14,0.9); padding: 15px; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; gap: 10px; }
        .btn-spin { background: var(--red); border: none; color: #fff; padding: 15px; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 16px; }

        /* Аукцион */
        .auc-container { display: grid; grid-template-columns: 300px 1fr 340px; gap: 15px; padding: 20px; width: 100%; height: calc(100% - 60px); box-sizing: border-box; }
        .auc-footer { height: 60px; background: #000; border-top: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; width: 100%; position: absolute; bottom: 0; box-sizing: border-box; }
        
        /* Модальное окно (Сине-Черное) */
        .modal-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.8); display: none; align-items: center; 
            justify-content: center; z-index: 1000; 
        }
        .modal-content { 
            background: #0a0a0a; border: 2px solid var(--accent); 
            width: 400px; padding: 20px; border-radius: 12px; 
            box-shadow: 0 0 20px rgba(0,162,255,0.2); 
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .close-modal { cursor: pointer; color: #555; font-size: 20px; }
        .close-modal:hover { color: var(--red); }

        .ban-item { display: flex; justify-content: space-between; align-items: center; background: #161616; padding: 10px; margin-bottom: 5px; border-radius: 6px; border-left: 3px solid var(--red); }
        .unban-btn { background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }

        #onlineListScroll { max-height: 300px; overflow-y: auto; }
        .online-user-row { padding: 8px; border-bottom: 1px solid #1a1a1a; font-size: 14px; display: flex; justify-content: space-between; }
    </style>
</head>
<body id="mainBody">

    <aside class="sidebar">
        <button class="nav-btn active" onclick="setView('wheel', this)"><i class="fas fa-home"></i></button>
        <button class="nav-btn" onclick="setView('auc', this)"><i class="fas fa-envelope"></i></button>
        <button class="nav-btn" onclick="setView('vip', this)"><i class="fas fa-user-slash"></i></button>
        <button class="nav-btn" style="margin-top: auto; margin-bottom: 20px;"><i class="fas fa-cog"></i></button>
    </aside>

    <main class="app-content">
        <section id="view-wheel" class="view-section active">
            <div class="lots-panel" id="sidePanel">
                <div class="toggle-trigger" onclick="toggleSide()"><i class="fas fa-chevron-left" id="sideIcon"></i></div>
                <div style="font-size: 10px; color: #444; margin-bottom: 15px; font-weight: bold;">УЧАСТНИКИ</div>
                <label style="font-size: 11px; color: #666; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; cursor: pointer;">
                    <input type="checkbox" id="hideOut" onchange="renderAll()"> Скрыть выбывшие
                </label>
                <div id="wheelList" style="flex: 1; overflow-y: auto;"></div>
            </div>

            <div class="wheel-zone">
                <div id="simpleStatus"></div>
                <div class="marker"></div>
                <canvas id="wheelCanvas" width="550" height="550"></canvas>
            </div>

            <div class="control-panel">
                <button class="btn-spin" onclick="startSpin()">КРУТИТЬ</button>
                <div style="font-size: 10px; color: #333;">ВРЕМЯ (СЕК)</div>
                <input type="number" id="spinTime" style="background:#000; border:1px solid #222; color:#fff; padding:8px; border-radius:5px;" value="5">
                <div style="display: flex; gap: 5px; margin-top: 10px;">
                    <button id="tNew" class="nav-btn active" style="flex:1; font-size:11px;" onclick="setWType('new')">Новое</button>
                    <button id="tClass" class="nav-btn" style="flex:1; font-size:11px;" onclick="setWType('class')">Классика</button>
                </div>
                <button onclick="clearDB()" style="margin-top:auto; background:none; border:1px solid #222; color:#333; padding:10px; border-radius:6px; cursor:pointer; font-size:11px;">ОЧИСТИТЬ БАЗУ</button>
            </div>
        </section>

        <section id="view-auc" class="view-section" style="flex-direction:column;">
            <div class="auc-container">
                <div style="background:#111; border-radius:12px; padding:20px; border:1px solid #222;">
                    <h3>Правила</h3>
                    <div id="rulesArea" contenteditable="true" style="color:#efefef; min-height:100px; outline:none;" oninput="saveRules()">Текст правил...</div>
                </div>

                <div style="background:#111; border-radius:12px; border:1px solid #222; display:flex; flex-direction:column;">
                    <div style="padding:15px; display:flex; gap:10px; border-bottom:1px solid #222;">
                        <input type="text" id="aName" placeholder="Лот..." style="flex:1; background:#000; border:1px solid #333; color:#fff; padding:8px;">
                        <input type="number" id="aVal" value="1" style="width:70px; background:#000; border:1px solid #333; color:#fff; padding:8px;">
                        <button onclick="addLot()" style="background:var(--accent); border:none; color:#fff; padding:0 15px; border-radius:5px;">+</button>
                    </div>
                    <div id="aucList" style="flex:1; overflow-y:auto;"></div>
                </div>

                <div style="background:#1a1a1a; border-radius:12px; padding:25px; text-align:center; height:fit-content; border:1px solid #222;">
                    <div id="tDisp" style="font-size:44px; font-weight:bold; margin-bottom:15px; font-family: monospace;">00:10:00</div>
                    <div style="display:flex; justify-content:center; gap:20px; font-size:24px; color:#444;">
                        <i id="tPlay" class="fas fa-play" onclick="tToggle()" style="cursor:pointer;"></i>
                        <i class="fas fa-undo" onclick="tReset()" style="cursor:pointer;"></i>
                        <i class="fas fa-caret-up" onclick="tMod(60)" style="cursor:pointer;"></i>
                        <i class="fas fa-caret-down" onclick="tMod(-60)" style="cursor:pointer;"></i>
                    </div>
                </div>
            </div>

            <div class="auc-footer">
                <button class="nav-btn active" id="pBtn" onclick="togglePct()"><i class="fas fa-percent"></i></button>
                <div id="onlineCounter" onclick="openOnlineModal()" style="cursor:pointer; background:rgba(0,162,255,0.1); padding:5px 15px; border-radius:20px; border:1px solid var(--accent);">
                    <i class="fas fa-users" style="color:var(--accent);"></i> <span id="onlineCount">0</span>
                </div>
            </div>
        </section>

        <section id="view-vip" class="view-section" style="flex-direction:column; padding:40px;">
            <h2 style="color:var(--red);"><i class="fas fa-user-slash"></i> ЧЕРНЫЙ СПИСОК</h2>
            <div id="banList" style="max-width: 600px; overflow-y: auto;"></div>
        </section>

        <div id="modal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalTitle" style="margin:0; color:var(--accent);">ОНЛАЙН</h3>
                    <span class="close-modal" onclick="closeModal()">&times;</span>
                </div>
                <div id="modalBody"></div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDhSe5und284GF-eeqGP8l3dOUuazxYwZc", databaseURL: "https://dddd-68b66-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const PASS = 'rekrut_1_mmemnto_mori_001_index_0';
        let data = [], isSpinning = false, rotation = 0, showPct = true, wType = 'new';
        let tSec = 600, tInt = null, onlineUsers = {};

        function setView(id, b) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(nb => nb.classList.remove('active'));
            document.getElementById('view-'+id).classList.add('active'); 
            b.classList.add('active');
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function openOnlineModal() {
            const m = document.getElementById('modal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            title.innerText = "ЗРИТЕЛИ ОНЛАЙН";
            let html = '<div id="onlineListScroll">';
            Object.values(onlineUsers).forEach(u => {
                html += `<div class="online-user-row"><span>${u.name || 'Аноним'}</span> <small style="color:#444">${u.lastSeen ? 'active' : ''}</small></div>`;
            });
            html += '</div>';
            body.innerHTML = html || 'Никого нет...';
            m.style.display = 'flex';
        }

        function banUser(uid, name) {
            if(!uid || uid === 'admin') return;
            const m = document.getElementById('modal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');

            title.innerText = "ПОДТВЕРЖДЕНИЕ БАНА";
            body.innerHTML = `
                <p>Забанить пользователя <b>${name}</b>?</p>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button onclick="confirmBan('${uid}', '${name}')" style="flex:1; background:var(--red); border:none; color:white; padding:10px; border-radius:5px; cursor:pointer;">ДА, БАН</button>
                    <button onclick="closeModal()" style="flex:1; background:#333; border:none; color:white; padding:10px; border-radius:5px; cursor:pointer;">ОТМЕНА</button>
                </div>
            `;
            m.style.display = 'flex';
        }

        function confirmBan(uid, name) {
            db.ref('bans/' + uid).set(name);
            closeModal();
        }

        // FIREBASE LISTENERS
        db.ref('lots').on('value', s => { data = s.val() ? Object.entries(s.val()) : []; renderAll(); });
        db.ref('presence').on('value', s => { 
            onlineUsers = s.val() || {}; 
            document.getElementById('onlineCount').innerText = Object.keys(onlineUsers).length;
        });
        db.ref('bans').on('value', s => {
            const list = document.getElementById('banList'), bans = s.val() || {};
            list.innerHTML = '';
            Object.entries(bans).forEach(([uid, name]) => {
                list.innerHTML += `<div class="ban-item"><span><b>${name}</b></span><button class="unban-btn" onclick="db.ref('bans/${uid}').remove()">РАЗБАНИТЬ</button></div>`;
            });
        });

        function renderAll() {
            const wl = document.getElementById('wheelList'), al = document.getElementById('aucList'), hide = document.getElementById('hideOut').checked;
            wl.innerHTML = ''; al.innerHTML = '';
            const active = data.filter(([id,d]) => d.active !== false);
            const total = active.reduce((a,[id,d]) => a + (d.votes || d.val || 0), 0);

            data.forEach(([id, d], i) => {
                const isOut = d.active === false;
                const currentVotes = d.votes || d.val || 0;
                const p = total > 0 ? ((currentVotes/total)*100).toFixed(1) : 0;
                
                if(!(isOut && hide)) {
                    wl.innerHTML += `<div class="lot-item ${isOut ? 'out' : ''}" style="border-left-color:hsl(${d.hue},70%,50%)">
                        <span style="flex:1; overflow:hidden;">${d.name}</span>
                        ${showPct ? `<span style="color:var(--accent); font-size:10px; margin:0 10px;">${p}%</span>` : ''}
                        <b>${currentVotes}</b>
                    </div>`;
                }

                al.innerHTML += `<div style="display:flex; flex-direction:column; padding:12px; border-bottom:1px solid #1a1a1a;">
                    <div style="display:flex; align-items:center;">
                        <span style="width:30px; color:#333;">${i+1}</span>
                        <span style="flex:1; font-weight:bold;">${d.name}</span>
                        <span style="color:var(--accent); font-weight:bold; margin-right:15px;">${p}%</span>
                        <span style="margin-right:15px; cursor:pointer;" onclick="alert('Донатеры: ${d.donators ? Object.values(d.donators).join(', ') : '---'}')">${currentVotes} <i class="fas fa-coins"></i></span>
                        <i class="fas fa-user" title="Забанить" style="cursor:pointer; color:#fff; margin-right:10px;" onclick="banUser('${d.uid}', '${d.author}')"></i>
                        <i class="fas fa-trash" style="cursor:pointer; color:#444;" onclick="db.ref('lots/${id}').remove()"></i>
                    </div>
                </div>`;
            });
            drawWheel();
        }

        // ТАЙМЕР И КОЛЕСО (Логика сохранена)
        function tUpdate() { 
            const h = Math.floor(tSec / 3600), m = Math.floor((tSec % 3600) / 60), s = tSec % 60;
            document.getElementById('tDisp').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; 
            db.ref('auction').update({ timer: tSec, pass: PASS });
        }
        function tToggle() { 
            const b=document.getElementById('tPlay'); 
            if(tInt){clearInterval(tInt); tInt=null; b.className="fas fa-play";} 
            else{tInt=setInterval(()=>{if(tSec>0){tSec--; tUpdate();} else { clearInterval(tInt); tInt=null; b.className="fas fa-play"; }},1000); b.className="fas fa-pause";} 
        }
        function tMod(v) { tSec=Math.max(0, tSec+v); tUpdate(); }
        function tReset() { tSec=600; tUpdate(); }

        function drawWheel() {
            const cvs = document.getElementById('wheelCanvas'), ctx = cvs.getContext('2d');
            ctx.clearRect(0,0,550,550);
            const active = data.filter(([id,d]) => d.active !== false);
            const total = active.reduce((a,[id,d]) => a + (d.votes || d.val || 0), 0);
            let curr = rotation;
            active.forEach(([id, d], i) => {
                const slice = ((d.votes || d.val || 0)/total) * (Math.PI*2);
                ctx.save(); ctx.translate(275,275); ctx.rotate(curr);
                ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,260,0,slice);
                ctx.fillStyle = wType === 'class' ? (i%2===0?'#1a1a1a':'#2a2a2a') : `hsl(${d.hue},65%,45%)`;
                ctx.fill(); if(wType==='class'){ctx.strokeStyle=`hsl(${d.hue},70%,50%)`; ctx.stroke();}
                ctx.rotate(slice/2); ctx.fillStyle="#fff"; ctx.font="bold 14px sans-serif"; ctx.textAlign="right";
                ctx.fillText(d.name.substring(0,15), 240, 5); ctx.restore();
                curr += slice;
            });
        }

        function startSpin() {
            const active = data.filter(([id,d]) => d.active !== false);
            if(isSpinning || active.length < 2) return;
            isSpinning = true;
            const dur = parseInt(document.getElementById('spinTime').value)*1000, start = performance.now(), pwr = 35 + Math.random()*40, sRot = rotation;
            function anim(now) {
                const p = Math.min((now-start)/dur, 1), ease = 1 - Math.pow(1-p, 4);
                rotation = sRot + pwr * ease; drawWheel();
                if(p < 1) requestAnimationFrame(anim);
                else { 
                    isSpinning = false; const win = getWin();
                    if(win) { updateStatus(win.name, active.length === 2); db.ref('lots/'+win.id).update({active: false}); }
                }
            }
            requestAnimationFrame(anim);
        }

        function getWin() {
            const active = data.filter(([id,d]) => d.active !== false);
            const total = active.reduce((a,[id,d]) => a + (d.votes || d.val || 0), 0);
            const norm = (Math.PI*1.5 - (rotation % (Math.PI*2)) + (Math.PI*2)) % (Math.PI*2);
            let cur = 0;
            for(const [id, d] of active) {
                const slice = ((d.votes || d.val || 0)/total) * (Math.PI*2);
                if(norm >= cur && norm < cur + slice) return {id, name: d.name};
                cur += slice;
            }
        }

        function updateStatus(name, isFinal) {
            const st = document.getElementById('simpleStatus');
            if(isFinal) {
                const w = data.filter(([id,d]) => d.active !== false && d.name !== name)[0];
                st.style.color = "var(--accent)"; st.innerText = "🏆 ПОБЕДИТЕЛЬ: " + (w ? w[1].name : name);
            } else {
                st.style.color = "var(--red)"; st.innerText = "❌ ВЫБЫЛ: " + name;
            }
            setTimeout(() => { if(!isSpinning) st.innerText = ''; }, 5000);
        }

        function addLot() { 
            const n=document.getElementById('aName').value, v=parseInt(document.getElementById('aVal').value)||1;
            if(n) db.ref('lots/' + Date.now()).set({ id: Date.now(), name: n, votes: v, val: v, hue: Math.random()*360, active: true, author: 'Admin', uid: 'admin' });
            document.getElementById('aName').value = '';
        }

        function toggleSide() { 
            const p = document.getElementById('sidePanel'), i = document.getElementById('sideIcon');
            p.classList.toggle('collapsed'); i.className = p.classList.contains('collapsed') ? "fas fa-chevron-right" : "fas fa-chevron-left";
        }
        function togglePct() { showPct = !showPct; document.getElementById('pBtn').classList.toggle('active'); renderAll(); }
        function saveRules() { db.ref('auction/rules').set(document.getElementById('rulesArea').innerText); }
        function clearDB() { if(confirm("УДАЛИТЬ ВСЕ?")) db.ref('lots').remove(); }
        
        tUpdate();
    </script>
</body>
</html>
