<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Auction - Голосование</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #0d0d0d; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px 10px; }
        
        /* КНОПКА ТВИЧА В УГЛУ */
        .header-auth { position: absolute; top: 10px; right: 10px; z-index: 100; }
        .twitch-btn { background: #6441a5; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .twitch-btn:hover { background: #7d5bbe; transform: scale(1.05); }
        .user-info { display: none; align-items: center; gap: 10px; background: #1a1a1a; padding: 5px 15px; border-radius: 50px; border: 1px solid #6441a5; }
        .user-info img { width: 25px; height: 25px; border-radius: 50%; }

        #timerDisplay { font-size: 18vw; font-weight: 800; color: #00a2ff; text-shadow: 0 0 20px rgba(0, 162, 255, 0.5); margin: 40px 0 20px 0; font-family: monospace; }
        @media (min-width: 600px) { #timerDisplay { font-size: 80px; } }
        
        .container { width: 100%; max-width: 600px; }
        .input-group { display: none; gap: 10px; margin-bottom: 30px; } /* Скрыто до логина */
        
        input { flex-grow: 1; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 12px; font-size: 16px; }
        .btn-add { background: #00a2ff; border: none; color: #fff; padding: 0 20px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 24px; }
        
        .lot-item { background: #141414; border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .lot-name { font-size: 18px; font-weight: bold; }
        .lot-votes { color: #00a2ff; font-size: 14px; }
        .btn-vote { background: #222; border: 1px solid #444; color: #fff; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        /* ТЕКСТ ДЛЯ НЕЗАРЕГАННЫХ */
        .login-warning { color: #666; text-align: center; margin-bottom: 20px; font-style: italic; }
        .status-msg { color: #00a2ff; margin-bottom: 15px; font-weight: bold; display: none; text-align: center; background: rgba(0, 162, 255, 0.1); padding: 10px; border-radius: 10px; width: 100%; }
    </style>
</head>
<body>

    <div class="header-auth">
        <button id="loginBtn" class="twitch-btn" onclick="loginTwitch()">Войти через Twitch</button>
        <div id="userInfo" class="user-info">
            <img id="userAvatar" src="" alt="">
            <span id="userName"></span>
        </div>
    </div>

    <div id="timerDisplay">10:00:00</div>
    
    <div id="loginWarning" class="login-warning">Войдите через Twitch, чтобы предложить лот или проголосовать</div>
    <div id="statusMessage" class="status-msg">Твой голос учтен! Ожидай финала ✓</div>

    <div class="container">
        <div class="input-group" id="inputSection">
            <input type="text" id="newLotName" placeholder="Запропонувати свій варіант...">
            <button class="btn-add" id="btnAddLot" onclick="suggestLot()">+</button>
        </div>
        <div id="lotsContainer"></div>
    </div>

    <script>
        const CLIENT_ID = 'wieivkm1m1fyhbfliadenazscmcoct';
        const REDIRECT_URI = 'https://rmi447r.github.io/ruletka_dolboeb/index.html';
        
        const firebaseConfig = { 
            apiKey: "AIzaSyDhSe5und284GF-eeqGP8l3dOUuazxYwZc", 
            databaseURL: "https://dddd-68b66-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null;

        function loginTwitch() {
            const url = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=user:read:email`;
            window.location.href = url;
        }

        async function checkAuth() {
            const hash = window.location.hash;
            if (hash) {
                const params = new URLSearchParams(hash.substring(1));
                const token = params.get('access_token');
                if (token) {
                    try {
                        const res = await fetch('https://api.twitch.tv/helix/users', {
                            headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${token}` }
                        });
                        const data = await res.json();
                        if (data.data && data.data[0]) {
                            currentUser = data.data[0];
                            showUser();
                            checkParticipation();
                        }
                    } catch(e) { console.error("Ошибка авторизации", e); }
                }
            }
        }

        function showUser() {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('loginWarning').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userAvatar').src = currentUser.profile_image_url;
            document.getElementById('userName').innerText = currentUser.display_name;
            document.getElementById('inputSection').style.display = 'flex';
        }

        function checkParticipation() {
            if (!currentUser) return;
            db.ref('voters/' + currentUser.id).on('value', snap => {
                if (snap.exists()) {
                    document.getElementById('inputSection').style.display = 'none';
                    document.getElementById('statusMessage').style.display = 'block';
                    document.querySelectorAll('.btn-vote').forEach(b => b.style.display = 'none');
                }
            });
        }

        db.ref('lots').on('value', snap => {
            const container = document.getElementById('lotsContainer');
            container.innerHTML = '';
            const data = snap.val();
            if (!data) return;

            Object.keys(data).map(key => ({ id: key, ...data[key] }))
                .filter(lot => lot.active !== false)
                .sort((a, b) => (b.votes || 0) - (a.votes || 0))
                .forEach(lot => {
                    const div = document.createElement('div');
                    div.className = 'lot-item';
                    div.innerHTML = `
                        <div class="lot-info">
                            <span class="lot-name">${lot.name}</span>
                            <span class="lot-votes">${lot.votes || 0} голосов</span>
                        </div>
                        ${currentUser ? `<button class="btn-vote" onclick="vote('${lot.id}')">+1</button>` : ''}
                    `;
                    container.appendChild(div);
                });
            if (currentUser) checkParticipation();
        });

        function vote(id) {
            if (!currentUser) return;
            db.ref('voters/' + currentUser.id).set({ name: currentUser.display_name, lot: id });
            db.ref('lots/' + id).transaction(lot => {
                if (lot) { lot.votes = (lot.votes || 0) + 1; lot.val = (lot.val || 0) + 1; }
                return lot;
            });
        }

        function suggestLot() {
            if (!currentUser) return;
            const input = document.getElementById('newLotName');
            const name = input.value.trim();
            if (!name) return;
            const id = Date.now();
            db.ref('voters/' + currentUser.id).set({ name: currentUser.display_name, created: name });
            db.ref('lots/' + id).set({ id, name, votes: 1, val: 1, hue: Math.random()*360, active: true, creator: currentUser.display_name });
            input.value = '';
        }

        db.ref('auction/timer').on('value', snap => {
            const t = snap.val() || 0;
            const m = Math.floor(t / 60), s = t % 60;
            document.getElementById('timerDisplay').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}:00`;
        });

        checkAuth();
    </script>
</body>
</html>
