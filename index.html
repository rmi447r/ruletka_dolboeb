<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Auction - Голосование</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #0d0d0d; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px 10px; }
        #timerDisplay { font-size: 18vw; font-weight: 800; color: #00a2ff; text-shadow: 0 0 20px rgba(0, 162, 255, 0.5); margin-bottom: 20px; font-family: monospace; }
        @media (min-width: 600px) { #timerDisplay { font-size: 80px; } }
        .container { width: 100%; max-width: 600px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex-grow: 1; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 12px; font-size: 16px; }
        input:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-add { background: #00a2ff; border: none; color: #fff; padding: 0 20px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 24px; }
        .btn-add:disabled { background: #333; cursor: not-allowed; }
        .lot-item { background: #141414; border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .lot-info { display: flex; flex-direction: column; overflow: hidden; }
        .lot-name { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
        .lot-votes { color: #00a2ff; font-size: 14px; }
        .btn-vote { background: #222; border: 1px solid #444; color: #fff; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; flex-shrink: 0; }
        .btn-vote:disabled { opacity: 0.3; cursor: not-allowed; border-color: #555; }
        .btn-vote:active:not(:disabled) { background: #00a2ff; transform: scale(0.95); }
        .status-msg { color: #00a2ff; margin-bottom: 15px; font-weight: bold; display: none; text-align: center; background: rgba(0, 162, 255, 0.1); padding: 10px; border-radius: 10px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="timerDisplay">10:00:00</div>
    <div id="statusMessage" class="status-msg">Ви вже прийняли участь в аукціоні ✓</div>

    <div class="container">
        <div class="input-group" id="inputSection">
            <input type="text" id="newLotName" placeholder="Запропонувати свій варіант...">
            <button class="btn-add" id="btnAddLot" onclick="suggestLot()">+</button>
        </div>
        <div id="lotsContainer"></div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDhSe5und284GF-eeqGP8l3dOUuazxYwZc", 
            databaseURL: "https://dddd-68b66-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Мгновенная проверка и блокировка интерфейса
        function checkGlobalLock() {
            const hasParticipated = localStorage.getItem('auction_participated');
            if (hasParticipated) {
                document.getElementById('newLotName').disabled = true;
                document.getElementById('btnAddLot').disabled = true;
                document.getElementById('statusMessage').style.display = 'block';
                return true;
            }
            return false;
        }

        // 2. Таймер (синхрон с админкой)
        db.ref('auction/timer').on('value', snap => {
            const t = snap.val() || 0;
            const m = Math.floor(t / 60);
            const s = t % 60;
            document.getElementById('timerDisplay').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}:00`;
        });

        // 3. Обновление списка лотов
        db.ref('lots').on('value', snap => {
            const container = document.getElementById('lotsContainer');
            container.innerHTML = '';
            const data = snap.val();
            if (!data) return;

            const isLocked = checkGlobalLock();

            const sortedLots = Object.keys(data)
                .map(key => ({ id: key, ...data[key] }))
                .filter(lot => lot.active !== false)
                .sort((a, b) => (b.votes || 0) - (a.votes || 0));

            sortedLots.forEach(lot => {
                const div = document.createElement('div');
                div.className = 'lot-item';
                div.innerHTML = `
                    <div class="lot-info">
                        <span class="lot-name">${lot.name}</span>
                        <span class="lot-votes">${lot.votes || 0} голосов</span>
                    </div>
                    <button class="btn-vote" ${isLocked ? 'disabled' : ''} onclick="vote('${lot.id}')">
                        ${isLocked ? '✓' : '+1'}
                    </button>
                `;
                container.appendChild(div);
            });
        });

        // 4. Голосование с мгновенной защитой
        function vote(id) {
            if (localStorage.getItem('auction_participated')) return;

            // Блокируем СРАЗУ, до отправки в базу
            localStorage.setItem('auction_participated', 'true');
            checkGlobalLock();

            db.ref('lots/' + id).transaction(lot => {
                if (lot) {
                    lot.votes = (lot.votes || 0) + 1;
                    lot.val = (lot.val || 0) + 1;
                }
                return lot;
            });
        }

        // 5. Предложение лота с мгновенной защитой
        function suggestLot() {
            if (localStorage.getItem('auction_participated')) return;

            const input = document.getElementById('newLotName');
            const name = input.value.trim();
            if (!name) return;

            // Блокируем СРАЗУ, чтобы не успели нажать второй раз
            localStorage.setItem('auction_participated', 'true');
            checkGlobalLock();

            const id = Date.now();
            db.ref('lots/' + id).set({ 
                id: id, 
                name: name, 
                votes: 1, 
                val: 1, 
                hue: Math.random() * 360, 
                active: true 
            }).then(() => {
                input.value = '';
            });
        }
        
        // Проверка при загрузке
        checkGlobalLock();
    </script>
</body>
</html>
