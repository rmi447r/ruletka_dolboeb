<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Auction - Голосование</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            margin: 0; 
            background: #0d0d0d; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 10px; 
            min-height: 100vh; 
        }

        /* АВТОРИЗАЦИЯ */
        .header-auth { position: absolute; top: 10px; right: 10px; z-index: 100; }
        .twitch-btn { background: #6441a5; color: white; border: none; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .twitch-btn:hover { background: #7d5bbe; transform: scale(1.05); }
        
        .user-info { display: none; align-items: center; gap: 10px; background: #1a1a1a; padding: 6px 15px; border-radius: 50px; border: 1px solid #6441a5; }
        .user-info img { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #fff; }

        /* ТАЙМЕР (ПОДДЕРЖКА 3+ ДНЕЙ) */
        #timerDisplay { 
            font-size: 15vw; 
            font-weight: 900; 
            color: #00a2ff; 
            text-shadow: 0 0 25px rgba(0, 162, 255, 0.4); 
            margin: 50px 0 20px 0; 
            font-family: 'Courier New', monospace; 
        }
        @media (min-width: 600px) { #timerDisplay { font-size: 80px; } }

        .container { width: 100%; max-width: 600px; }

        /* ВВОД ЛОТА */
        .input-group { display: none; gap: 10px; margin-bottom: 30px; }
        input { flex-grow: 1; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 12px; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: #00a2ff; box-shadow: 0 0 10px rgba(0, 162, 255, 0.2); }
        .btn-add { background: #00a2ff; border: none; color: #fff; padding: 0 25px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 24px; transition: 0.2s; }
        .btn-add:active { transform: scale(0.9); }

        /* КАРТОЧКА ЛОТА */
        .lot-item { 
            background: #141414; 
            border-radius: 18px; 
            padding: 18px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #222; 
            animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .lot-name { font-size: 19px; font-weight: 800; display: block; margin-bottom: 4px; }
        .lot-author { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        .lot-votes { color: #00a2ff; font-size: 18px; font-weight: 900; }

        .btn-vote { background: #222; border: 1px solid #444; color: #fff; padding: 12px 22px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-vote:hover { background: #00a2ff; border-color: #00a2ff; }

        /* СТАТУСЫ */
        .status-msg { 
            color: #00a2ff; 
            margin-bottom: 20px; 
            font-weight: bold; 
            display: none; 
            text-align: center; 
            background: rgba(0, 162, 255, 0.1); 
            padding: 18px; 
            border-radius: 15px; 
            width: 100%; 
            border: 1px dashed #00a2ff; 
            box-sizing: border-box;
        }

        .banned-screen { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #000; color: #ff4b4b; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            z-index: 10000; font-size: 22px; text-align: center; font-weight: bold; padding: 30px; 
        }
    </style>
</head>
<body>

    <!-- АВТОРИЗАЦИЯ ТВИЧ -->
    <div class="header-auth">
        <button id="loginBtn" class="twitch-btn" onclick="loginTwitch()">
            <i class="fab fa-twitch"></i> Войти через Twitch
        </button>
        <div id="userInfo" class="user-info">
            <img id="userAvatar" src="" alt="">
            <span id="userName"></span>
            <i class="fas fa-sign-out-alt" onclick="logout()" style="margin-left:15px; cursor:pointer; color: #555;"></i>
        </div>
    </div>

    <!-- ТАЙМЕР -->
    <div id="timerDisplay">00:00:00:00</div>
    
    <!-- СООБЩЕНИЯ -->
    <div id="statusMessage" class="status-msg"></div>

    <div class="container">
        <!-- ПОЛЕ ВВОДА -->
        <div class="input-group" id="inputSection">
            <input type="text" id="newLotName" placeholder="Предложить что-то крутое...">
            <button class="btn-add" onclick="suggestLot()">+</button>
        </div>

        <!-- СПИСОК ЛОТОВ -->
        <div id="lotsContainer"></div>
    </div>

    <script>
        const CLIENT_ID = 'wieivkm1m1fyhbfliadenazscmcoct';
        const REDIRECT_URI = 'https://rmi447r.github.io/ruletka_dolboeb/index.html';
        
        const firebaseConfig = { 
            apiKey: "AIzaSyDhSe5und284GF-eeqGP8l3dOUuazxYwZc", 
            databaseURL: "https://dddd-68b66-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null;

        // --- ЛОГИКА ВХОДА ---
        function loginTwitch() {
            window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=user:read:email`;
        }

        function logout() {
            localStorage.removeItem('twitch_user');
            location.reload();
        }

        async function checkAuth() {
            const hash = window.location.hash;
            if (hash) {
                const params = new URLSearchParams(hash.substring(1));
                const token = params.get('access_token');
                if (token) {
                    await fetchUserData(token);
                    window.location.hash = '';
                    return;
                }
            }

            const saved = localStorage.getItem('twitch_user');
            if (saved) {
                const session = JSON.parse(saved);
                if (Date.now() < session.expiry) {
                    currentUser = session.data;
                    initUser();
                } else {
                    localStorage.removeItem('twitch_user');
                }
            }
        }

        async function fetchUserData(token) {
            try {
                const res = await fetch('https://api.twitch.tv/helix/users', {
                    headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.data && data.data[0]) {
                    currentUser = data.data[0];
                    localStorage.setItem('twitch_user', JSON.stringify({
                        data: currentUser,
                        expiry: Date.now() + (30 * 24 * 60 * 60 * 1000)
                    }));
                    initUser();
                }
            } catch(e) { console.error(e); }
        }

        function initUser() {
            if (!currentUser) return;

            // ПРОВЕРКА БАНА (СИНХРОНИЗАЦИЯ С ADMIN.HTML)
            db.ref('bans/' + currentUser.id).on('value', snap => {
                if (snap.exists()) {
                    document.body.innerHTML = `
                        <div class="banned-screen">
                            <i class="fas fa-user-slash" style="font-size: 50px; margin-bottom: 20px;"></i>
                            ДОСТУП ЗАКРЫТ.<br>
                            <span style="font-size: 14px; color: #555; margin-top: 10px;">Вы забанены за нарушение правил.</span>
                        </div>`;
                }
            });

            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userAvatar').src = currentUser.profile_image_url;
            document.getElementById('userName').innerText = currentUser.display_name;
            
            // Presence (для админки)
            const presenceRef = db.ref('presence/' + currentUser.id);
            presenceRef.set({ name: currentUser.display_name, id: currentUser.id });
            presenceRef.onDisconnect().remove();

            checkParticipation();
        }

        // --- ЛОГИКА ГОЛОСОВАНИЯ ---
        function checkParticipation() {
            if (!currentUser) return;
            
            // Если админ удалит лот, запись в voters исчезнет и у юзера снова появятся кнопки
            db.ref('voters/' + currentUser.id).on('value', snap => {
                const statusBox = document.getElementById('statusMessage');
                const inputSection = document.getElementById('inputSection');
                
                if (snap.exists()) {
                    const data = snap.val();
                    inputSection.style.display = 'none';
                    statusBox.style.display = 'block';
                    statusBox.innerText = data.created 
                        ? `Ваш лот предложен: "${data.created}"` 
                        : `Голос принят! Ждём результатов.`;
                    
                    document.querySelectorAll('.btn-vote').forEach(b => b.style.display = 'none');
                } else {
                    inputSection.style.display = 'flex';
                    statusBox.style.display = 'none';
                    document.querySelectorAll('.btn-vote').forEach(b => b.style.display = 'block');
                }
            });
        }

        db.ref('lots').on('value', snap => {
            const container = document.getElementById('lotsContainer');
            container.innerHTML = '';
            const data = snap.val();
            if (!data) return;

            Object.keys(data).map(key => ({ id: key, ...data[key] }))
                .filter(l => l.active !== false)
                .sort((a, b) => (b.votes || 0) - (a.votes || 0))
                .forEach(lot => {
                    const div = document.createElement('div');
                    div.className = 'lot-item';
                    div.innerHTML = `
                        <div>
                            <span class="lot-name">${lot.name}</span>
                            <span class="lot-author">от ${lot.author || 'Anon'}</span>
                        </div>
                        <div style="display:flex; align-items:center; gap:15px;">
                            <span class="lot-votes">${lot.votes || 0}</span>
                            ${currentUser ? `<button class="btn-vote" id="vote_${lot.id}" onclick="vote('${lot.id}')">+1</button>` : ''}
                        </div>
                    `;
                    container.appendChild(div);
                });
        });

        function vote(lotId) {
            if (!currentUser) return;
            db.ref('voters/' + currentUser.id).set({ name: currentUser.display_name, lot: lotId });
            
            db.ref('lots/' + lotId).transaction(l => {
                if (l) {
                    l.votes = (l.votes || 0) + 1;
                    if(!l.voters) l.voters = {};
                    l.voters[currentUser.id] = currentUser.display_name;
                }
                return l;
            });
        }

        function suggestLot() {
            if (!currentUser) return;
            const input = document.getElementById('newLotName');
            const name = input.value.trim();
            if (!name || name.length < 2) return;

            const lotId = "lot_" + Date.now();
            db.ref('lots/' + lotId).set({
                id: lotId,
                name: name,
                votes: 1,
                active: true,
                author: currentUser.display_name,
                authorId: currentUser.id,
                voters: { [currentUser.id]: currentUser.display_name },
                hue: Math.random()*360
            });

            db.ref('voters/' + currentUser.id).set({
                name: currentUser.display_name,
                created: name,
                lotId: lotId
            });

            input.value = '';
        }

        // --- ТАЙМЕР (СИНХРОН С АДМИНКОЙ - ДНИ) ---
        db.ref('auction/timer').on('value', snap => {
            const t = snap.val() || 0;
            const d = Math.floor(t / 86400);
            const h = Math.floor((t % 86400) / 3600);
            const m = Math.floor((t % 3600) / 60);
            const s = t % 60;
            document.getElementById('timerDisplay').innerText = 
                `${String(d).padStart(2,'0')}:${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        });

        // Блокировка если админ закрыл сбор
        db.ref('auction/votingClosed').on('value', snap => {
            if (snap.val() === true) {
                document.getElementById('inputSection').style.display = 'none';
                document.querySelectorAll('.btn-vote').forEach(b => b.style.display = 'none');
                document.getElementById('statusMessage').style.display = 'block';
                document.getElementById('statusMessage').innerText = "ПРИЕМ ГОЛОСОВ ЗАВЕРШЕН";
            }
        });

        checkAuth();
    </script>
</body>
</html>
