<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Auction - Система Голосования (VIEWER PRO)</title>
    
    <!-- ПОДКЛЮЧЕНИЕ ВНЕШНИХ РЕСУРСОВ -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ============================================================
           ГЛОБАЛЬНЫЕ СТИЛИ И ОФОРМЛЕНИЕ
           ============================================================ */
        body { 
            margin: 0; 
            padding: 0;
            background-color: #0d0d0d; 
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 10px; 
            min-height: 100vh; 
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* БЛОК АВТОРИЗАЦИИ (ШАПКА) */
        .header-auth { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            z-index: 1000; 
        }

        .twitch-btn { 
            background-color: #6441a5; 
            color: #ffffff; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 900; 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 4px 20px rgba(100, 65, 165, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .twitch-btn:hover { 
            background-color: #7d5bbe; 
            transform: scale(1.05); 
            box-shadow: 0 6px 25px rgba(100, 65, 165, 0.6);
        }
        
        .user-info { 
            display: none; 
            align-items: center; 
            gap: 12px; 
            background-color: #1a1a1a; 
            padding: 8px 20px; 
            border-radius: 60px; 
            border: 1px solid #6441a5; 
            box-shadow: 0 4px 25px rgba(0,0,0,0.7);
        }

        .user-info img { 
            width: 36px; 
            height: 36px; 
            border-radius: 50%; 
            border: 2px solid #ffffff; 
        }

        .user-info span {
            font-weight: 800;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        .logout-btn {
            margin-left: 15px;
            cursor: pointer;
            color: #555;
            font-size: 18px;
            transition: color 0.3s;
        }

        .logout-btn:hover {
            color: #ff4b4b;
        }

        /* ТАБЛО ТАЙМЕРА (ПОДДЕРЖКА ДНЕЙ) */
        #timerDisplay { 
            font-size: 16vw; 
            font-weight: 900; 
            color: #00a2ff; 
            text-shadow: 0 0 35px rgba(0, 162, 255, 0.5); 
            margin: 60px 0 30px 0; 
            font-family: 'Courier New', Courier, monospace; 
            letter-spacing: 5px;
        }

        @media (min-width: 600px) { 
            #timerDisplay { font-size: 95px; } 
        }

        .container { 
            width: 100%; 
            max-width: 650px; 
            z-index: 10;
        }

        /* БЛОК ВВОДА НОВОГО ЛОТА */
        .input-group { 
            display: none; 
            gap: 15px; 
            margin-bottom: 40px; 
            width: 100%;
        }

        input { 
            flex-grow: 1; 
            background-color: #1a1a1a; 
            border: 1px solid #333; 
            color: #ffffff; 
            padding: 20px; 
            border-radius: 18px; 
            font-size: 16px; 
            outline: none; 
            transition: all 0.3s ease; 
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        input:focus { 
            border-color: #00a2ff; 
            box-shadow: 0 0 20px rgba(0, 162, 255, 0.2), inset 0 2px 10px rgba(0,0,0,0.5); 
            background-color: #222;
        }

        .btn-add { 
            background-color: #00a2ff; 
            border: none; 
            color: #ffffff; 
            padding: 0 35px; 
            border-radius: 18px; 
            cursor: pointer; 
            font-weight: 900; 
            font-size: 32px; 
            transition: all 0.2s ease; 
            box-shadow: 0 4px 15px rgba(0, 162, 255, 0.3);
        }

        .btn-add:hover {
            background-color: #33b5ff;
            transform: translateY(-2px);
        }

        .btn-add:active { 
            transform: scale(0.9); 
        }

        /* КАРТОЧКА ЛОТА */
        .lot-item { 
            background-color: #141414; 
            border-radius: 26px; 
            padding: 24px; 
            margin-bottom: 18px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #222222; 
            box-shadow: 0 10px 35px rgba(0,0,0,0.4);
            animation: lotSlideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        @keyframes lotSlideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lot-name { 
            font-size: 22px; 
            font-weight: 800; 
            display: block; 
            margin-bottom: 8px; 
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .lot-author { 
            font-size: 12px; 
            color: #555555; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: 700;
        }

        .lot-votes-count { 
            color: #00a2ff; 
            font-size: 26px; 
            font-weight: 900; 
            margin-right: 10px;
            text-shadow: 0 0 15px rgba(0, 162, 255, 0.3);
        }

        .btn-vote { 
            background-color: #222222; 
            border: 1px solid #333333; 
            color: #ffffff; 
            padding: 16px 32px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: 900; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            outline: none;
            font-size: 16px;
            text-transform: uppercase;
        }

        .btn-vote:hover { 
            background-color: #00a2ff; 
            border-color: #00a2ff; 
            box-shadow: 0 0 30px rgba(0, 162, 255, 0.5);
            transform: scale(1.05);
        }

        .btn-vote:active {
            transform: scale(0.95);
        }

        /* СООБЩЕНИЯ О СТАТУСЕ (ПРИ УЧАСТИИ) */
        .status-msg { 
            color: #00a2ff; 
            margin-bottom: 35px; 
            font-weight: 800; 
            display: none; 
            text-align: center; 
            background-color: rgba(0, 162, 255, 0.07); 
            padding: 25px; 
            border-radius: 25px; 
            width: 100%; 
            max-width: 650px;
            border: 2px dashed #00a2ff; 
            box-sizing: border-box;
            font-size: 16px;
            line-height: 1.6;
            animation: statusPulse 2.5s infinite ease-in-out;
        }

        @keyframes statusPulse {
            0% { opacity: 0.7; transform: scale(0.99); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.7; transform: scale(0.99); }
        }

        /* ЭКРАН БЛОКИРОВКИ (БАН) */
        .banned-screen { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #000000; 
            color: #ff4b4b; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 10000; 
            font-size: 30px; 
            text-align: center; 
            font-weight: 900; 
            padding: 50px; 
            box-sizing: border-box;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .banned-screen i {
            font-size: 120px;
            margin-bottom: 40px;
            text-shadow: 0 0 40px rgba(255, 75, 75, 0.6);
        }

        .login-info-text {
            color: #444;
            font-size: 13px;
            margin-bottom: 30px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2.5px;
        }
    </style>
</head>
<body>

    <!-- ШАПКА: АВТОРИЗАЦИЯ -->
    <div class="header-auth">
        <button id="loginBtn" class="twitch-btn" onclick="loginTwitch()">
            <i class="fab fa-twitch"></i> АВТОРИЗАЦИЯ ЧЕРЕЗ TWITCH
        </button>
        <div id="userInfo" class="user-info">
            <img id="userAvatar" src="" alt="User Avatar">
            <span id="userName"></span>
            <i class="fas fa-sign-out-alt logout-btn" title="Выйти" onclick="logout()"></i>
        </div>
    </div>

    <!-- ГЛАВНЫЙ ТАЙМЕР -->
    <div id="timerDisplay">00:00:00:00</div>
    
    <!-- ПОДСКАЗКА ДЛЯ ГОСТЕЙ -->
    <div id="loginWarning" class="login-info-text">Войдите, чтобы предложить лот или проголосовать</div>

    <!-- СООБЩЕНИЕ О СТАТУСЕ (ВЫ УЖЕ ГОЛОСОВАЛИ) -->
    <div id="statusMessage" class="status-msg"></div>

    <div class="container">
        <!-- БЛОК ПРЕДЛОЖЕНИЯ НОВОГО ЛОТА -->
        <div class="input-group" id="inputSection">
            <input type="text" id="newLotName" placeholder="Напиши название своего лота...">
            <button class="btn-add" title="Предложить" onclick="suggestLot()">+</button>
        </div>

        <!-- ДИНАМИЧЕСКИЙ СПИСОК ВСЕХ ЛОТОВ -->
        <div id="lotsContainer"></div>
    </div>

    <script>
        /* ============================================================
           БЛОК ИНИЦИАЛИЗАЦИИ И НАСТРОЕК
           ============================================================ */
        const CLIENT_ID = 'wieivkm1m1fyhbfliadenazscmcoct';
        const REDIRECT_URI = 'https://rmi447r.github.io/ruletka_dolboeb/index.html';
        
        const firebaseConfig = { 
            apiKey: "AIzaSyDhSe5und284GF-eeqGP8l3dOUuazxYwZc", 
            databaseURL: "https://dddd-68b66-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null;

        /* ============================================================
           ЛОГИКА ТВИТЧ-АВТОРИЗАЦИИ
           ============================================================ */
        function loginTwitch() {
            // Переадресация на Twitch OAuth
            window.location.href = 'https://id.twitch.tv/oauth2/authorize?client_id=' + CLIENT_ID + '&redirect_uri=' + REDIRECT_URI + '&response_type=token&scope=user:read:email';
        }

        function logout() {
            // Очистка данных и перезагрузка
            localStorage.removeItem('twitch_user');
            location.reload();
        }

        async function checkAuth() {
            // 1. Поиск токена в URL после редиректа
            const hash = window.location.hash;
            if (hash) {
                const params = new URLSearchParams(hash.substring(1));
                const token = params.get('access_token');
                if (token) {
                    await fetchUserData(token);
                    window.location.hash = ''; 
                    return;
                }
            }

            // 2. Поиск сохраненной сессии в браузере
            const savedData = localStorage.getItem('twitch_user');
            if (savedData) {
                const session = JSON.parse(savedData);
                // Проверка срока годности (30 дней)
                if (Date.now() < session.expiry) {
                    currentUser = session.data;
                    initUserUI();
                } else {
                    localStorage.removeItem('twitch_user');
                }
            }
        }

        async function fetchUserData(token) {
            try {
                const response = await fetch('https://api.twitch.tv/helix/users', {
                    headers: { 'Client-ID': CLIENT_ID, 'Authorization': 'Bearer ' + token }
                });
                const result = await response.json();
                if (result.data && result.data[0]) {
                    currentUser = result.data[0];
                    // Сохраняем сессию
                    localStorage.setItem('twitch_user', JSON.stringify({
                        data: currentUser,
                        expiry: Date.now() + (30 * 24 * 60 * 60 * 1000)
                    }));
                    initUserUI();
                }
            } catch(error) { 
                console.error("Ошибка при получении данных Twitch:", error); 
            }
        }

        function initUserUI() {
            if (!currentUser) return;

            // 🛡️ СИСТЕМА БАНА: Постоянный мониторинг черного списка из admin.html
            db.ref('bans/' + currentUser.id).on('value', function(snapshot) {
                if (snapshot.exists()) {
                    document.body.innerHTML = 
                        '<div class="banned-screen">' +
                            '<i class="fas fa-user-lock"></i>' +
                            'ДОСТУП ЗАБЛОКИРОВАН.<br>' +
                            '<span style="font-size: 18px; color: #555; margin-top: 25px; font-weight: 600; text-transform: none; letter-spacing: 1px;">' +
                                'Ваш аккаунт внесен в черный список за нарушение правил.' +
                            '</span>' +
                        '</div>';
                }
            });

            // Настройка элементов интерфейса
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('loginWarning').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userAvatar').src = currentUser.profile_image_url;
            document.getElementById('userName').innerText = currentUser.display_name;
            
            // Presence System: Передаем админу, что мы онлайн
            const presenceRef = db.ref('presence/' + currentUser.id);
            presenceRef.set({ 
                name: currentUser.display_name, 
                id: currentUser.id,
                avatar: currentUser.profile_image_url 
            });
            presenceRef.onDisconnect().remove();

            // Проверяем, голосовал ли юзер ранее
            checkUserStatus();
        }

        /* ============================================================
           ЛОГИКА КОНТРОЛЯ УЧАСТИЯ (РАЗБЛОКИРОВКА ПРИ УДАЛЕНИИ)
           ============================================================ */
        function checkUserStatus() {
            if (!currentUser) return;
            
            // СЛУШАТЕЛЬ ПАПКИ VOTERS: 
            // Если админ удаляет лот в admin.html, скрипт чистит запись в voters.
            // Этот слушатель увидит удаление записи и МГНОВЕННО вернет юзеру кнопки.
            db.ref('voters/' + currentUser.id).on('value', function(snapshot) {
                const statusBox = document.getElementById('statusMessage');
                const inputSection = document.getElementById('inputSection');
                
                if (snapshot.exists()) {
                    const info = snapshot.val();
                    inputSection.style.display = 'none';
                    statusBox.style.display = 'block';
                    
                    if (info.created) {
                        statusBox.innerHTML = '<i class="fas fa-check-circle"></i> Лот предложен: "' + info.created + '".<br>Ожидайте, пока админ запустит рулетку.';
                    } else {
                        statusBox.innerHTML = '<i class="fas fa-vote-yea"></i> Ваш голос принят!<br>Если админ удалит лот, вы сможете переголосовать.';
                    }
                    
                    // Скрываем все кнопки "+1" во всех лотах
                    document.querySelectorAll('.btn-vote').forEach(function(btn) { btn.style.display = 'none'; });
                } else {
                    // ЕСЛИ ЗАПИСИ НЕТ (ИЛИ ОНА УДАЛЕНА) — ПОЛНАЯ РАЗБЛОКИРОВКА
                    inputSection.style.display = 'flex';
                    statusBox.style.display = 'none';
                    document.querySelectorAll('.btn-vote').forEach(function(btn) { btn.style.display = 'block'; });
                }
            });
        }

        /* ============================================================
           ОБРАБОТКА И ВЫВОД ЛОТОВ
           ============================================================ */
        db.ref('lots').on('value', function(snapshot) {
            const container = document.getElementById('lotsContainer');
            container.innerHTML = '';
            const data = snapshot.val();
            if (!data) return;

            // Конвертируем объект в массив для сортировки
            const lotItems = Object.keys(data).map(function(key) {
                return { id: key, ...data[key] };
            });

            // Фильтруем только активные лоты и сортируем по количеству голосов (топ вверху)
            const sortedLots = lotItems.filter(function(l) {
                return l.active !== false;
            }).sort(function(a, b) {
                return (b.votes || 0) - (a.votes || 0);
            });

            sortedLots.forEach(function(lot) {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'lot-item';
                
                itemDiv.innerHTML = 
                    '<div style="flex: 1; padding-right: 15px;">' +
                        '<span class="lot-name">' + lot.name + '</span>' +
                        '<span class="lot-author">предложил: ' + (lot.author || 'Аноним') + '</span>' +
                    '</div>' +
                    '<div style="display:flex; align-items:center; gap:20px;">' +
                        '<span class="lot-votes-count">' + (lot.votes || 0) + '</span>' +
                        (currentUser ? '<button class="btn-vote" id="v_btn_' + lot.id + '" onclick="voteForLot(\'' + lot.id + '\')">+1</button>' : '') +
                    '</div>';
                
                container.appendChild(itemDiv);
            });
            
            // После каждого обновления списка проверяем статус юзера, чтобы кнопки не мигали
            if (currentUser) {
                db.ref('voters/' + currentUser.id).once('value', function(s) {
                    if (s.exists()) {
                        document.querySelectorAll('.btn-vote').forEach(function(b) { b.style.display = 'none'; });
                    }
                });
            }
        });

        // ФУНКЦИЯ: ГОЛОСОВАТЬ ЗА ЛОТ
        function voteForLot(lotId) {
            if (!currentUser) return;
            
            // 1. Сначала блокируем юзера в папке voters
            db.ref('voters/' + currentUser.id).set({ 
                name: currentUser.display_name, 
                lot: lotId,
                timestamp: Date.now()
            });
            
            // 2. Увеличиваем счетчик в самом лоте атомарно (Transaction)
            db.ref('lots/' + lotId).transaction(function(lotData) {
                if (lotData) {
                    lotData.votes = (lotData.votes || 0) + 1;
                    if(!lotData.voters) lotData.voters = {};
                    // Добавляем ID юзера в список проголосовавших для админки
                    lotData.voters[currentUser.id] = currentUser.display_name;
                }
                return lotData;
            });
        }

        // ФУНКЦИЯ: ПРЕДЛОЖИТЬ СВОЙ ЛОТ
        function suggestLot() {
            if (!currentUser) return;
            const nameField = document.getElementById('newLotName');
            const nameValue = nameField.value.trim();
            
            if (nameValue.length < 2) {
                alert("Название слишком короткое!");
                return;
            }

            const uniqueLotId = "lot_" + Date.now();
            
            // 1. Создаем лот
            db.ref('lots/' + uniqueLotId).set({
                id: uniqueLotId,
                name: nameValue,
                votes: 1,
                active: true,
                author: currentUser.display_name,
                authorId: currentUser.id,
                voters: { [currentUser.id]: currentUser.display_name },
                hue: Math.floor(Math.random() * 360) // Цвет для колеса
            });

            // 2. Блокируем юзера
            db.ref('voters/' + currentUser.id).set({
                name: currentUser.display_name,
                created: nameValue,
                lotId: uniqueLotId
            });

            nameField.value = '';
        }

        /* ============================================================
           ТАЙМЕР (СИНХРОНИЗАЦИЯ 3+ ДНЕЙ С АДМИНКОЙ)
           ============================================================ */
        db.ref('auction/timer').on('value', function(snapshot) {
            const totalSeconds = snapshot.val() || 0;
            
            // Математика Дней, Часов, Минут и Секунд
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            
            // Вывод в табло
            document.getElementById('timerDisplay').innerText = 
                String(days).padStart(2,'0') + ":" + 
                String(hours).padStart(2,'0') + ":" + 
                String(minutes).padStart(2,'0') + ":" + 
                String(seconds).padStart(2,'0');
        });

        // ПРОВЕРКА ГЛОБАЛЬНОЙ БЛОКИРОВКИ (ЕСЛИ АДМИН ЗАКРЫЛ СБОР)
        db.ref('auction/votingClosed').on('value', function(snapshot) {
            if (snapshot.val() === true) {
                document.getElementById('inputSection').style.display = 'none';
                document.querySelectorAll('.btn-vote').forEach(function(b) { b.style.display = 'none'; });
                
                const statusPanel = document.getElementById('statusMessage');
                statusPanel.style.display = 'block';
                statusPanel.innerHTML = '<i class="fas fa-lock"></i> ПРИЕМ ГОЛОСОВ ЗАВЕРШЕН АДМИНИСТРАЦИЕЙ.';
                statusPanel.style.borderColor = "#ff4b4b";
                statusPanel.style.color = "#ff4b4b";
                statusPanel.style.backgroundColor = "rgba(255, 75, 75, 0.05)";
            }
        });

        // ЗАПУСК СИСТЕМЫ ПРОВЕРКИ СЕССИИ ПРИ ЗАГРУЗКЕ
        checkAuth();
    </script>
</body>
</html>
