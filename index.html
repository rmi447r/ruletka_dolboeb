<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Auction - Система Голосования</title>
    <!-- ПОДКЛЮЧЕНИЕ СКРИПТОВ И ИКОНОК -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ============================================================
           ОСНОВНЫЕ СТИЛИ (ТВОЙ ОРИГИНАЛЬНЫЙ ДИЗАЙН)
           ============================================================ */
        body { 
            margin: 0; 
            background-color: #0d0d0d; 
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 10px; 
            min-height: 100vh; 
            box-sizing: border-box;
        }

        /* ШАПКА И АВТОРИЗАЦИЯ */
        .header-auth { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            z-index: 1000; 
        }

        .twitch-btn { 
            background-color: #6441a5; 
            color: #ffffff; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            transition: transform 0.3s ease, background-color 0.3s ease; 
            box-shadow: 0 4px 15px rgba(100, 65, 165, 0.3);
        }

        .twitch-btn:hover { 
            background-color: #7d5bbe; 
            transform: scale(1.05); 
        }
        
        .user-info { 
            display: none; 
            align-items: center; 
            gap: 12px; 
            background-color: #1a1a1a; 
            padding: 8px 18px; 
            border-radius: 50px; 
            border: 1px solid #6441a5; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .user-info img { 
            width: 32px; 
            height: 32px; 
            border-radius: 50%; 
            border: 1px solid #ffffff; 
        }

        .user-info span {
            font-weight: bold;
            font-size: 14px;
        }

        /* ТАБЛО ТАЙМЕРА (ПОДДЕРЖКА ДНЕЙ) */
        #timerDisplay { 
            font-size: 16vw; 
            font-weight: 900; 
            color: #00a2ff; 
            text-shadow: 0 0 30px rgba(0, 162, 255, 0.4); 
            margin: 60px 0 30px 0; 
            font-family: 'Courier New', Courier, monospace; 
            letter-spacing: 2px;
        }

        @media (min-width: 600px) { 
            #timerDisplay { font-size: 85px; } 
        }

        .container { 
            width: 100%; 
            max-width: 650px; 
        }

        /* БЛОК ВВОДА НОВОГО ЛОТА */
        .input-group { 
            display: none; 
            gap: 12px; 
            margin-bottom: 35px; 
            width: 100%;
        }

        input { 
            flex-grow: 1; 
            background-color: #1a1a1a; 
            border: 1px solid #333; 
            color: #ffffff; 
            padding: 18px; 
            border-radius: 15px; 
            font-size: 16px; 
            outline: none; 
            transition: border-color 0.3s, box-shadow 0.3s; 
        }

        input:focus { 
            border-color: #00a2ff; 
            box-shadow: 0 0 15px rgba(0, 162, 255, 0.2); 
        }

        .btn-add { 
            background-color: #00a2ff; 
            border: none; 
            color: #ffffff; 
            padding: 0 28px; 
            border-radius: 15px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 28px; 
            transition: transform 0.2s, background-color 0.2s; 
        }

        .btn-add:active { 
            transform: scale(0.9); 
        }

        /* КАРТОЧКА ЛОТА */
        .lot-item { 
            background-color: #141414; 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #222222; 
            transition: border-color 0.3s, transform 0.3s;
            animation: fadeInLot 0.5s ease-out;
        }

        @keyframes fadeInLot {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lot-name { 
            font-size: 20px; 
            font-weight: 800; 
            display: block; 
            margin-bottom: 6px; 
            color: #ffffff;
        }

        .lot-author { 
            font-size: 12px; 
            color: #555555; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-weight: 600;
        }

        .lot-votes { 
            color: #00a2ff; 
            font-size: 22px; 
            font-weight: 900; 
            margin-right: 5px;
        }

        .btn-vote { 
            background-color: #222222; 
            border: 1px solid #444444; 
            color: #ffffff; 
            padding: 14px 26px; 
            border-radius: 15px; 
            cursor: pointer; 
            font-weight: 800; 
            transition: all 0.2s ease; 
            outline: none;
        }

        .btn-vote:hover { 
            background-color: #00a2ff; 
            border-color: #00a2ff; 
            box-shadow: 0 0 20px rgba(0, 162, 255, 0.4);
        }

        .btn-vote:active {
            transform: scale(0.95);
        }

        /* СООБЩЕНИЯ О СТАТУСЕ (ДЛЯ УЧАСТНИКОВ) */
        .status-msg { 
            color: #00a2ff; 
            margin-bottom: 25px; 
            font-weight: bold; 
            display: none; 
            text-align: center; 
            background-color: rgba(0, 162, 255, 0.08); 
            padding: 22px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 600px;
            border: 1px dashed #00a2ff; 
            box-sizing: border-box;
            font-size: 15px;
            line-height: 1.6;
        }

        /* ЭКРАН ПОЛНОГО БАНА */
        .banned-screen { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #000000; 
            color: #ff4b4b; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 10000; 
            font-size: 26px; 
            text-align: center; 
            font-weight: bold; 
            padding: 40px; 
            box-sizing: border-box;
        }

        .banned-screen i {
            font-size: 80px;
            margin-bottom: 20px;
        }

        /* ВСПОМОГАТЕЛЬНОЕ */
        .login-warning {
            color: #444;
            font-size: 14px;
            margin-bottom: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- КНОПКА ВХОДА ИЛИ ПРОФИЛЬ -->
    <div class="header-auth">
        <button id="loginBtn" class="twitch-btn" onclick="loginTwitch()">
            <i class="fab fa-twitch"></i> ВОЙТИ ЧЕРЕЗ TWITCH
        </button>
        <div id="userInfo" class="user-info">
            <img id="userAvatar" src="" alt="Avatar">
            <span id="userName"></span>
            <i class="fas fa-sign-out-alt" onclick="logout()" style="margin-left:15px; cursor:pointer; color: #444;"></i>
        </div>
    </div>

    <!-- ТАБЛО ТАЙМЕРА -->
    <div id="timerDisplay">00:00:00:00</div>
    
    <!-- ТЕКСТ-ПРЕДУПРЕЖДЕНИЕ -->
    <div id="loginWarning" class="login-warning">Войдите, чтобы участвовать в аукционе</div>

    <!-- ОКНО СТАТУСА (ВЫ ПРОГОЛОСОВАЛИ / ВЫ ПРЕДЛОЖИЛИ) -->
    <div id="statusMessage" class="status-msg"></div>

    <div class="container">
        <!-- БЛОК ПРЕДЛОЖЕНИЯ (СКРЫВАЕТСЯ ПОСЛЕ ДЕЙСТВИЯ) -->
        <div class="input-group" id="inputSection">
            <input type="text" id="newLotName" placeholder="Введите название своего лота...">
            <button class="btn-add" onclick="suggestLot()">+</button>
        </div>

        <!-- СПИСОК ЛОТОВ -->
        <div id="lotsContainer"></div>
    </div>

    <script>
        /* ============================================================
           КОНФИГУРАЦИЯ И ИНИЦИАЛИЗАЦИЯ
           ============================================================ */
        const CLIENT_ID = 'wieivkm1m1fyhbfliadenazscmcoct';
        const REDIRECT_URI = 'https://rmi447r.github.io/ruletka_dolboeb/index.html';
        
        const firebaseConfig = { 
            apiKey: "AIzaSyDhSe5und284GF-eeqGP8l3dOUuazxYwZc", 
            databaseURL: "https://dddd-68b66-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null;

        /* ============================================================
           ЛОГИКА АВТОРИЗАЦИИ ЧЕРЕЗ TWITCH
           ============================================================ */
        function loginTwitch() {
            window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=user:read:email`;
        }

        function logout() {
            localStorage.removeItem('twitch_user');
            location.reload();
        }

        async function checkAuth() {
            const hash = window.location.hash;
            if (hash) {
                const params = new URLSearchParams(hash.substring(1));
                const token = params.get('access_token');
                if (token) {
                    await fetchUserData(token);
                    window.location.hash = ''; 
                    return;
                }
            }

            const saved = localStorage.getItem('twitch_user');
            if (saved) {
                const session = JSON.parse(saved);
                if (Date.now() < session.expiry) {
                    currentUser = session.data;
                    initUser();
                } else {
                    localStorage.removeItem('twitch_user');
                }
            }
        }

        async function fetchUserData(token) {
            try {
                const res = await fetch('https://api.twitch.tv/helix/users', {
                    headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.data && data.data[0]) {
                    currentUser = data.data[0];
                    // Сохранение на 30 дней
                    localStorage.setItem('twitch_user', JSON.stringify({
                        data: currentUser,
                        expiry: Date.now() + (30 * 24 * 60 * 60 * 1000)
                    }));
                    initUser();
                }
            } catch(e) { 
                console.error("Twitch Auth Error:", e); 
            }
        }

        function initUser() {
            if (!currentUser) return;

            // 🛡️ ПРОВЕРКА НА БАН (СИНХРОНИЗАЦИЯ С ADMIN.HTML)
            db.ref('bans/' + currentUser.id).on('value', snap => {
                if (snap.exists()) {
                    document.body.innerHTML = `
                        <div class="banned-screen">
                            <i class="fas fa-user-slash"></i>
                            ДОСТУП ЗАБЛОКИРОВАН.<br>
                            <span style="font-size: 14px; color: #444; margin-top: 15px; font-weight: normal; text-transform: none;">
                                Вы были занесены в черный список администратором за нарушение правил.
                            </span>
                        </div>`;
                }
            });

            // UI ОБНОВЛЕНИЕ
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('loginWarning').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userAvatar').src = currentUser.profile_image_url;
            document.getElementById('userName').innerText = currentUser.display_name;
            
            // ПЕРЕДАЧА ОНЛАЙН СТАТУСА В АДМИНКУ
            const presenceRef = db.ref('presence/' + currentUser.id);
            presenceRef.set({ name: currentUser.display_name, id: currentUser.id });
            presenceRef.onDisconnect().remove();

            // ПРОВЕРКА УЧАСТИЯ
            checkParticipation();
        }

        /* ============================================================
           ЛОГИКА КОНТРОЛЯ ГОЛОСОВ (РАЗБЛОКИРОВКА КНОПОК)
           ============================================================ */
        function checkParticipation() {
            if (!currentUser) return;
            
            // ГЛАВНАЯ ФИЧА: Если админ удаляет лот, запись здесь исчезнет, 
            // и у юзера автоматически появится форма ввода и кнопки "+1".
            db.ref('voters/' + currentUser.id).on('value', snap => {
                const statusBox = document.getElementById('statusMessage');
                const inputSection = document.getElementById('inputSection');
                
                if (snap.exists()) {
                    const info = snap.val();
                    inputSection.style.display = 'none';
                    statusBox.style.display = 'block';
                    
                    if (info.created) {
                        statusBox.innerText = `Вы предложили лот: "${info.created}". Ожидайте начала!`;
                    } else {
                        statusBox.innerText = `Ваш голос принят. Если ваш лот будет удален админом, вы сможете проголосовать снова.`;
                    }
                    
                    // Прячем все кнопки голосования
                    document.querySelectorAll('.btn-vote').forEach(b => b.style.display = 'none');
                } else {
                    // РАЗБЛОКИРОВКА (ЮЗЕР СНОВА МОЖЕТ ДЕЙСТВОВАТЬ)
                    inputSection.style.display = 'flex';
                    statusBox.style.display = 'none';
                    document.querySelectorAll('.btn-vote').forEach(b => b.style.display = 'block');
                }
            });
        }

        /* ============================================================
           ОБРАБОТКА ЛОТОВ
           ============================================================ */
        db.ref('lots').on('value', snap => {
            const container = document.getElementById('lotsContainer');
            container.innerHTML = '';
            const data = snap.val();
            if (!data) return;

            // Превращаем в массив, фильтруем активные и сортируем по количеству голосов
            const list = Object.keys(data).map(key => ({ id: key, ...data[key] }))
                .filter(l => l.active !== false)
                .sort((a, b) => (b.votes || 0) - (a.votes || 0));

            list.forEach(lot => {
                const div = document.createElement('div');
                div.className = 'lot-item';
                div.innerHTML = `
                    <div style="flex: 1; padding-right: 10px;">
                        <span class="lot-name">${lot.name}</span>
                        <span class="lot-author">от ${lot.author || 'Анонима'}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:20px;">
                        <span class="lot-votes">${lot.votes || 0}</span>
                        ${currentUser ? `<button class="btn-vote" id="btn_${lot.id}" onclick="vote('${lot.id}')">+1</button>` : ''}
                    </div>
                `;
                container.appendChild(div);
            });
            
            // Если уже голосовал — прячем кнопки сразу после загрузки списка
            if (currentUser) {
                db.ref('voters/' + currentUser.id).once('value', s => {
                    if (s.exists()) {
                        document.querySelectorAll('.btn-vote').forEach(b => b.style.display = 'none');
                    }
                });
            }
        });

        // ФУНКЦИЯ ОТДАЧИ ГОЛОСА
        function vote(lotId) {
            if (!currentUser) return;
            
            // 1. Помечаем юзера как проголосовавшего
            db.ref('voters/' + currentUser.id).set({ 
                name: currentUser.display_name, 
                lot: lotId 
            });
            
            // 2. Инкремент голоса в лоте (безопасный метод транзакции)
            db.ref('lots/' + lotId).transaction(l => {
                if (l) {
                    l.votes = (l.votes || 0) + 1;
                    if(!l.voters) l.voters = {};
                    l.voters[currentUser.id] = currentUser.display_name;
                }
                return l;
            });
        }

        // ФУНКЦИЯ ПРЕДЛОЖЕНИЯ СВОЕГО ЛОТА
        function suggestLot() {
            if (!currentUser) return;
            const input = document.getElementById('newLotName');
            const name = input.value.trim();
            if (name.length < 2) return;

            const lotId = "lot_" + Date.now();
            
            // 1. Создаем лот в основной базе
            db.ref('lots/' + lotId).set({
                id: lotId,
                name: name,
                votes: 1,
                active: true,
                author: currentUser.display_name,
                authorId: currentUser.id,
                voters: { [currentUser.id]: currentUser.display_name },
                hue: Math.floor(Math.random() * 360)
            });

            // 2. Блокируем юзера, записывая его действие
            db.ref('voters/' + currentUser.id).set({
                name: currentUser.display_name,
                created: name,
                lotId: lotId
            });

            input.value = '';
        }

        /* ============================================================
           ТАЙМЕР (СИНХРОНИЗАЦИЯ 3+ ДНЕЙ)
           ============================================================ */
        db.ref('auction/timer').on('value', snap => {
            const t = snap.val() || 0;
            const d = Math.floor(t / 86400);
            const h = Math.floor((t % 86400) / 3600);
            const m = Math.floor((t % 3600) / 60);
            const s = t % 60;
            
            document.getElementById('timerDisplay').innerText = 
                `${String(d).padStart(2,'0')}:${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        });

        // ГЛОБАЛЬНАЯ БЛОКИРОВКА ПРИ ОКОНЧАНИИ
        db.ref('auction/votingClosed').on('value', snap => {
            if (snap.val() === true) {
                document.getElementById('inputSection').style.display = 'none';
                document.querySelectorAll('.btn-vote').forEach(b => b.style.display = 'none');
                const statusBox = document.getElementById('statusMessage');
                statusBox.style.display = 'block';
                statusBox.innerText = "ГОЛОСОВАНИЕ ЗАВЕРШЕНО. ОЖИДАЙТЕ РЕЗУЛЬТАТОВ НА СТРИМЕ!";
                statusBox.style.borderColor = "#ff4b4b";
                statusBox.style.color = "#ff4b4b";
            }
        });

        // СТАРТ ПРОВЕРКИ
        checkAuth();
    </script>
</body>
</html>
